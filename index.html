<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Средневековье</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --cell-bg: #333;
            --cell-border: #444;
            --highlight-active: rgba(255, 255, 0, 0.4);
            --highlight-move: rgba(0, 255, 0, 0.4);
            --highlight-attack: rgba(255, 0, 0, 0.4);
            --highlight-summon: rgba(128, 0, 128, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-ui {
            width: 100%;
            max-width: 430px; /* Ширина iPhone 15 Pro Max */
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: env(safe-area-inset-top) 5px env(safe-area-inset-bottom) 5px;
        }

        #turn-queue-container {
            height: 60px;
            background: #222;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            overflow-x: auto;
            padding: 5px;
        }

        .queue-item {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #555;
            margin-right: 5px;
            flex-shrink: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            border: 2px solid transparent;
        }

        .queue-item.player { border-color: #4da6ff; }
        .queue-item.enemy { border-color: #ff4d4d; }

        #grid-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(12, 1fr);
            gap: 2px;
            width: 100%;
            aspect-ratio: 8 / 12;
            background: var(--cell-border);
            border: 2px solid #555;
        }

        .cell {
            background-color: var(--cell-bg);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        .cell.setup-zone { background-color: #2a404a; }
        .cell.highlight-active { background-color: var(--highlight-active); }
        .cell.highlight-move { background-color: var(--highlight-move); cursor: pointer; }
        .cell.highlight-attack { background-color: var(--highlight-attack); cursor: pointer; }
        .cell.highlight-summon { background-color: var(--highlight-summon); cursor: pointer; }

        .unit {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            position: relative;
        }

        .unit.player { background: linear-gradient(135deg, #4da6ff, #0066cc); color: white; }
        .unit.enemy { background: linear-gradient(135deg, #ff4d4d, #cc0000); color: white; }

        .hp-bar {
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 5px;
            background: red;
            border-radius: 2px;
            overflow: hidden;
        }
        .hp-fill {
            height: 100%;
            background: #00ff00;
        }

        #action-panel {
            height: 120px;
            background: #222;
            border-radius: 8px 8px 0 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        
        #unit-info {
            font-size: 14px;
            margin-bottom: 5px;
            text-align: center;
            font-weight: bold;
        }

        #actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 5px;
        }

        button {
            padding: 10px 15px;
            background: #4da6ff;
            border: none;
            border-radius: 5px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            flex-grow: 1;
        }
        
        button:active { background: #0066cc; }

        #end-setup-btn {
            background: #28a745;
            margin-top: auto;
            width: 100%;
            padding: 12px;
        }

        #damage-preview {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 20px;
            color: #ff4d4d;
            z-index: 100;
            pointer-events: none;
            border: 2px solid #ff4d4d;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="game-ui">
        <!-- Полоса инициативы -->
        <div id="turn-queue-container">
            <div id="turn-queue"></div>
        </div>

        <!-- Игровое поле -->
        <div id="grid-container">
            <div id="grid"></div>
        </div>

        <!-- Панель управления -->
        <div id="action-panel">
            <div id="unit-info">Выбери юнита для расстановки</div>
            <div id="actions"></div>
            <button id="end-setup-btn">Начать бой</button>
        </div>
        
        <!-- Превью урона -->
        <div id="damage-preview" class="hidden">
            Урон: <span id="preview-dmg">0</span><br>
            <span style="font-size: 12px; color: white;">Нажми еще раз для атаки</span>
        </div>
    </div>

    <script>
        const COLS = 8;
        const ROWS = 12;

        const UNIT_TYPES = {
            necromancer: { id: 'necromancer', name: 'Некромант', hp: 10, dmg: 5, dmgType: 'magic', init: 10, move: 1, range: 2, icon: '🧙‍♂️' },
            knight: { id: 'knight', name: 'Рыцарь', hp: 50, dmg: 10, dmgType: 'phys', init: 12, move: 2, range: 1, icon: '⚔️' },
            crossbow: { id: 'crossbow', name: 'Арбалетчик', hp: 20, dmg: 15, dmgType: 'arrow', init: 18, move: 3, range: 2, icon: '🏹' },
            ballista: { id: 'ballista', name: 'Балиста', hp: 80, dmg: 40, dmgType: 'phys', init: 8, move: 1, range: 4, icon: '🏗️' },
            ent: { id: 'ent', name: 'Энт', hp: 250, dmg: 70, dmgType: 'phys', init: 6, move: 1, range: 1, icon: '🌳' },
            dragon: { id: 'dragon', name: 'Дракон', hp: 120, dmg: 40, dmgType: 'magic', init: 10, move: 2, range: 2, icon: '🐉' },
            vampire: { id: 'vampire', name: 'Вампир', hp: 40, dmg: 30, dmgType: 'phys', init: 24, move: 5, range: 1, icon: '🦇' },
            wall: { id: 'wall', name: 'Стена', hp: 100, dmg: 0, dmgType: 'none', init: 0, move: 0, range: 0, icon: '🧱' }
        };

        class GameEngine {
            constructor() {
                this.grid = [];
                this.units = [];
                this.state = 'SETUP';
                this.activeUnit = null;
                this.selectedAction = null;
                this.actionTarget = null;
                this.setupPlayerUnits = ['necromancer', 'knight', 'crossbow', 'ent', 'vampire'];
                this.initDOM();
            }

            initDOM() {
                const gridEl = document.getElementById('grid');
                for (let y = 0; y < ROWS; y++) {
                    this.grid[y] = [];
                    for (let x = 0; x < COLS; x++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.x = x;
                        cell.dataset.y = y;
                        
                        if (y >= ROWS - 3) cell.classList.add('setup-zone');
                        
                        cell.addEventListener('click', () => this.handleCellClick(x, y));
                        gridEl.appendChild(cell);
                        this.grid[y][x] = { element: cell, unit: null };
                    }
                }

                document.getElementById('end-setup-btn').addEventListener('click', () => {
                    if(this.state === 'SETUP') this.startBattle();
                });
            }

            spawnUnit(typeId, x, y, team) {
                const template = UNIT_TYPES[typeId];
                const unit = {
                    ...template,
                    x, y, team,
                    maxHp: template.hp,
                    actionPoints: 0,
                    armor: 0
                };
                
                this.units.push(unit);
                this.grid[y][x].unit = unit;
                this.renderGrid();
            }

            handleCellClick(x, y) {
                if (this.state === 'SETUP') {
                    if (y >= ROWS - 3 && !this.grid[y][x].unit && this.setupPlayerUnits.length > 0) {
                        const typeToSpawn = this.setupPlayerUnits.shift();
                        this.spawnUnit(typeToSpawn, x, y, 'player');
                        document.getElementById('unit-info').innerText = 
                            this.setupPlayerUnits.length > 0 ? `Осталось расставить: ${this.setupPlayerUnits.length}` : 'Расстановка завершена. Нажмите "Начать бой"';
                    }
                } else if (this.state === 'BATTLE' && this.activeUnit && this.activeUnit.team === 'player') {
                    this.processBattleClick(x, y);
                }
            }

            startBattle() {
                this.state = 'BATTLE';
                document.getElementById('end-setup-btn').style.display = 'none';
                
                // Вражеский ИИ
                this.spawnUnit('necromancer', 4, 0, 'enemy');
                this.spawnUnit('knight', 3, 1, 'enemy');
                this.spawnUnit('crossbow', 5, 1, 'enemy');
                this.spawnUnit('wall', 3, 2, 'enemy');
                this.spawnUnit('wall', 4, 2, 'enemy');

                this.clearHighlights();
                this.nextTurn();
            }

            nextTurn() {
                this.units = this.units.filter(u => u.hp > 0);
                
                let maxLoops = 1000;
                while (maxLoops-- > 0) {
                    let readyUnits = this.units.filter(u => u.actionPoints >= 100 && u.init > 0);
                    
                    if (readyUnits.length > 0) {
                        readyUnits.sort((a, b) => b.actionPoints - a.actionPoints);
                        this.activeUnit = readyUnits[0];
                        this.activeUnit.actionPoints -= 100;
                        
                        this.startUnitTurn();
                        this.updateTurnQueueUI();
                        return;
                    }

                    this.units.forEach(u => {
                        if (u.init > 0) u.actionPoints += u.init;
                    });
                }
            }

            startUnitTurn() {
                this.selectedAction = null;
                this.actionTarget = null;
                this.renderGrid();
                
                document.getElementById('unit-info').innerText = `Ходит: ${this.activeUnit.name} (${this.activeUnit.team === 'player' ? 'Игрок' : 'Противник'})`;
                
                if (this.activeUnit.team === 'player') {
                    this.showActions();
                    this.selectedAction = 'move';
                    this.highlightMoveZone();
                } else {
                    document.getElementById('actions').innerHTML = '<i>Думает...</i>';
                    setTimeout(() => this.executeAI(), 800);
                }
            }

            updateTurnQueueUI() {
                const queueEl = document.getElementById('turn-queue');
                queueEl.innerHTML = '';
                
                let simUnits = this.units.map(u => ({...u}));
                let forecast = [];
                
                for (let i = 0; i < 12; i++) {
                    let found = false;
                    while(!found) {
                        let ready = simUnits.filter(u => u.actionPoints >= 100 && u.init > 0);
                        if (ready.length > 0) {
                            ready.sort((a, b) => b.actionPoints - a.actionPoints);
                            let actor = ready[0];
                            actor.actionPoints -= 100;
                            forecast.push(actor);
                            found = true;
                        } else {
                            simUnits.forEach(u => { if (u.init > 0) u.actionPoints += u.init; });
                        }
                    }
                }

                forecast.forEach(u => {
                    const div = document.createElement('div');
                    div.className = `queue-item ${u.team}`;
                    div.innerText = u.icon;
                    queueEl.appendChild(div);
                });
            }

            processBattleClick(x, y) {
                const targetCell = this.grid[y][x];
                const dist = Math.max(Math.abs(this.activeUnit.x - x), Math.abs(this.activeUnit.y - y));

                if (this.selectedAction === 'attack') {
                    if (dist <= this.activeUnit.range && targetCell.unit && targetCell.unit.team !== this.activeUnit.team) {
                        if (this.actionTarget && this.actionTarget.x === x && this.actionTarget.y === y) {
                            this.executeAttack(this.activeUnit, targetCell.unit);
                            document.getElementById('damage-preview').classList.add('hidden');
                            this.endTurn();
                        } else {
                            this.actionTarget = {x, y};
                            const dmg = this.calculateDamage(this.activeUnit, targetCell.unit);
                            document.getElementById('preview-dmg').innerText = dmg;
                            document.getElementById('damage-preview').classList.remove('hidden');
                        }
                    } else {
                        // Клик мимо цели сбрасывает фокус
                        this.actionTarget = null;
                        document.getElementById('damage-preview').classList.add('hidden');
                    }
                } else if (this.selectedAction === 'move') {
                    if (!targetCell.unit && dist <= this.activeUnit.move) {
                        this.grid[this.activeUnit.y][this.activeUnit.x].unit = null;
                        this.activeUnit.x = x;
                        this.activeUnit.y = y;
                        this.grid[y][x].unit = this.activeUnit;
                        this.endTurn();
                    }
                }
            }

            calculateDamage(attacker, defender) {
                let dmg = attacker.dmg;
                
                if (defender.id === 'necromancer') return 1;

                if (defender.id === 'knight' && attacker.dmgType === 'arrow') {
                    dmg = Math.floor(dmg * 0.1);
                }

                if (defender.id === 'ent' && attacker.dmgType === 'phys') {
                    dmg = Math.floor(dmg * 0.2);
                }

                if (attacker.id === 'ballista') {
                    if (defender.id === 'ent') dmg *= 3;
                    if (defender.id === 'dragon') dmg *= 2;
                }

                if (defender.armor > 0) {
                    let block = Math.min(defender.armor, dmg);
                    dmg -= block;
                }

                return Math.max(1, dmg);
            }

            executeAttack(attacker, defender) {
                const dmg = this.calculateDamage(attacker, defender);
                defender.hp -= dmg;
                
                if (attacker.id === 'vampire') {
                    attacker.hp = Math.min(attacker.maxHp, attacker.hp + dmg);
                }

                if (defender.hp <= 0) {
                    this.grid[defender.y][defender.x].unit = null;
                }
            }

            endTurn() {
                this.clearHighlights();
                document.getElementById('damage-preview').classList.add('hidden');
                document.getElementById('actions').innerHTML = '';
                this.renderGrid();
                this.nextTurn();
            }

            executeAI() {
                const me = this.activeUnit;
                const enemies = this.units.filter(u => u.team === 'player' && u.hp > 0);
                if (enemies.length === 0) return;

                let target = enemies.find(e => Math.max(Math.abs(me.x - e.x), Math.abs(me.y - e.y)) <= me.range);
                
                if (target) {
                    this.executeAttack(me, target);
                } else {
                    let moveY = me.y < ROWS/2 ? me.y + me.move : me.y - me.move;
                    if (moveY >= 0 && moveY < ROWS && !this.grid[moveY][me.x].unit) {
                        this.grid[me.y][me.x].unit = null;
                        me.y = moveY;
                        this.grid[me.y][me.x].unit = me;
                    }
                }
                this.endTurn();
            }

            showActions() {
                const panel = document.getElementById('actions');
                panel.innerHTML = '';

                const btnMove = document.createElement('button');
                btnMove.innerText = 'Движение';
                btnMove.onclick = () => { 
                    this.selectedAction = 'move'; 
                    this.actionTarget = null;
                    document.getElementById('damage-preview').classList.add('hidden');
                    this.highlightMoveZone(); 
                };
                panel.appendChild(btnMove);

                const btnAttack = document.createElement('button');
                btnAttack.innerText = 'Атака';
                btnAttack.onclick = () => { 
                    this.selectedAction = 'attack'; 
                    this.actionTarget = null;
                    this.highlightAttackZone(); 
                };
                panel.appendChild(btnAttack);
            }

            highlightMoveZone() {
                this.clearHighlights();
                const {x, y, move} = this.activeUnit;
                for (let dy = -move; dy <= move; dy++) {
                    for (let dx = -move; dx <= move; dx++) {
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
                            if (!this.grid[ny][nx].unit) {
                                this.grid[ny][nx].element.classList.add('highlight-move');
                            }
                        }
                    }
                }
                this.grid[y][x].element.classList.add('highlight-active');
            }

            highlightAttackZone() {
                this.clearHighlights();
                const {x, y, range} = this.activeUnit;
                for (let dy = -range; dy <= range; dy++) {
                    for (let dx = -range; dx <= range; dx++) {
                        const nx = x + dx, ny = y + dy;
                        if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS) {
                            if (this.grid[ny][nx].unit && this.grid[ny][nx].unit.team !== this.activeUnit.team) {
                                this.grid[ny][nx].element.classList.add('highlight-attack');
                            }
                        }
                    }
                }
                this.grid[y][x].element.classList.add('highlight-active');
            }

            clearHighlights() {
                document.querySelectorAll('.cell').forEach(c => {
                    c.classList.remove('highlight-move', 'highlight-attack', 'highlight-summon', 'highlight-active');
                });
            }

            renderGrid() {
                for (let y = 0; y < ROWS; y++) {
                    for (let x = 0; x < COLS; x++) {
                        const cellObj = this.grid[y][x];
                        cellObj.element.innerHTML = '';
                        
                        if (cellObj.unit) {
                            const u = cellObj.unit;
                            const uDiv = document.createElement('div');
                            uDiv.className = `unit ${u.team}`;
                            uDiv.innerText = u.icon;
                            
                            const hpBar = document.createElement('div');
                            hpBar.className = 'hp-bar';
                            const hpFill = document.createElement('div');
                            hpFill.className = 'hp-fill';
                            hpFill.style.width = `${(u.hp / u.maxHp) * 100}%`;
                            hpBar.appendChild(hpFill);
                            
                            uDiv.appendChild(hpBar);
                            cellObj.element.appendChild(uDiv);
                        }
                    }
                }
            }
        }

        window.onload = () => {
            new GameEngine();
        };
    </script>
</body>
</html>
