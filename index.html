<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цитадели: Пошаговый Баланс</title>
    <style>
        :root {
            --bg-main: #090807;
            --bg-panel: #14100c;
            --border-gold: #c89b3c;
            --border-dark: #3a2b1d;
            --text-gold: #f3d179;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; user-select: none; }
        body { background: var(--bg-main); color: #d8c8b8; display: flex; flex-direction: column; align-items: center; padding: 4px; min-height: 100vh; }
        h1 { color: var(--text-gold); font-size: 13px; text-align: center; margin-bottom: 4px; }

        .wrapper { display: flex; flex-direction: column; gap: 4px; width: 100%; max-width: 520px; background: var(--bg-panel); border: 1.5px solid var(--border-gold); padding: 5px; border-radius: 8px; }

        .res-bar { display: flex; justify-content: space-around; background: #000; border: 1px solid var(--border-dark); padding: 4px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        .gold { color: #f1c40f; } .stone { color: #95a5a6; }

        #timeline-bar { background: #080604; border: 1px solid var(--border-gold); padding: 3px; border-radius: 5px; display: flex; gap: 4px; overflow-x: auto; align-items: center; min-height: 38px; }
        .timeline-item { background: #1a130d; border: 1px solid var(--border-dark); border-radius: 4px; padding: 2px 4px; display: flex; flex-direction: column; align-items: center; font-size: 8px; min-width: 36px; flex-shrink: 0; }
        .timeline-item.active { border-color: #2ecc71; background: #0e2a14; box-shadow: 0 0 6px #2ecc71; }
        .timeline-item.enemy { border-color: #7f1d1d; }

        #board { display: grid; grid-template-columns: repeat(13, minmax(0, 1fr)); gap: 1px; background: #040302; padding: 2px; border: 1.5px solid var(--border-dark); border-radius: 5px; width: 100%; }
        .cell { aspect-ratio: 1 / 1; background: #15100b; border: 1px solid #221810; border-radius: 2px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; position: relative; cursor: pointer; overflow: hidden; }
        .cell.reachable { background: #112818; border-color: #2ecc71; }
        .cell.citadel-cell { background: #2c1e12; border-color: #8e44ad; }
        .cell.citadel-enemy { background: #3a121d; border-color: #c0392b; }

        .unit { font-size: calc(10px + 0.5vw); text-align: center; margin: auto; line-height: 1; }
        .unit-badge { background: rgba(0,0,0,0.85); border-radius: 2px; padding: 0 1px; font-size: 6.5px; font-weight: bold; width: 100%; text-align: center; }
        .player-unit .unit-badge { color: #3498db; }
        .enemy-unit .unit-badge { color: #e74c3c; }

        #log-box { width: 100%; height: 50px; background: #050403; border: 1px solid var(--border-dark); border-radius: 4px; padding: 3px 5px; overflow-y: auto; font-size: 8.5px; display: flex; flex-direction: column; gap: 1px; }
        .log-hit { color: #e74c3c; } .log-skill { color: #f1c40f; } .log-move { color: #3498db; } .log-heal { color: #2ecc71; }

        .panel-box { background: #0d0a07; border: 1px solid var(--border-dark); border-radius: 5px; padding: 4px; }
        .shop-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 2px; margin-top: 4px; }
        .shop-btn { background: #1a130d; border: 1px solid var(--border-dark); border-radius: 3px; padding: 2px 1px; display: flex; flex-direction: column; align-items: center; cursor: pointer; font-size: 7px; color: #ccc; }
        .shop-btn.selected { border-color: #2ecc71; background: #102414; }
        .shop-btn.disabled { opacity: 0.3; cursor: not-allowed; }

        .skills-container { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .btn-skill { background: linear-gradient(180deg, #d35400 0%, #a04000 100%); border: 1px solid #f39c12; color: #fff; font-weight: bold; padding: 3px 6px; border-radius: 3px; cursor: pointer; font-size: 8px; }
        .btn { background: linear-gradient(180deg, #c89b3c 0%, #8a651e 100%); border: none; color: #000; font-weight: bold; padding: 4px 6px; border-radius: 3px; cursor: pointer; font-size: 8.5px; }
        .btn-skip { background: linear-gradient(180deg, #7f8c8d 0%, #34495e 100%); color: #fff; }
    </style>
</head>
<body>

    <h1>🏰 ЦИТАДЕЛИ: ФАЗЫ И БАЛАНС</h1>

    <div class="wrapper">
        <div class="res-bar">
            <div class="gold">💰 <span id="res-gold">150</span></div>
            <div class="stone">🪨 <span id="res-stone">100</span></div>
            <div style="color:#e74c3c">🏰 Враг: <span id="enemy-cit-hp">500</span></div>
            <div style="color:#3498db">🏰 Вы: <span id="player-cit-hp">500</span></div>
        </div>

        <div style="font-size: 8.5px; color: var(--text-gold); display:flex; justify-content:space-between; align-items:center;">
            <span id="phase-status">⏳ ОЧЕРЕДЬ ХОДОВ:</span>
            <button class="btn btn-skip" id="btn-end-turn" onclick="passTurn()">ЗАВЕРШИТЬ ХОД ⏩</button>
        </div>

        <div id="timeline-bar"></div>
        <div id="board"></div>
        <div id="log-box"></div>

        <div class="panel-box">
            <div id="unit-details" style="font-size: 8.5px; min-height: 38px;">
                Выберите юнита на поле для просмотра информации.
            </div>
            <div id="skills-panel" class="skills-container"></div>
        </div>

        <div class="panel-box">
            <div id="shop-title" style="font-size:8.5px; color:var(--text-gold); font-weight:bold;">
                🔒 НАЙМ ДОСТУПЕН ТОЛЬКО В ХОД ЦИТАДЕЛИ
            </div>
            <div class="shop-grid" id="shop-list"></div>
        </div>
    </div>

    <script>
        const GRID_W = 13, GRID_H = 15;

        const UNITS_DB = {
            citadel_player: { name:'Ваша Цитадель', icon:'🏰', hp:500, dmg:0, move:0, range:0, init:20, desc:'Приносит +40💰 и +25🪨. Фаза строительства.' },
            citadel_enemy:  { name:'Цитадель Врага', icon:'🏰', hp:500, dmg:0, move:0, range:0, init:20, desc:'Приносит ресурсы врагу.' },

            // Базовые юниты (доступны всегда)
            warrior: { name:'Воин', icon:'⚔️', costG:40, costS:0, hp:55, dmg:12, move:2, range:1, init:10, req: null, desc:'Базовый пехотинец.', skills: [{ id:'javelin', name:'🎯 Дротик', dmgMult:1.2 }] },
            archer: { name:'Лучник', icon:'🏹', costG:50, costS:0, hp:35, dmg:12, move:2, range:3, init:14, req: null, desc:'Мобильный стрелок.', skills: [{ id:'power_shot', name:'🎯 Дальний выстрел', dmgMult:1.4 }] },
            rider: { name:'Всадник', icon:'🐎', costG:65, costS:0, hp:65, dmg:16, move:4, range:1, init:17, req: null, desc:'Быстрый фланговый юнит.', skills: [{ id:'charge', name:'⚡ Наскок', dmgMult:1.3 }] },
            vampire: { name:'Вампир', icon:'🧛', costG:90, costS:10, hp:70, dmg:16, move:3, range:1, init:16, req: null, limit: 2, desc:'Восстанавливает HP (лимит 2 на поле).', skills: [{ id:'vamp_bite', name:'🩸 Укус', dmgMult:1.2 }] },

            // Продвинутые юниты (требуют наличии Базовых или ограничение)
            knight: { name:'Рыцарь', icon:'🛡️', costG:55, costS:15, hp:85, dmg:15, move:2, range:1, init:9, req: 'warrior', desc:'Танк (требует Воина на поле).', skills: [{ id:'defend', name:'🛡️ Оборона' }] },
            sniper: { name:'Снайпер', icon:'🎯', costG:65, costS:20, hp:45, dmg:18, move:2, range:4, init:15, req: 'archer', desc:'Дальнобойный (требует Лучника).', skills: [{ id:'headshot', name:'💥 Точный выстрел', dmgMult:1.5 }] },
            cavalry: { name:'Кавалерист', icon:'♞', costG:85, costS:25, hp:95, dmg:22, move:4, range:1, init:18, req: 'rider', desc:'Тяжелая кавалерия (требует Всадника).', skills: [{ id:'breakthrough', name:'💥 Прорыв', dmgMult:1.4 }] },
            
            // Элитные и Осадные юниты
            ballista: { name:'Баллиста', icon:'🏹', costG:75, costS:40, hp:50, dmg:18, move:1, range:3, init:6, req: null, desc:'Осадное орудие.', skills: [{ id:'pierce', name:'Залп по броне', dmgMult:1.2 }] },
            catapult: { name:'Катапульта', icon:'☄️', costG:95, costS:60, hp:70, dmg:30, move:1, range:5, init:4, req: 'ballista', desc:'Дальнобойная осада (требует Баллисту).', skills: [{ id:'boulder', name:'☄️ Валун', dmgMult:1.5 }] },
            elder_vampire: { name:'Древний Вампир', icon:'🦇', costG:130, costS:50, hp:100, dmg:24, move:3, range:1, init:20, req: 'vampire', limit: 1, desc:'Элитный мистик (требует Вампира, лимит 1).', skills: [{ id:'vamp_bite', name:'🩸 Жажда крови', dmgMult:1.4 }] }
        };

        const PLAYER_CITADEL = { x: 0, y: 11, w: 4, h: 4, hp: 500, maxHp: 500 };
        const ENEMY_CITADEL  = { x: 9, y: 0,  w: 4, h: 4, hp: 500, maxHp: 500 };

        let playerGold = 150, playerStone = 100;
        let enemyGold = 150, enemyStone = 100;
        let units = [];
        let activeUnit = null;
        let selectedShopKey = null;
        let selectedSkillMode = null;
        let isBuildPhase = false;

        function init() {
            createBoard();
            
            units.push({ id: 'cit_p', team: 'player', typeKey: 'citadel_player', hp: 500, maxHp: 500, x: 0, y: 11, delay: 0 });
            units.push({ id: 'cit_e', team: 'enemy', typeKey: 'citadel_enemy', hp: 500, maxHp: 500, x: 9, y: 0, delay: 0 });

            updateRes();
            renderShop();
            log("🎮 Игра началась! Наступает первый ход.", "log-skill");
            processNextTurn();
        }

        function updateRes() {
            document.getElementById('res-gold').innerText = playerGold;
            document.getElementById('res-stone').innerText = playerStone;
            document.getElementById('player-cit-hp').innerText = `${PLAYER_CITADEL.hp}/${PLAYER_CITADEL.maxHp}`;
            document.getElementById('enemy-cit-hp').innerText = `${ENEMY_CITADEL.hp}/${ENEMY_CITADEL.maxHp}`;
        }

        function createBoard() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            for (let y = 0; y < GRID_H; y++) {
                for (let x = 0; x < GRID_W; x++) {
                    const c = document.createElement('div');
                    c.className = 'cell';
                    c.dataset.x = x;
                    c.dataset.y = y;
                    c.onclick = () => handleCellClick(x, y);
                    b.appendChild(c);
                }
            }
        }

        function isCitadelCell(x, y, cit) { return x >= cit.x && x < cit.x + cit.w && y >= cit.y && y < cit.y + cit.h; }
        function getUnitAt(x, y) { return units.find(u => u.x === x && u.y === y && !u.typeKey.startsWith('citadel')); }

        function processNextTurn() {
            const activeUnits = units.filter(u => UNITS_DB[u.typeKey].init > 0);
            if (activeUnits.length === 0) return;

            activeUnits.sort((a, b) => a.delay - b.delay || UNITS_DB[b.typeKey].init - UNITS_DB[a.typeKey].init);
            activeUnit = activeUnits[0];

            selectedSkillMode = null;
            selectedShopKey = null;

            if (activeUnit.typeKey === 'citadel_player') {
                isBuildPhase = true;
                playerGold += 40; playerStone += 25;
                updateRes();
                log("🛠️ ФАЗА СТРОИТЕЛЬСТВА/НАЙМА! +40💰 и +25🪨 полученo.", "log-heal");
                document.getElementById('shop-title').innerText = "🔨 НАЙМ ЮНИТОВ (Выберите тип, затем подсвеченную клетку)";
                document.getElementById('phase-status').innerText = "🛠️ ФАЗА СТРОИТЕЛЬСТВА";
            } else if (activeUnit.typeKey === 'citadel_enemy') {
                isBuildPhase = false;
                enemyGold += 40; enemyStone += 25;
                updateRes();
                log("🏰 Враг получил ресурсы.", "log-hit");
                endAction(1.0);
                return;
            } else {
                isBuildPhase = false;
                document.getElementById('shop-title').innerText = "🔒 НАЙМ ДОСТУПЕН ТОЛЬКО В ХОД ЦИТАДЕЛИ";
                document.getElementById('phase-status').innerText = `⏳ ХОД: ${UNITS_DB[activeUnit.typeKey].name}`;
            }

            renderShop();
            renderTimeline();
            render();

            showUnitDetails(activeUnit);

            if (activeUnit.team === 'enemy' && !activeUnit.typeKey.startsWith('citadel')) {
                log(`Ход врага: ${UNITS_DB[activeUnit.typeKey].name}`, 'log-hit');
                setTimeout(runAITurn, 600);
            }
        }

        function endAction(costMultiplier = 1.0) {
            if (activeUnit) {
                const initVal = UNITS_DB[activeUnit.typeKey].init;
                activeUnit.delay += (100 / initVal) * costMultiplier;
            }
            processNextTurn();
        }

        function passTurn() {
            if (activeUnit && activeUnit.team === 'player') {
                if (isBuildPhase) {
                    log("Строительство завершено.", "log-move");
                    isBuildPhase = false;
                } else {
                    log(`${UNITS_DB[activeUnit.typeKey].name} пропустил ход.`, "log-move");
                }
                endAction(1.0);
            }
        }

        function handleCellClick(x, y) {
            const clickedUnit = getUnitAt(x, y);

            // Обработка покупок в фазу строительства
            if (isBuildPhase && selectedShopKey && !clickedUnit) {
                if (isAdjacentToCitadel(x, y, PLAYER_CITADEL)) {
                    buyUnit(selectedShopKey, x, y, 'player');
                    return;
                }
            }

            if (!activeUnit || activeUnit.team !== 'player' || isBuildPhase) {
                if (clickedUnit) showUnitDetails(clickedUnit);
                return;
            }

            if (selectedSkillMode) {
                executeSkill(selectedSkillMode, x, y);
                return;
            }

            if (isCitadelCell(x, y, ENEMY_CITADEL)) {
                if (canTarget(activeUnit, x, y)) {
                    attackCitadel(activeUnit, ENEMY_CITADEL);
                    endAction(1.0);
                    return;
                }
            }

            if (clickedUnit && clickedUnit.team === 'enemy') {
                if (canTarget(activeUnit, x, y)) {
                    attack(activeUnit, clickedUnit);
                    endAction(1.0);
                    return;
                }
            }

            if (!clickedUnit && !isCitadelCell(x, y, PLAYER_CITADEL) && !isCitadelCell(x, y, ENEMY_CITADEL)) {
                const reachable = getReachableCells(activeUnit);
                if (reachable.some(c => c.x === x && c.y === y)) {
                    activeUnit.x = x;
                    activeUnit.y = y;
                    log(`Перемещение выполнено.`, 'log-move');
                    endAction(1.0);
                    return;
                }
            }

            if (clickedUnit) showUnitDetails(clickedUnit);
        }

        function canBuy(key) {
            if (!isBuildPhase) return false;
            const db = UNITS_DB[key];
            if (playerGold < db.costG || playerStone < db.costS) return false;

            // Проверка требований (требуется юнит на поле)
            if (db.req) {
                const hasReq = units.some(u => u.team === 'player' && u.typeKey === db.req);
                if (!hasReq) return false;
            }

            // Проверка лимитов
            if (db.limit) {
                const count = units.filter(u => u.team === 'player' && u.typeKey === key).length;
                if (count >= db.limit) return false;
            }

            return true;
        }

        function buyUnit(key, x, y, team) {
            if (!canBuy(key)) return;

            const db = UNITS_DB[key];
            playerGold -= db.costG;
            playerStone -= db.costS;
            updateRes();

            units.push({
                id: Date.now(), team: team, typeKey: key,
                hp: db.hp, maxHp: db.hp, x: x, y: y, delay: activeUnit ? activeUnit.delay : 0
            });

            log(`Вы наняли: ${db.name}`, 'log-skill');
            selectedShopKey = null;
            renderShop();
            render();
        }

        function executeSkill(skill, targetX, targetY) {
            const uDb = UNITS_DB[activeUnit.typeKey];
            const targetUnit = getUnitAt(targetX, targetY);

            if (skill.id === 'defend') {
                activeUnit.isDefending = true;
                log(`🛡️ ${uDb.name} встал в Глухую Оборону!`, 'log-skill');
                endAction(1.0);
                return;
            }

            if (targetUnit && targetUnit.team === 'enemy') {
                let dmg = Math.round(uDb.dmg * (skill.dmgMult || 1.0));
                targetUnit.hp -= dmg;
                log(`✨ ${uDb.name} использовал ${skill.name} по ${UNITS_DB[targetUnit.typeKey].name} на ${dmg} урона!`, 'log-hit');

                if (skill.id === 'vamp_bite') {
                    const heal = Math.round(dmg * 0.6);
                    activeUnit.hp = Math.min(activeUnit.maxHp, activeUnit.hp + heal);
                    log(`🩸 Исцелено +${heal} HP!`, 'log-heal');
                }

                if (targetUnit.hp <= 0) {
                    units = units.filter(u => u !== targetUnit);
                    log(`💥 Враг уничтожен!`, 'log-hit');
                }

                endAction(1.0);
            }
        }

        function attack(attacker, defender) {
            const aDb = UNITS_DB[attacker.typeKey];
            let dmg = aDb.dmg;
            if (defender.isDefending) dmg = Math.round(dmg * 0.5);

            defender.hp -= dmg;
            log(`⚔️ ${aDb.name} наносит ${dmg} урона по ${UNITS_DB[defender.typeKey].name}`, 'log-hit');

            if (defender.hp <= 0) {
                log(`💥 Юнит уничтожен!`, 'log-hit');
                units = units.filter(u => u !== defender);
            }
        }

        function attackCitadel(attacker, citadel) {
            const aDb = UNITS_DB[attacker.typeKey];
            let dmg = aDb.dmg;
            citadel.hp = Math.max(0, citadel.hp - dmg);
            log(`💥 ${aDb.name} нанес ${dmg} урона по ЦИТАДЕЛИ!`, 'log-hit');
            updateRes();
        }

        function isAdjacentToCitadel(x, y, cit) {
            for (let cy = cit.y - 1; cy <= cit.y + cit.h; cy++) {
                for (let cx = cit.x - 1; cx <= cit.x + cit.w; cx++) {
                    if (Math.max(Math.abs(cx - x), Math.abs(cy - y)) <= 1 && !isCitadelCell(x, y, cit)) return true;
                }
            }
            return false;
        }

        function canTarget(attacker, tx, ty) {
            const db = UNITS_DB[attacker.typeKey];
            const dist = Math.abs(attacker.x - tx) + Math.abs(attacker.y - ty);
            return dist <= db.range;
        }

        function getReachableCells(unit) {
            const db = UNITS_DB[unit.typeKey];
            if (db.move === 0) return [];
            let reachable = [];
            for (let dy = -db.move; dy <= db.move; dy++) {
                for (let dx = -db.move; dx <= db.move; dx++) {
                    let nx = unit.x + dx, ny = unit.y + dy;
                    if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
                        if (Math.abs(dx) + Math.abs(dy) <= db.move && !getUnitAt(nx, ny)) {
                            reachable.push({x: nx, y: ny});
                        }
                    }
                }
            }
            return reachable;
        }

        function runAITurn() {
            if (!activeUnit || activeUnit.team !== 'enemy') return;
            const pUnits = units.filter(u => u.team === 'player' && u.x !== undefined && !u.typeKey.startsWith('citadel'));
            if (pUnits.length > 0) {
                let target = pUnits[0];
                if (canTarget(activeUnit, target.x, target.y)) {
                    attack(activeUnit, target);
                } else {
                    activeUnit.x = Math.max(0, activeUnit.x - 1);
                }
            }
            endAction(1.0);
        }

        function showUnitDetails(unit) {
            const db = UNITS_DB[unit.typeKey];
            const sPanel = document.getElementById('skills-panel');
            sPanel.innerHTML = '';

            let html = `<b>${db.icon} ${db.name} (${unit.team === 'player' ? 'Ваш' : 'Враг'})</b> | HP: ${unit.hp}/${unit.maxHp} | ⚡Инициатива: ${db.init}<br>`;
            html += `<span style="color:#f39c12">${db.desc}</span>`;
            document.getElementById('unit-details').innerHTML = html;

            if (unit.team === 'player' && db.skills && !isBuildPhase) {
                db.skills.forEach(sk => {
                    const btn = document.createElement('button');
                    btn.className = 'btn-skill';
                    btn.innerText = `${sk.name}`;
                    btn.onclick = () => {
                        selectedSkillMode = sk;
                        log(`Выбран скилл: ${sk.name}. Нажмите на цель!`, 'log-skill');
                    };
                    sPanel.appendChild(btn);
                });
            }
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            Object.keys(UNITS_DB).filter(k => !k.startsWith('citadel')).forEach(k => {
                const db = UNITS_DB[k];
                const btn = document.createElement('div');
                const allowed = canBuy(k);
                btn.className = `shop-btn ${selectedShopKey === k ? 'selected' : ''} ${!allowed ? 'disabled' : ''}`;
                btn.onclick = () => {
                    if (allowed) {
                        selectedShopKey = (selectedShopKey === k) ? null : k;
                        renderShop();
                        render();
                    }
                };
                btn.innerHTML = `<div style="font-size:11px">${db.icon}</div><div>${db.costG}💰</div>`;
                list.appendChild(btn);
            });
        }

        function renderTimeline() {
            const bar = document.getElementById('timeline-bar');
            bar.innerHTML = '';
            const activeUnits = units.filter(u => UNITS_DB[u.typeKey].init > 0);
            activeUnits.forEach((u, idx) => {
                const db = UNITS_DB[u.typeKey];
                const item = document.createElement('div');
                item.className = `timeline-item ${idx === 0 ? 'active' : ''} ${u.team === 'enemy' ? 'enemy' : ''}`;
                item.innerHTML = `<div>${db.icon}</div><b>⚡${db.init}</b>`;
                bar.appendChild(item);
            });
        }

        function render() {
            document.querySelectorAll('.cell').forEach(c => {
                const x = parseInt(c.dataset.x), y = parseInt(c.dataset.y);
                c.className = 'cell';

                if (isCitadelCell(x, y, PLAYER_CITADEL)) c.classList.add('citadel-cell');
                if (isCitadelCell(x, y, ENEMY_CITADEL)) c.classList.add('citadel-enemy');

                if (isBuildPhase && selectedShopKey && isAdjacentToCitadel(x, y, PLAYER_CITADEL) && !getUnitAt(x, y)) {
                    c.classList.add('reachable');
                }
            });

            if (!isBuildPhase && activeUnit && activeUnit.team === 'player' && !activeUnit.typeKey.startsWith('citadel')) {
                const reachable = getReachableCells(activeUnit);
                reachable.forEach(rc => {
                    const c = document.querySelector(`.cell[data-x="${rc.x}"][data-y="${rc.y}"]`);
                    if (c) c.classList.add('reachable');
                });
            }

            units.forEach(u => {
                if (u.x !== undefined && u.y !== undefined && !u.typeKey.startsWith('citadel')) {
                    const c = document.querySelector(`.cell[data-x="${u.x}"][data-y="${u.y}"]`);
                    if (c) {
                        c.classList.add(u.team === 'player' ? 'player-unit' : 'enemy-unit');
                        c.innerHTML = `<div class="unit-badge">${u.hp}/${u.maxHp}</div><div class="unit">${UNITS_DB[u.typeKey].icon}</div>`;
                    }
                }
            });
        }

        function log(text, className = '') {
            const box = document.getElementById('log-box');
            const entry = document.createElement('div');
            if (className) entry.className = className;
            entry.innerText = text;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
        }

        init();
    </script>
</body>
</html>
