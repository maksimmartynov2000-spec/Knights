<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Средневековье - Тактическая битва</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 { margin-bottom: 5px; color: #d4af37; text-shadow: 2px 2px 4px #000; }
        
        #game-container {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            align-items: flex-start;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 55px);
            grid-template-rows: repeat(12, 55px);
            gap: 2px;
            background-color: #333;
            border: 4px solid #d4af37;
            border-radius: 6px;
            padding: 4px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .cell {
            width: 55px;
            height: 55px;
            background-color: #2c2c2c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            border-radius: 3px;
            user-select: none;
            transition: background-color 0.2s;
        }

        .cell:hover { background-color: #3a3a3a; }

        /* Подсветки ходов и атак */
        .cell.highlight-move {
            background-color: rgba(46, 204, 113, 0.4) !important;
            box-shadow: inset 0 0 8px rgba(46, 204, 113, 0.8);
        }

        .cell.highlight-attack {
            box-shadow: inset 0 0 0 3px #e74c3c;
            background-color: rgba(231, 76, 60, 0.3) !important;
        }

        /* Юниты */
        .unit {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 11px;
            position: absolute;
            box-shadow: 0 3px 6px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .unit.player { background: linear-gradient(135deg, #2980b9, #1f618d); border: 2px solid #5dade2; color: white; }
        .unit.enemy { background: linear-gradient(135deg, #c0392b, #922b21); border: 2px solid #ec7063; color: white; }
        .unit.selected { box-shadow: 0 0 10px 3px #f1c40f; transform: scale(1.05); }

        .unit-hp {
            font-size: 9px;
            background: rgba(0,0,0,0.7);
            padding: 1px 4px;
            border-radius: 4px;
            margin-top: 2px;
        }

        /* Боковая панель */
        #sidebar {
            width: 320px;
            background: #252525;
            border: 2px solid #444;
            border-radius: 6px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        #log {
            height: 180px;
            background: #151515;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px;
            overflow-y: auto;
            font-size: 12px;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .panel-section { margin-bottom: 15px; }
        .panel-section h3 { margin: 0 0 8px 0; font-size: 15px; color: #d4af37; border-bottom: 1px solid #444; padding-bottom: 4px; }

        button {
            background-color: #d4af37;
            color: #1a1a1a;
            border: none;
            padding: 8px 12px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 6px;
            transition: background 0.2s;
        }

        button:hover:not(:disabled) { background-color: #f39c12; }
        button:disabled { background-color: #555; color: #888; cursor: not-allowed; }

        .ability-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        #turn-info {
            font-size: 16px;
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 10px;
            text-align: center;
            background: #1c1c1c;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #444;
        }
    </style>
</head>
<body>

    <h1>Средневековье: Битва героев</h1>
    <div id="turn-info">Инициализация игры...</div>

    <div id="game-container">
        <div id="board"></div>

        <div id="sidebar">
            <div class="panel-section">
                <h3>Информация о юните</h3>
                <div id="unit-info">Выберите юнита на поле</div>
            </div>

            <div class="panel-section" id="abilities-section" style="display:none;">
                <h3>Способности</h3>
                <div id="abilities-list"></div>
            </div>

            <div class="panel-section">
                <h3>Журнал боя</h3>
                <div id="log"></div>
            </div>

            <button id="end-turn-btn" onclick="endCurrentUnitTurn()" disabled>Пропустить ход</button>
        </div>
    </div>

<script>
    const ROWS = 12;
    const COLS = 8;
    let board = [];
    let units = [];
    let currentUnitIndex = 0;
    let selectedUnit = null;
    let turnQueue = [];
    let gameActive = false;
    let activeAction = null; // 'move', 'spear', 'buff', 'stun'

    // Конструктор типов юнитов
    const UNIT_TYPES = {
        swordsman: {
            name: 'Мечник',
            maxHp: 20,
            damage: 10,
            initiative: 8,
            speed: 2,
            range: 1,
            type: 'melee',
            symbol: '⚔️'
        },
        archer: {
            name: 'Лучник',
            maxHp: 20,
            damage: 10,
            initiative: 15,
            speed: 3,
            range: 4,
            type: 'ranged',
            symbol: '🏹'
        }
    };

    function initGame() {
        units = [];
        // Расстановка ИИ (верхние 3 строки: 0, 1, 2)
        let aiSetup = [
            { type: 'archer', r: 0, c: 1 },
            { type: 'swordsman', r: 0, c: 2 },
            { type: 'swordsman', r: 0, c: 5 },
            { type: 'archer', r: 0, c: 6 },
            { type: 'swordsman', r: 1, c: 3 },
            { type: 'swordsman', r: 1, c: 4 }
        ];

        aiSetup.forEach((data, index) => {
            units.push(createUnit(data.type, 'enemy', data.r, data.c, `ИИ ${index+1}`));
        });

        // Расстановка игрока (нижние 3 строки: 9, 10, 11)
        let playerSetup = [
            { type: 'swordsman', r: 11, c: 2 },
            { type: 'swordsman', r: 11, c: 3 },
            { type: 'swordsman', r: 11, c: 4 },
            { type: 'swordsman', r: 11, c: 5 },
            { type: 'archer', r: 10, c: 2 },
            { type: 'archer', r: 10, c: 5 }
        ];

        playerSetup.forEach((data, index) => {
            units.push(createUnit(data.type, 'player', data.r, data.c, `Игрок ${index+1}`));
        });

        createBoardDOM();
        startNewRound();
        gameActive = true;
    }

    function createUnit(typeKey, team, r, c, name) {
        let base = UNIT_TYPES[typeKey];
        return {
            id: Math.random().toString(36.substring(2, 9)),
            name: name,
            typeKey: typeKey,
            team: team, // 'player' или 'enemy'
            r: r,
            c: c,
            hp: base.maxHp,
            maxHp: base.maxHp,
            damage: base.damage,
            initiative: base.initiative,
            speed: base.speed,
            range: base.range,
            symbol: base.symbol,
            isAlive: true,
            hasMoved: false,
            hasActed: false,
            // Перезарядки и эффекты
            cooldowns: { spear: 0, buff: 0, heal: 0, rage: 0, stun: 0 },
            buffs: { regenDuration: 0, regenValue: 0, rageDuration: 0, rageValue: 0, customDefenseDuration: 0, customDefenseVal: 0 },
            stunned: false
        };
    }

    function createBoardDOM() {
        const boardEl = document.getElementById('board');
        boardEl.innerHTML = '';
        for (let r = 0; r < ROWS; r++) {
            board[r] = [];
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.r = r;
                cell.dataset.c = c;
                cell.addEventListener('click', () => handleCellClick(r, c));
                boardEl.appendChild(cell);
                board[r][c] = cell;
            }
        }
        renderBoard();
    }

    function renderBoard() {
        // Очищаем отображение юнитов
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                board[r][c].innerHTML = '';
                board[r][c].classList.remove('highlight-move', 'highlight-attack');
            }
        }

        // Рендерим живых юнитов
        units.forEach(u => {
            if (!u.isAlive) return;
            const unitEl = document.createElement('div');
            unitEl.className = `unit ${u.team} ${selectedUnit === u ? 'selected' : ''}`;
            unitEl.innerHTML = `<span>${u.symbol}</span><span class="unit-hp">${u.hp}</span>`;
            board[u.r][u.c].appendChild(unitEl);
        });

        updateSidebar();
    }

    function startNewRound() {
        // Фильтрация живых и сортировка по инициативе (убывание)
        turnQueue = units.filter(u => u.isAlive).sort((a, b) => b.initiative - a.initiative);
        currentUnitIndex = 0;
        
        logMessage("--- Начинается новый раунд ---");
        nextTurn();
    }

    function nextTurn() {
        // Проверка победы
        let playerAlive = units.some(u => u.team === 'player' && u.isAlive);
        let enemyAlive = units.some(u => u.team === 'enemy' && u.isAlive);

        if (!playerAlive) {
            alert("Поражение! Все ваши воины пали.");
            gameActive = false;
            return;
        }
        if (!enemyAlive) {
            alert("Победа! Вы уничтожили армию противника.");
            gameActive = false;
            return;
        }

        if (currentUnitIndex >= turnQueue.length) {
            startNewRound();
            return;
        }

        let unit = turnQueue[currentUnitIndex];

        // Проверка: жив ли юнит в очереди
        if (!unit.isAlive) {
            currentUnitIndex++;
            nextTurn();
            return;
        }

        // Сброс флагов хода
        unit.hasMoved = false;
        unit.hasActed = false;

        // Обработка длительных эффектов в начале хода
        processTurnEffects(unit);

        if (unit.stunned) {
            logMessage(`${unit.name} (${unit.team === 'player' ? 'Игрок' : 'ИИ'}) оглушен и пропускает ход!`);
            unit.stunned = false;
            endCurrentUnitTurn();
            return;
        }

        // Подсветка текущего хода
        document.getElementById('turn-info').innerText = `Ходит: ${unit.name} (${unit.team === 'player' ? 'Ваш' : 'Противник'})`;

        if (unit.team === 'player') {
            selectedUnit = unit;
            renderBoard();
            showActionOptions(unit);
            // По умолчанию автоматически показываем зоны перемещения, если еще не ходил
            if (!unit.hasMoved) {
                showMoveRange(unit);
            }
        } else {
            selectedUnit = unit;
            renderBoard();
            document.getElementById('abilities-section').style.display = 'none';
            document.getElementById('end-turn-btn').disabled = true;
            // Ход ИИ с небольшой задержкой для визуализации
            setTimeout(aiTurn, 600);
        }
    }

    function processTurnEffects(unit) {
        // Регенерация (Лечение мечника)
        if (unit.buffs.regenDuration > 0) {
            let healAmt = unit.buffs.regenValue;
            unit.hp = Math.min(unit.maxHp, unit.hp + healAmt);
            unit.buffs.regenDuration--;
            logMessage(`${unit.name} восстанавливает ${healAmt} HP за счет регенерации.`);
        }
        // Ярость
        if (unit.buffs.rageDuration > 0) {
            unit.buffs.rageDuration--;
            if (unit.buffs.rageDuration === 0) {
                unit.damage -= unit.buffs.rageValue;
                logMessage(`Эффект ярости у ${unit.name} закончился.`);
            }
        }
        // Кастомная защита от Укрепления
        if (unit.buffs.customDefenseDuration > 0) {
            unit.buffs.customDefenseDuration--;
        }
    }

    function endCurrentUnitTurn() {
        if (!gameActive) return;
        let unit = turnQueue[currentUnitIndex];

        // Пассивная способность мечника "Живой": лечится на 20% от макс HP, если пропускает ход
        if (unit.typeKey === 'swordsman' && !unit.hasMoved && !unit.hasActed) {
            let healAmount = Math.round(unit.maxHp * 0.2);
            unit.hp = Math.min(unit.maxHp, unit.hp + healAmount);
            logMessage(`${unit.name} пропустил ход и исцелился на ${healAmount} HP (Живой).`);
        }

        selectedUnit = null;
        activeAction = null;
        currentUnitIndex++;
        nextTurn();
    }

    // --- Логика перемещения и подсветки ---
    function handleCellClick(r, c) {
        if (!gameActive || !selectedUnit || selectedUnit.team !== 'player') return;

        let targetUnit = getUnitAt(r, c);

        // Если выбран режим движения
        if (activeAction === 'move') {
            if (board[r][c].classList.contains('highlight-move') && !targetUnit) {
                selectedUnit.r = r;
                selectedUnit.c = c;
                selectedUnit.hasMoved = true;
                activeAction = null;
                renderBoard();
                showActionOptions(selectedUnit);
            }
            return;
        }

        // Если выбран режим атаки (клик по врагу)
        if (activeAction === 'attack') {
            if (targetUnit && targetUnit.team !== selectedUnit.team && board[r][c].classList.contains('highlight-attack')) {
                executeAttack(selectedUnit, targetUnit);
                activeAction = null;
                renderBoard();
                showActionOptions(selectedUnit);
            }
            return;
        }

        // Режим активной способности: Бросить копье (в противника дальностью 3)
        if (activeAction === 'spear') {
            if (targetUnit && targetUnit.team !== selectedUnit.team && board[r][c].classList.contains('highlight-attack')) {
                executeSpear(selectedUnit, targetUnit);
                activeAction = null;
                renderBoard();
                showActionOptions(selectedUnit);
            }
            return;
        }

        // Режим активной способности: Укрепление (в дружественного в дальности 2)
        if (activeAction === 'buff') {
            if (targetUnit && targetUnit.team === selectedUnit.team && board[r][c].classList.contains('highlight-move')) {
                executeReinforce(selectedUnit, targetUnit);
                activeAction = null;
                renderBoard();
                showActionOptions(selectedUnit);
            }
            return;
        }

        // Режим активной способности: Оглушение (в противника дальностью 1)
        if (activeAction === 'stun') {
            if (targetUnit && targetUnit.team !== selectedUnit.team && board[r][c].classList.contains('highlight-attack')) {
                executeStun(selectedUnit, targetUnit);
                activeAction = null;
                renderBoard();
                showActionOptions(selectedUnit);
            }
            return;
        }

        // Обычный клик по своему юниту для выбора
        if (targetUnit && targetUnit.team === 'player' && targetUnit === selectedUnit) {
            if (!targetUnit.hasMoved) {
                showMoveRange(targetUnit);
            }
        }
    }

    function showMoveRange(unit) {
        if (unit.hasMoved) return;
        activeAction = 'move';
        renderBoard();

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                // Квадратная зона перемещения (Чебышевское расстояние <= speed)
                let dist = Math.max(Math.abs(r - unit.r), Math.abs(c - unit.c));
                if (dist > 0 && dist <= unit.speed && !getUnitAt(r, c)) {
                    board[r][c].classList.add('highlight-move');
                }
            }
        }
    }

    function showAttackRange(unit) {
        if (unit.hasActed) return;
        activeAction = 'attack';
        renderBoard();

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                let dist = Math.max(Math.abs(r - unit.r), Math.abs(c - unit.c));
                if (dist > 0 && dist <= unit.range) {
                    let target = getUnitAt(r, c);
                    if (target && target.team !== unit.team) {
                        board[r][c].classList.add('highlight-attack');
                    }
                }
            }
        }
    }

    // --- Боевая система и расчет защиты ---
    function getUnitAt(r, c) {
        return units.find(u => u.isAlive && u.r === r && u.c === c);
    }

    function calculateTotalDefense(defender, attackType) {
        // attackType: 'melee' или 'ranged'
        let baseDefense = 0;
        
        if (defender.typeKey === 'swordsman') {
            // Пассивка Щит (от стрел) и Броня (от ближнего боя)
            baseDefense += (attackType === 'ranged') ? 60 : 50;
            
            // Пассивка Строй (+10% к щиту/броне за каждого соседнего мечника)
            let adjacentSwordsmen = 0;
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    let neighbor = getUnitAt(defender.r + dr, defender.c + dc);
                    if (neighbor && neighbor.team === defender.team && neighbor.typeKey === 'swordsman' && neighbor.isAlive) {
                        adjacentSwordsmen++;
                    }
                }
            }
            baseDefense += adjacentSwordsmen * 10;
        }

        // Пассивка Защитник у других соседних мечников (+20% к защите наземных юнитов)
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dr === 0) continue;
                let neighbor = getUnitAt(defender.r + dr, defender.c + dc);
                if (neighbor && neighbor.team === defender.team && neighbor.typeKey === 'swordsman' && neighbor.isAlive) {
                    baseDefense += 20;
                }
            }
        }

        // Дополнительный бонус от Укрепления союзника
        if (defender.buffs.customDefenseDuration > 0) {
            baseDefense += defender.buffs.customDefenseVal;
        }

        return Math.min(90, baseDefense); // Ограничим максимум защиты 90%
    }

    function executeAttack(attacker, defender) {
        attacker.hasActed = true;
        let attackType = (attacker.typeKey === 'archer') ? 'ranged' : 'melee';
        let defensePercent = calculateTotalDefense(defender, attackType);
        
        let finalDamage = Math.round(attacker.damage * (1 - defensePercent / 100));
        finalDamage = Math.max(1, finalDamage); // Минимум 1 урон

        defender.hp -= finalDamage;
        logMessage(`${attacker.name} атакует ${defender.name} (${attackType === 'ranged' ? 'стрельба' : 'ближний бой'}). Урон: ${finalDamage} (Защита: ${defensePercent}%)`);

        if (defender.hp <= 0) {
            defender.hp = 0;
            defender.isAlive = false;
            logMessage(`${defender.name} пал в бою!`);
        }
    }

    // --- Активные способности ---
    function useAbility(abilityName) {
        if (!selectedUnit || selectedUnit.team !== 'player') return;
        let u = selectedUnit;

        if (abilityName === 'spear') {
            if (u.cooldowns.spear > 0) return;
            activeAction = 'spear';
            renderBoard();
            // Подсветка врагов в радиусе 3
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let dist = Math.max(Math.abs(r - u.r), Math.abs(c - u.c));
                    if (dist > 0 && dist <= 3) {
                        let target = getUnitAt(r, c);
                        if (target && target.team !== u.team) {
                            board[r][c].classList.add('highlight-attack');
                        }
                    }
                }
            }
            logMessage(`${u.name}: выберите цель для броска копья (дальность 3).`);
        } 
        else if (abilityName === 'buff') {
            if (u.cooldowns.buff > 0) return;
            activeAction = 'buff';
            renderBoard();
            // Подсветка союзников в дальности 2
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let dist = Math.max(Math.abs(r - u.r), Math.abs(c - u.c));
                    if (dist > 0 && dist <= 2) {
                        let target = getUnitAt(r, c);
                        if (target && target.team === u.team) {
                            board[r][c].classList.add('highlight-move');
                        }
                    }
                }
            }
            logMessage(`${u.name}: выберите союзника для укрепления (дальность 2).`);
        }
        else if (abilityName === 'heal') {
            if (u.cooldowns.heal > 0) return;
            u.buffs.regenDuration = 5;
            u.buffs.regenValue = 5;
            u.cooldowns.heal = 10;
            u.hasActed = true;
            logMessage(`${u.name} использует Лечение (+5 HP/ход на 5 ходов).`);
            renderBoard();
            showActionOptions(u);
        }
        else if (abilityName === 'rage') {
            if (u.cooldowns.rage > 0) return;
            u.buffs.rageDuration = 3;
            u.buffs.rageValue = 5;
            u.damage += 5;
            u.cooldowns.rage = 6;
            u.hasActed = true;
            logMessage(`${u.name} впадает в Ярость (+5 урона на 3 хода).`);
            renderBoard();
            showActionOptions(u);
        }
        else if (abilityName === 'stun') {
            if (u.cooldowns.stun > 0) return;
            activeAction = 'stun';
            renderBoard();
            // Подсветка врагов в дальности 1
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    let dist = Math.max(Math.abs(r - u.r), Math.abs(c - u.c));
                    if (dist === 1) {
                        let target = getUnitAt(r, c);
                        if (target && target.team !== u.team) {
                            board[r][c].classList.add('highlight-attack');
                        }
                    }
                }
            }
            logMessage(`${u.name}: выберите врага для оглушения (дальность 1).`);
        }
    }

    function executeSpear(attacker, defender) {
        attacker.hasActed = true;
        attacker.cooldowns.spear = 3;
        let damage = 10;
        defender.hp -= damage;
        logMessage(`${attacker.name} бросает копье в ${defender.name} нанеся ${damage} урона!`);
        if (defender.hp <= 0) {
            defender.hp = 0;
            defender.isAlive = false;
            logMessage(`${defender.name} погиб от броска копья!`);
        }
    }

    function executeReinforce(caster, target) {
        caster.hasActed = true;
        caster.cooldowns.buff = 4;
        target.buffs.customDefenseDuration = 2;
        target.buffs.customDefenseVal = 30;
        logMessage(`${caster.name} укрепляет ${target.name} (+30% защиты на 2 хода).`);
    }

    function executeStun(attacker, defender) {
        attacker.hasActed = true;
        attacker.cooldowns.stun = 4;
        defender.stunned = true;
        logMessage(`${attacker.name} оглушает ${defender.name}! Противник пропустит следующий ход.`);
    }

    // Уменьшение кулдаунов в начале хода юнита
    function decrementCooldowns(unit) {
        for (let key in unit.cooldowns) {
            if (unit.cooldowns[key] > 0) unit.cooldowns[key]--;
        }
    }

    // --- Логика ИИ ---
    function aiTurn() {
        if (!gameActive) return;
        let ai = turnQueue[currentUnitIndex];
        if (!ai || !ai.isAlive) {
            currentUnitIndex++;
            nextTurn();
            return;
        }

        decrementCooldowns(ai);

        // 1. Поиск ближайшего врага
        let enemies = units.filter(u => u.team === 'player' && u.isAlive);
        if (enemies.length === 0) return;

        let targetEnemy = null;
        let minDistance = Infinity;

        enemies.forEach(e => {
            let dist = Math.max(Math.abs(e.r - ai.r), Math.abs(e.c - ai.c));
            if (dist < minDistance) {
                minDistance = dist;
                targetEnemy = e;
            }
        });

        // 2. Проверка возможности атаки с текущей позиции
        if (minDistance <= ai.range) {
            executeAttack(ai, targetEnemy);
        } else {
            // Движение в сторону врага
            let bestR = ai.r;
            let bestC = ai.c;
            let bestDist = minDistance;

            for (let dr = -ai.speed; dr <= ai.speed; dr++) {
                for (let dc = -ai.speed; dc <= ai.speed; dc++) {
                    let nr = ai.r + dr;
                    let nc = ai.c + dc;
                    let stepDist = Math.max(Math.abs(dr), Math.abs(dc));

                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && stepDist <= ai.speed) {
                        if (!getUnitAt(nr, nc)) {
                            let dToEnemy = Math.max(Math.abs(targetEnemy.r - nr), Math.abs(targetEnemy.c - nc));
                            if (dToEnemy < bestDist) {
                                bestDist = dToEnemy;
                                bestR = nr;
                                bestC = nc;
                            }
                        }
                    }
                }
            }

            ai.r = bestR;
            ai.c = bestC;
            logMessage(`ИИ переместил ${ai.name} на (${ai.r}, ${ai.c}).`);

            // Попытка атаковать после движения
            let newDist = Math.max(Math.abs(targetEnemy.r - ai.r), Math.abs(targetEnemy.c - ai.c));
            if (newDist <= ai.range) {
                executeAttack(ai, targetEnemy);
            }
        }

        renderBoard();
        // Завершение хода ИИ через паузу
        setTimeout(() => {
            currentUnitIndex++;
            nextTurn();
        }, 800);
    }

    // --- Интерфейс управления ---
    function updateSidebar() {
        let infoEl = document.getElementById('unit-info');
        let abSec = document.getElementById('abilities-section');
        let endBtn = document.getElementById('end-turn-btn');

        if (!selectedUnit) {
            infoEl.innerText = "Выберите юнита на поле";
            abSec.style.display = 'none';
            endBtn.disabled = true;
            return;
        }

        let u = selectedUnit;
        infoEl.innerHTML = `
            <b>Имя:</b> ${u.name} (${u.team === 'player' ? 'Ваш' : 'Враг'})<br>
            <b>Класс:</b> ${u.typeKey === 'swordsman' ? 'Мечник' : 'Лучник'}<br>
            <b>HP:</b> ${u.hp} / ${u.maxHp}<br>
            <b>Урон:</b> ${u.damage}<br>
            <b>Инициатива:</b> ${u.initiative} | <b>Скорость:</b> ${u.speed}<br>
            <b>Дальность атаки:</b> ${u.range}
        `;

        if (u.team === 'player' && u === turnQueue[currentUnitIndex]) {
            endBtn.disabled = false;
            if (u.typeKey === 'swordsman') {
                abSec.style.display = 'block';
                let list = document.getElementById('abilities-list');
                list.innerHTML = `
                    <button onclick="useAbility('spear')" ${u.cooldowns.spear > 0 ? 'disabled' : ''}>Копье (${u.cooldowns.spear})</button>
                    <button onclick="useAbility('buff')" ${u.cooldowns.buff > 0 ? 'disabled' : ''}>Укрепление (${u.cooldowns.buff})</button>
                    <button onclick="useAbility('heal')" ${u.cooldowns.heal > 0 ? 'disabled' : ''}>Лечение (${u.cooldowns.heal})</button>
                    <button onclick="useAbility('rage')" ${u.cooldowns.rage > 0 ? 'disabled' : ''}>Ярость (${u.cooldowns.rage})</button>
                    <button onclick="useAbility('stun')" ${u.cooldowns.stun > 0 ? 'disabled' : ''}>Оглушение (${u.cooldowns.stun})</button>
                `;
            } else {
                abSec.style.display = 'none';
            }
        } else {
            abSec.style.display = 'none';
            endBtn.disabled = true;
        }
    }

    function showActionOptions(unit) {
        // Если уже походил, но не атаковал - предлагаем атаку
        if (!unit.hasActed) {
            showAttackRange(unit);
        }
    }

    function logMessage(text) {
        const logEl = document.getElementById('log');
        logEl.innerHTML += `<div>> ${text}</div>`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    // Запуск игры при загрузке страницы
    window.onload = initGame;
</script>
