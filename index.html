<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Рыцари: Битва Героев (Mobile)</title>
    <style>
        :root {
            --bg-main: #0a0807;
            --bg-panel: #16120e;
            --border-gold: #c89b3c;
            --border-dark: #3a2a1d;
            --text-gold: #f3d179;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Georgia', serif; 
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-main);
            color: #e0d0c0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 6px;
        }

        h1 { 
            color: var(--text-gold); 
            text-shadow: 0 2px 6px rgba(0,0,0,0.8); 
            margin-bottom: 4px; 
            font-size: 16px; 
            text-align: center;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            max-width: 440px;
            background: var(--bg-panel);
            border: 1.5px solid var(--border-gold);
            padding: 6px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.9);
        }

        /* Очередь ходов */
        #queue-bar {
            width: 100%;
            height: 38px;
            background: #0d0a08;
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            display: flex;
            align-items: center;
            padding: 0 4px;
            gap: 4px;
            overflow-x: auto;
        }

        .queue-card {
            width: 28px;
            height: 28px;
            background: #201711;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .queue-card.current { border-color: var(--text-gold); transform: scale(1.15); box-shadow: 0 0 6px var(--text-gold); }
        .queue-card.player { border-bottom: 2px solid #3498db; }
        .queue-card.enemy { border-bottom: 2px solid #e74c3c; }

        /* Статус-бар */
        #turn-bar {
            width: 100%;
            background: #0f0c09;
            border: 1px solid var(--border-dark);
            padding: 6px 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-gold);
        }

        /* Игровое поле (8x10) */
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            background: #050403;
            padding: 3px;
            border: 1.5px solid var(--border-dark);
            border-radius: 6px;
            width: 100%;
        }

        .cell {
            aspect-ratio: 1 / 1;
            background: #18120d;
            border: 1px solid #281c13;
            border-radius: 3px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1px;
            position: relative;
            cursor: pointer;
        }

        .cell.deploy-zone { background: #132a13; border-color: #27ae60; }
        .cell.reachable { background: #102619; border-color: #2ecc71; }
        .cell.attackable { background: #3b1414; border-color: #e74c3c; }
        .cell.healable { background: #142a28; border-color: #1abc9c; }
        .cell.active-cell { outline: 2px solid var(--text-gold); box-shadow: inset 0 0 6px rgba(243, 209, 121, 0.6); }

        @keyframes hitShake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-3px, 2px); }
            50% { transform: translate(3px, -2px); }
            75% { transform: translate(-2px, -2px); }
            100% { transform: translate(0, 0); }
        }

        .shake { animation: hitShake 0.3s ease-in-out; }

        .unit { 
            font-size: 18px; 
            text-align: center; 
            line-height: 1; 
            margin-top: auto; 
            margin-bottom: auto;
        }

        .unit-badge {
            background: rgba(0,0,0,0.85);
            border-radius: 2px;
            padding: 0 1px;
            font-size: 7px;
            font-weight: bold;
            align-self: flex-start;
            line-height: 1;
        }

        .player-unit .unit-badge { color: #5ad; }
        .enemy-unit .unit-badge { color: #f55; }

        .status-icons { font-size: 8px; position: absolute; right: 1px; top: 1px; display: flex; gap: 1px; }

        /* Лог боя */
        #log-box {
            width: 100%;
            height: 48px;
            background: #070504;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 3px 6px;
            overflow-y: auto;
            font-size: 9px;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .log-hit { color: #e74c3c; }
        .log-move { color: #2ecc71; }
        .log-skill { color: #f39c12; }
        .log-heal { color: #1abc9c; }

        /* Панель персонажа */
        .panel-box {
            background: #0f0c09;
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            padding: 6px;
        }

        .panel-title {
            color: var(--text-gold);
            font-size: 10px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-dark);
            padding-bottom: 3px;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        /* Магазин под телефоны */
        .shop-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
        }

        .shop-item {
            background: #1c1510;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 3px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 8px;
            text-align: center;
        }

        .shop-item.disabled { opacity: 0.25; cursor: not-allowed; }
        .shop-item.selected { border-color: #2ecc71; background: #142a18; }
        .shop-icon { font-size: 16px; margin-bottom: 1px; }

        .btn {
            background: linear-gradient(180deg, #c89b3c 0%, #8a651e 100%);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }

        .btn-skip {
            background: linear-gradient(180deg, #7f8c8d 0%, #34495e 100%);
            color: #fff;
        }

        .btn:active { filter: brightness(1.2); }
    </style>
</head>
<body>

    <h1>⚔️ РЫЦАРИ: БИТВА ГЕРОЕВ</h1>

    <div class="wrapper">
        <div id="queue-bar"></div>

        <div id="turn-bar">
            <span id="game-status">Соберите армию на 40 очков!</span>
            <div style="display: flex; gap: 4px;">
                <button class="btn btn-skip" id="skip-btn" onclick="skipTurn()" style="display: none;">ПРОПУСК</button>
                <button class="btn" id="action-btn" onclick="startBattle()">В БОЙ!</button>
            </div>
        </div>

        <div id="board"></div>

        <div id="log-box"></div>

        <div class="panel-box">
            <div id="unit-details" style="font-size: 9px; color: #bbb; min-height: 48px;">
                Выберите рыцаря ниже для просмотра подробных характеристик.
            </div>
        </div>

        <div class="panel-box">
            <div class="panel-title">
                <span>Рыцари</span>
                <span id="limit-txt" style="color:#2ecc71">0 / 40 Очк.</span>
            </div>
            <div class="shop-list" id="shop-list"></div>
        </div>
    </div>

    <script>
        const GRID_W = 8;
        const GRID_H = 10;
        const MAX_LIMIT = 40;

        // --- 10 ГЕРОЕВ С ПОДРОБНЫМИ ДАННЫМИ О НАВЫКАХ ---
        const HEROES_DB = [
            {
                id: 'militia', name: 'Ополченец', icon: '🧑‍🌾', cost: 2, hp: 28, dmg: 7, init: 11, move: 3, range: 1, role: 'Melee',
                arrowProtect: 0, skillName: 'Удар под жилки', 
                skillDesc: 'Каждая атака накладывает **Замедление** на 2 хода (уменьшает дальность хода цели на -1 клетку).'
            },
            {
                id: 'footman', name: 'Пехотинец', icon: '🛡️', cost: 3, hp: 42, dmg: 10, init: 9, move: 2, range: 1, role: 'Melee',
                arrowProtect: 0.4, skillName: 'Большой щит', 
                skillDesc: 'Пассивная защита: поглощает **40% урона** от стрел и любых дальних атак.'
            },
            {
                id: 'lord_guardian', name: 'Лорд-Защитник', icon: '🏰', cost: 5, hp: 65, dmg: 14, init: 7, move: 2, range: 1, role: 'Tank',
                arrowProtect: 0.5, skillName: 'Стена щитов', 
                skillDesc: 'Тяжелый башенный щит: поглощает **50% урона** от атак дальнего боя.'
            },
            {
                id: 'archer', name: 'Лучник', icon: '🏹', cost: 3, hp: 25, dmg: 9, init: 12, move: 2, range: 4, role: 'Ranged',
                arrowProtect: 0, skillName: 'Быстрый залп', 
                skillDesc: 'Высокая инициатива (12). Если враг подошел вплотную, может атаковать только соседние клетки!'
            },
            {
                id: 'crossbow', name: 'Арбалетчик', icon: '🎯', cost: 4, hp: 30, dmg: 15, init: 8, move: 2, range: 4, role: 'Ranged',
                arrowProtect: 0, skillName: 'Бронебойный болт', 
                skillDesc: 'Вызывает **Кровотечение** на 2 хода (3 ед. урона/ход). Заблокирован вплотную врагом.'
            },
            {
                id: 'trapper', name: 'Следопыт', icon: '🌲', cost: 4, hp: 32, dmg: 11, init: 10, move: 3, range: 3, role: 'Ranged',
                arrowProtect: 0, skillName: 'Капкан', 
                skillDesc: 'Выстрел наносит урон и **Замедляет** цель на 2 хода. Заблокирован вплотную врагом.'
            },
            {
                id: 'knight_rider', name: 'Кавалерист', icon: '🐎', cost: 5, hp: 50, dmg: 16, init: 14, move: 4, range: 1, role: 'Melee',
                arrowProtect: 0.1, skillName: 'Конный натиск', 
                skillDesc: 'Высокая мобильность (**4 клетки**) и максимальная инициатива (14). Перепрыгивает только своих.'
            },
            {
                id: 'chaplain', name: 'Капеллан', icon: '⛪', cost: 4, hp: 35, dmg: 5, init: 6, move: 2, range: 3, role: 'Support',
                arrowProtect: 0, skillName: 'Молитва о жизни', 
                skillDesc: 'Исцеляет союзника на **12 HP** и вешает **Святой щит** (поглощает 5 урона 2 хода).'
            },
            {
                id: 'banner', name: 'Знаменосец', icon: '🚩', cost: 4, hp: 38, dmg: 8, init: 13, move: 2, range: 1, role: 'Support',
                arrowProtect: 0, skillName: 'Боевая Аура', 
                skillDesc: 'Пассивно увеличивает урон всех соседних союзных юнитов на **+20%**.'
            },
            {
                id: 'mage', name: 'Маг', icon: '🧙‍♂️', cost: 6, hp: 28, dmg: 18, init: 9, move: 2, range: 4, role: 'Ranged',
                arrowProtect: 0, skillName: 'Огненный шар', 
                skillDesc: 'Вызывает **Поджог** на 3 хода (4 ед. урона/ход). Заблокирован вплотную врагом.'
            }
        ];

        let selectedShopUnit = HEROES_DB[0];
        let playerPoints = 0;
        let units = [];
        let turnQueue = [];
        let currentUnitIndex = 0;
        let gameState = 'DEPLOYMENT';

        function init() {
            createBoard();
            generateEnemyArmy();
            renderShop();
            render();
            showUnitDetails(HEROES_DB[0]);
            log("Расставьте отряды в зеленой зоне (внизу)!", "log-skill");
        }

        function generateEnemyArmy() {
            let pts = 0;
            let enemyId = 1;

            while (pts < MAX_LIMIT) {
                const remain = MAX_LIMIT - pts;
                const validUnits = HEROES_DB.filter(u => u.cost <= remain);
                const randomType = validUnits[Math.floor(Math.random() * validUnits.length)];

                let emptyCells = [];
                for (let y = 0; y < 3; y++) {
                    for (let x = 0; x < GRID_W; x++) {
                        if (!units.find(u => u.x === x && u.y === y)) emptyCells.push({ x, y });
                    }
                }

                if (emptyCells.length === 0) break;
                const cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];

                units.push({
                    id: 'e_' + enemyId++,
                    team: 'enemy',
                    type: randomType,
                    maxHp: randomType.hp,
                    hp: randomType.hp,
                    x: cell.x, y: cell.y,
                    effects: { bleed: 0, burn: 0, slow: 0, shield: 0 }
                });

                pts += randomType.cost;
            }
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let y = 0; y < GRID_H; y++) {
                for (let x = 0; x < GRID_W; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    cell.onclick = () => handleCellClick(x, y);
                    board.appendChild(cell);
                }
            }
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';

            HEROES_DB.forEach(u => {
                const item = document.createElement('div');
                const disabled = (playerPoints + u.cost > MAX_LIMIT);
                item.className = `shop-item ${selectedShopUnit === u ? 'selected' : ''} ${disabled ? 'disabled' : ''}`;
                item.onclick = () => {
                    if (gameState !== 'DEPLOYMENT') return;
                    selectedShopUnit = u;
                    showUnitDetails(u);
                    renderShop();
                    render();
                };
                item.innerHTML = `
                    <div class="shop-icon">${u.icon}</div>
                    <div style="font-weight:bold">${u.cost}оч.</div>
                `;
                list.appendChild(item);
            });

            document.getElementById('limit-txt').innerText = `${playerPoints} / ${MAX_LIMIT} Очк.`;
        }

        // --- ВСПМОГАТЕЛЬНЫЕ ФУНКЦИИ ДИСТАНЦИИ И ПУТИ ---

        // Соседство по диагонали и прямым (8 направлений)
        function isAdjacent(u1, x2, y2) {
            return Math.max(Math.abs(u1.x - x2), Math.abs(u1.y - y2)) === 1;
        }

        // Проверка, есть ли враг вплотную на 8 соседних клетках
        function hasEnemyAdjacent(unit) {
            return units.some(u => u.team !== unit.team && isAdjacent(unit, u.x, u.y));
        }

        // Вычисление эффективной дальности атаки с учетом окружения
        function getEffectiveRange(unit) {
            if (unit.type.range > 1 && hasEnemyAdjacent(unit)) {
                return 1; // Заблокирован вплотную — может бить только рядом!
            }
            return unit.type.range;
        }

        // Проверка возможности атаковать/лечить цель с учетом диагоналей и блокировки
        function canTarget(attacker, targetX, targetY) {
            const effRange = getEffectiveRange(attacker);
            const dx = Math.abs(attacker.x - targetX);
            const dy = Math.abs(attacker.y - targetY);

            if (effRange === 1) {
                return Math.max(dx, dy) === 1; // 8 соседних клеток (включая диагонали)
            } else {
                return (dx + dy) <= effRange; // Манхэттенское расстояние для дальнего боя
            }
        }

        // Поиск доступных клеток для перемещения (BFS):
        // Можно проходить только через пустые клетки или клетки со СВОИМИ бойцами.
        function getReachableCells(unit) {
            const maxMove = getEffectiveMove(unit);
            const visited = {};
            const queue = [{ x: unit.x, y: unit.y, dist: 0 }];
            const reachable = [];

            const key = (x, y) => `${x},${y}`;
            visited[key(unit.x, unit.y)] = true;

            const dirs = [
                {x: 0, y: -1}, {x: 0, y: 1}, {x: -1, y: 0}, {x: 1, y: 0},
                {x: -1, y: -1}, {x: 1, y: -1}, {x: -1, y: 1}, {x: 1, y: 1}
            ];

            while (queue.length > 0) {
                const current = queue.shift();

                if (current.dist > 0 && !units.find(u => u.x === current.x && u.y === current.y)) {
                    reachable.push({ x: current.x, y: current.y });
                }

                if (current.dist < maxMove) {
                    for (const d of dirs) {
                        const nx = current.x + d.x;
                        const ny = current.y + d.y;

                        if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
                            const nKey = key(nx, ny);
                            if (!visited[nKey]) {
                                const unitOnCell = units.find(u => u.x === nx && u.y === ny);
                                // Проходимо если клетка пуста ИЛИ там свой юнит (перепрыгиваем)
                                if (!unitOnCell || unitOnCell.team === unit.team) {
                                    visited[nKey] = true;
                                    queue.push({ x: nx, y: ny, dist: current.dist + 1 });
                                }
                            }
                        }
                    }
                }
            }
            return reachable;
        }

        function handleCellClick(x, y) {
            const unitOnCell = units.find(u => u.x === x && u.y === y);

            if (gameState === 'DEPLOYMENT') {
                if (unitOnCell && unitOnCell.team === 'player') {
                    playerPoints -= unitOnCell.type.cost;
                    units = units.filter(u => u !== unitOnCell);
                    renderShop();
                    render();
                    return;
                }

                if (y >= GRID_H - 3 && selectedShopUnit && !unitOnCell) {
                    if (playerPoints + selectedShopUnit.cost <= MAX_LIMIT) {
                        units.push({
                            id: 'p_' + Date.now() + Math.random(),
                            team: 'player',
                            type: selectedShopUnit,
                            maxHp: selectedShopUnit.hp,
                            hp: selectedShopUnit.hp,
                            x: x, y: y,
                            effects: { bleed: 0, burn: 0, slow: 0, shield: 0 }
                        });
                        playerPoints += selectedShopUnit.cost;
                        renderShop();
                        render();
                    }
                }
            } else if (gameState === 'BATTLE') {
                const cur = turnQueue[currentUnitIndex];
                if (!cur || cur.team !== 'player') return;

                const reachableCells = getReachableCells(cur);
                const canReachMove = reachableCells.some(c => c.x === x && c.y === y);

                if (cur.type.id === 'chaplain' && unitOnCell && unitOnCell.team === 'player' && canTarget(cur, x, y)) {
                    healUnit(cur, unitOnCell);
                    nextTurn();
                    return;
                }

                if (unitOnCell && unitOnCell.team === 'enemy' && canTarget(cur, x, y)) {
                    attack(cur, unitOnCell);
                    nextTurn();
                } else if (!unitOnCell && canReachMove) {
                    cur.x = x;
                    cur.y = y;
                    log(`Ваш ${cur.type.name} переместился`, 'log-move');
                    nextTurn();
                }
            }

            if (unitOnCell) showUnitDetails(unitOnCell.type, unitOnCell.hp, unitOnCell.effects);
        }

        function getEffectiveMove(unit) {
            let m = unit.type.move;
            if (unit.effects.slow > 0) m = Math.max(1, m - 1);
            return m;
        }

        function startBattle() {
            if (playerPoints === 0) {
                alert('Соберите армию!');
                return;
            }

            gameState = 'BATTLE';
            document.getElementById('action-btn').style.display = 'none';
            document.getElementById('skip-btn').style.display = 'block';
            buildTurnQueue();
            runTurn();
        }

        function skipTurn() {
            if (gameState !== 'BATTLE') return;
            const cur = turnQueue[currentUnitIndex];
            if (!cur || cur.team !== 'player') return;

            log(`⏭️ ${cur.type.name} пропускает ход`, 'log-skill');
            nextTurn();
        }

        function buildTurnQueue() {
            turnQueue = [...units].sort((a, b) => b.type.init - a.type.init);
            currentUnitIndex = 0;
            renderQueueBar();
        }

        function renderQueueBar() {
            const qBar = document.getElementById('queue-bar');
            qBar.innerHTML = '';
            turnQueue.forEach((u, idx) => {
                const card = document.createElement('div');
                card.className = `queue-card ${u.team} ${idx === currentUnitIndex ? 'current' : ''}`;
                card.innerHTML = u.type.icon;
                qBar.appendChild(card);
            });
        }

        function runTurn() {
            if (checkGameOver()) return;

            turnQueue = turnQueue.filter(u => units.includes(u));
            if (turnQueue.length === 0) buildTurnQueue();
            if (currentUnitIndex >= turnQueue.length) currentUnitIndex = 0;

            const cur = turnQueue[currentUnitIndex];
            renderQueueBar();

            applyStatusEffects(cur);

            // Проверяем: если юнит погиб от периодического урона (огня/крови), передаем ход
            if (cur.hp <= 0 || !units.includes(cur)) {
                nextTurn();
                return;
            }

            render();

            const skipBtn = document.getElementById('skip-btn');

            if (cur.team === 'player') {
                let statusText = `ХОД: ${cur.type.name}`;
                if (hasEnemyAdjacent(cur) && cur.type.range > 1) {
                    statusText += ` (Враг вплотную!)`;
                }
                document.getElementById('game-status').innerText = statusText;
                skipBtn.style.display = 'block';
            } else {
                document.getElementById('game-status').innerText = `ХОД ВРАГА: ${cur.type.name}...`;
                skipBtn.style.display = 'none';
                setTimeout(smartEnemyAI, 400);
            }
        }

        // ПРОВЕРКА СМЕРТИ ОТ ЭФФЕКТОВ
        function applyStatusEffects(unit) {
            if (unit.effects.burn > 0) {
                unit.hp -= 4;
                unit.effects.burn--;
                log(`🔥 ${unit.type.name} горит! -4 HP (осталось ${unit.effects.burn}х)`, 'log-hit');
            }
            if (unit.effects.bleed > 0) {
                unit.hp -= 3;
                unit.effects.bleed--;
                log(`🩸 ${unit.type.name} кровоточит! -3 HP (осталось ${unit.effects.bleed}х)`, 'log-hit');
            }

            if (unit.effects.slow > 0) unit.effects.slow--;
            if (unit.effects.shield > 0) unit.effects.shield--;

            // Если здоровье опустилось до 0 и ниже от эффектов
            if (unit.hp <= 0) {
                log(`☠️ ${unit.type.name} погиб от периодического урона!`, 'log-hit');
                units = units.filter(u => u !== unit);
            }
        }

        function nextTurn() {
            currentUnitIndex++;
            runTurn();
        }

        function attack(attacker, defender) {
            let dmg = attacker.type.dmg;

            const hasBanner = units.some(u => u.team === attacker.team && u.type.id === 'banner' && isAdjacent(attacker, u.x, u.y));
            if (hasBanner) dmg = Math.round(dmg * 1.2);

            if (attacker.type.role === 'Ranged' && defender.type.arrowProtect > 0) {
                const reduced = Math.round(dmg * defender.type.arrowProtect);
                dmg = Math.round(dmg * (1 - defender.type.arrowProtect));
                log(`🛡️ Щит снизил урон от стрел на -${reduced}!`, 'log-skill');
            }

            if (defender.effects.shield > 0) {
                dmg = Math.max(1, dmg - 5);
                log(`✨ Святой щит поглотил 5 урона!`, 'log-skill');
            }

            const cell = getCell(defender.x, defender.y);
            if (cell) {
                cell.classList.add('shake');
                setTimeout(() => cell.classList.remove('shake'), 300);
            }

            if (attacker.type.id === 'militia' || attacker.type.id === 'trapper') defender.effects.slow = 2;
            if (attacker.type.id === 'crossbow') defender.effects.bleed = 2;
            if (attacker.type.id === 'mage') defender.effects.burn = 3;

            defender.hp -= dmg;

            if (defender.hp <= 0) {
                log(`💥 ${attacker.type.name} убил ${defender.type.name}!`, 'log-hit');
                units = units.filter(u => u !== defender);
            } else {
                log(`⚔️ ${attacker.type.name} -> ${dmg} урона по ${defender.type.name}`, 'log-hit');
            }
        }

        function healUnit(healer, target) {
            const healAmt = 12;
            target.hp = Math.min(target.maxHp, target.hp + healAmt);
            target.effects.shield = 2;
            log(`✨ ${healer.type.name} исцелил ${target.type.name} (+${healAmt} HP) и дал Святой Щит!`, 'log-heal');
        }

        function smartEnemyAI() {
            const cur = turnQueue[currentUnitIndex];
            if (!cur || cur.team !== 'enemy' || cur.hp <= 0) return;

            const playerUnits = units.filter(u => u.team === 'player');
            if (playerUnits.length === 0) return;

            if (cur.type.id === 'chaplain') {
                const injured = units.filter(u => u.team === 'enemy' && u.hp < u.maxHp);
                if (injured.length > 0) {
                    injured.sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp));
                    const targetToHeal = injured[0];
                    if (canTarget(cur, targetToHeal.x, targetToHeal.y)) {
                        healUnit(cur, targetToHeal);
                        nextTurn();
                        return;
                    }
                }
            }

            // Поиск цели, которую можно атаковать
            const attackableTargets = playerUnits.filter(u => canTarget(cur, u.x, u.y));

            if (attackableTargets.length > 0) {
                attackableTargets.sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp));
                attack(cur, attackableTargets[0]);
            } else {
                // Если нельзя атаковать, ищем движение по доступным клеткам
                playerUnits.sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp));
                let target = playerUnits[0];

                const reachable = getReachableCells(cur);
                if (reachable.length > 0) {
                    reachable.sort((a, b) => {
                        const dA = Math.abs(a.x - target.x) + Math.abs(a.y - target.y);
                        const dB = Math.abs(b.x - target.x) + Math.abs(b.y - target.y);
                        return dA - dB;
                    });

                    cur.x = reachable[0].x;
                    cur.y = reachable[0].y;
                    log(`👹 Враг продвигается ближе`, 'log-move');
                }
            }
            nextTurn();
        }

        function render() {
            document.querySelectorAll('.cell').forEach(c => {
                c.className = 'cell';
                c.innerHTML = '';
            });

            if (gameState === 'DEPLOYMENT') {
                for (let y = GRID_H - 3; y < GRID_H; y++) {
                    for (let x = 0; x < GRID_W; x++) {
                        if (!units.find(u => u.x === x && u.y === y)) {
                            getCell(x, y).classList.add('deploy-zone');
                        }
                    }
                }
            }

            if (gameState === 'BATTLE' && turnQueue.length > 0) {
                const cur = turnQueue[currentUnitIndex];
                if (cur && cur.team === 'player') {
                    getCell(cur.x, cur.y).classList.add('active-cell');

                    // Подсветка атаки/лечения
                    units.forEach(u => {
                        if (u.team === 'enemy' && canTarget(cur, u.x, u.y)) {
                            getCell(u.x, u.y).classList.add('attackable');
                        }
                        if (cur.type.id === 'chaplain' && u.team === 'player' && canTarget(cur, u.x, u.y)) {
                            getCell(u.x, u.y).classList.add('healable');
                        }
                    });

                    // Подсветка перемещения через граф путей
                    const reachable = getReachableCells(cur);
                    reachable.forEach(c => {
                        getCell(c.x, c.y).classList.add('reachable');
                    });
                }
            }

            units.forEach(u => {
                const cell = getCell(u.x, u.y);
                if (cell) {
                    cell.classList.add(u.team === 'player' ? 'player-unit' : 'enemy-unit');
                    
                    let statusHtml = '';
                    if (u.effects.burn > 0) statusHtml += '🔥';
                    if (u.effects.bleed > 0) statusHtml += '🩸';
                    if (u.effects.slow > 0) statusHtml += '🦶';
                    if (u.effects.shield > 0) statusHtml += '✨';

                    cell.innerHTML = `
                        <div class="unit-badge">${u.hp}/${u.maxHp}</div>
                        <div class="status-icons">${statusHtml}</div>
                        <div class="unit">${u.type.icon}</div>
                    `;
                }
            });
        }

        function checkGameOver() {
            const pAlive = units.some(u => u.team === 'player');
            const eAlive = units.some(u => u.team === 'enemy');

            if (!pAlive || !eAlive) {
                gameState = 'END';
                document.getElementById('game-status').innerText = pAlive ? 'Победа!' : 'Поражение!';
                document.getElementById('skip-btn').style.display = 'none';
                log(pAlive ? '🎉 ВЫ ПОБЕДИЛИ!' : '☠️ ВАШЕ ВОЙСКО РАЗБИТО!', 'log-skill');
                render();
                return true;
            }
            return false;
        }

        function showUnitDetails(type, currentHp, effects) {
            let activeEffectsTxt = '';
            if (effects) {
                let effList = [];
                if (effects.burn > 0) effList.push(`🔥 Горит (${effects.burn}х)`);
                if (effects.bleed > 0) effList.push(`🩸 Кровотечение (${effects.bleed}х)`);
                if (effects.slow > 0) effList.push(`🦶 Замедлен (${effects.slow}х)`);
                if (effects.shield > 0) effList.push(`✨ Святой щит (${effects.shield}х)`);
                if (effList.length > 0) {
                    activeEffectsTxt = `<div style="color:#e74c3c; margin-top:1px;">Эффекты: <b>${effList.join(', ')}</b></div>`;
                }
            }

            document.getElementById('unit-details').innerHTML = `
                <div style="font-weight:bold; color:var(--text-gold)">${type.icon} ${type.name} (${type.cost} очк.)</div>
                <div>HP: <b>${currentHp || type.hp}/${type.hp}</b> | Урон: <b>${type.dmg}</b> | Ход: <b>${type.move}к.</b> | Атака: <b>${type.range}к.</b> | Иниц: <b>${type.init}</b></div>
                <div style="color: #f39c12; margin-top:2px;"><b>${type.skillName}:</b> ${type.skillDesc}</div>
                ${activeEffectsTxt}
            `;
        }

        function getCell(x, y) {
            return document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
        }

        function log(msg, cls = '') {
            const box = document.getElementById('log-box');
            const div = document.createElement('div');
            if (cls) div.className = cls;
            div.innerText = msg;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        init();
    </script>
</body>
</html>
