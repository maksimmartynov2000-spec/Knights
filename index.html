<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цитадели: Эпоха Войн</title>
    <style>
        :root {
            --bg-main: #090807;
            --bg-panel: #14100c;
            --border-gold: #c89b3c;
            --border-dark: #3a2b1d;
            --text-gold: #f3d179;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; user-select: none; }

        body {
            background: var(--bg-main);
            color: #d8c8b8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px;
            min-height: 100vh;
        }

        h1 { color: var(--text-gold); font-size: 15px; text-align: center; margin-bottom: 4px; text-shadow: 0 2px 4px #000; }

        .wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            max-width: 520px;
            background: var(--bg-panel);
            border: 1.5px solid var(--border-gold);
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.9);
        }

        /* Верхняя экономическая панель */
        .res-bar {
            display: flex;
            justify-content: space-around;
            background: #000;
            border: 1px solid var(--border-dark);
            padding: 4px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
        }
        .res-item { display: flex; align-items: center; gap: 3px; }
        .gold { color: #f1c40f; }
        .stone { color: #95a5a6; }

        #turn-bar {
            background: #0f0c09;
            border: 1px solid var(--border-dark);
            padding: 4px 8px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-gold);
        }

        /* Игровое поле (11х13) */
        #board {
            display: grid;
            grid-template-columns: repeat(11, 1fr);
            gap: 1.5px;
            background: #040302;
            padding: 2px;
            border: 1.5px solid var(--border-dark);
            border-radius: 5px;
            width: 100%;
        }

        .cell {
            aspect-ratio: 1 / 1;
            background: #15100b;
            border: 1px solid #221810;
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1px;
            position: relative;
            cursor: pointer;
        }

        .cell.reachable { background: #112818; border-color: #2ecc71; }
        .cell.attackable { background: #3a1212; border-color: #e74c3c; }
        .cell.active-cell { outline: 2px solid var(--text-gold); z-index: 2; }
        .cell.citadel-cell { background: #2c1e12; border-color: #8e44ad; }
        .cell.citadel-enemy { background: #3a121d; border-color: #c0392b; }

        .unit { font-size: 16px; text-align: center; margin: auto; line-height: 1; }
        .unit-badge {
            background: rgba(0,0,0,0.85);
            border-radius: 2px;
            padding: 0 1px;
            font-size: 6.5px;
            font-weight: bold;
            line-height: 1;
        }
        .player-unit .unit-badge { color: #3498db; }
        .enemy-unit .unit-badge { color: #e74c3c; }

        /* Лог */
        #log-box {
            width: 100%;
            height: 42px;
            background: #050403;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 3px 5px;
            overflow-y: auto;
            font-size: 9px;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        /* Описание и Инфо */
        .panel-box {
            background: #0d0a07;
            border: 1px solid var(--border-dark);
            border-radius: 5px;
            padding: 5px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 2px;
            margin-top: 4px;
        }

        .shop-btn {
            background: #1a130d;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            font-size: 8px;
            color: #ccc;
        }
        .shop-btn:hover { border-color: var(--border-gold); }
        .shop-btn.selected { border-color: #2ecc71; background: #102414; }

        .btn {
            background: linear-gradient(180deg, #c89b3c 0%, #8a651e 100%);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
        }
        .btn-skip { background: linear-gradient(180deg, #7f8c8d 0%, #34495e 100%); color: #fff; }
        .btn-act { background: linear-gradient(180deg, #e67e22 0%, #d35400 100%); color: #fff; margin-top:2px; }
    </style>
</head>
<body>

    <h1>🏰 ЦИТАДЕЛИ: ЭПОХА ВОЙН</h1>

    <div class="wrapper">
        <div class="res-bar">
            <div class="res-item gold">💰 Монеты: <span id="res-gold">150</span> (+30)</div>
            <div class="res-item stone">🪨 Камень: <span id="res-stone">100</span> (+20)</div>
            <div class="res-item" style="color:#e74c3c">🏰 Враг Цитадель: <span id="enemy-cit-hp">500</span></div>
        </div>

        <div id="turn-bar">
            <span id="game-status">Ваш ход! Нанимайте юнитов около Цитадели.</span>
            <button class="btn btn-skip" onclick="endTurn()">ЗАВЕРШИТЬ ХОД</button>
        </div>

        <div id="board"></div>

        <div id="log-box"></div>

        <div class="panel-box">
            <div id="unit-details" style="font-size: 9px; min-height: 38px;">
                Выберите клетку, юнита или постройку для действий.
            </div>
            <div id="action-panel" style="display:none;"></div>
        </div>

        <div class="panel-box">
            <div style="font-size:10px; color:var(--text-gold); font-weight:bold;">Строительство и Найм (рядом с Цитаделью)</div>
            <div class="shop-grid" id="shop-list"></div>
        </div>
    </div>

    <script>
        const GRID_W = 11;
        const GRID_H = 13;

        // База Карточек / Типов
        const UNITS_DB = {
            warrior: { name:'Воин', icon:'⚔️', costG:40, costS:0, hp:45, dmg:10, move:2, range:1, init:10, type:'Infantry', upgrade:'knight', desc:'+20% урона по Кавалерии' },
            knight: { name:'Рыцарь', icon:'🛡️', costG:35, costS:0, hp:70, dmg:16, move:2, range:1, init:11, type:'Infantry', desc:'+50% урона по Кавалерии' },
            swordsman: { name:'Мечник', icon:'🗡️', costG:45, costS:0, hp:50, dmg:12, move:2, range:1, init:9, type:'Infantry', upgrade:'armored', desc:'-30% урона от стрел' },
            armored: { name:'Латник', icon:'🦾', costG:40, costS:0, hp:80, dmg:18, move:2, range:1, init:9, type:'Infantry', desc:'-50% урона от стрел' },
            archer: { name:'Лучник', icon:'🏹', costG:50, costS:0, hp:30, dmg:11, move:2, range:2, init:12, type:'Infantry', upgrade:'marksman', desc:'Дальний бой. Заблокирован вплотную' },
            marksman: { name:'Стрелок', icon:'🎯', costG:45, costS:0, hp:45, dmg:16, move:2, range:3, init:13, type:'Infantry', desc:'Дальность 3 клетки' },
            rider: { name:'Всадник', icon:'🐎', costG:65, costS:0, hp:55, dmg:15, move:4, range:1, init:15, type:'Cavalry', upgrade:'cavalier', desc:'Высокая скорость' },
            cavalier: { name:'Кавалерист', icon:'♞', costG:55, costS:0, hp:85, dmg:22, move:4, range:1, init:16, type:'Cavalry', desc:'Элитная кавалерия' },
            ballista: { name:'Баллиста', icon:'🏹', costG:70, costS:30, hp:40, dmg:14, move:1, range:2, init:6, type:'Siege', upgrade:'catapult', desc:'+100% урона по зданиям' },
            catapult: { name:'Катапульта', icon:'☄️', costG:60, costS:40, hp:60, dmg:22, move:1, range:4, init:5, type:'Siege', desc:'Дальнобойная осада (+100% по зданиям)' },
            vampire: { name:'Вампир', icon:'🧛', costG:90, costS:0, hp:60, dmg:14, move:3, range:1, init:14, type:'Mystic', upgrade:'ancient_vampire', desc:'Восстанавливает HP при атаке' },
            ancient_vampire: { name:'Древний Вампир', icon:'🦇', costG:80, costS:0, hp:95, dmg:20, move:3, range:1, init:17, type:'Mystic', desc:'Доп. ход при убийстве. Телепорт' },
            
            // Здания
            wall: { name:'Стена', icon:'🧱', costG:0, costS:40, hp:120, dmg:0, move:0, range:0, init:0, type:'Building', upgrade:'fort_wall', desc:'Защитное укрепление' },
            fort_wall: { name:'Улучш. Стена', icon:'🏰', costG:0, costS:35, hp:220, dmg:0, move:0, range:0, init:0, type:'Building', desc:'-50% урона от стрел' },
            tower: { name:'Башня', icon:'🏹', costG:20, costS:60, hp:100, dmg:12, move:0, range:3, init:1, type:'Building', upgrade:'super_tower', desc:'Автоматически стреляет по врагам' },
            super_tower: { name:'Улучш. Башня', icon:'🗼', costG:20, costS:50, hp:180, dmg:18, move:0, range:4, init:1, type:'Building', desc:'Повышенная дальность и урон' }
        };

        // Состояние игры
        let playerGold = 150, playerStone = 100;
        let enemyGold = 150, enemyStone = 100;
        let units = [];
        let activeUnit = null;
        let selectedShopKey = null;

        // Зоны Цитаделей (4х4)
        const PLAYER_CITADEL = { x: 3, y: 9, w: 4, h: 4, hp: 500, maxHp: 500 };
        const ENEMY_CITADEL  = { x: 3, y: 0, w: 4, h: 4, hp: 500, maxHp: 500 };

        function init() {
            createBoard();
            renderShop();
            updateRes();
            log("Битва началась! Нанимайте войска около своей Цитадели.", "log-skill");
        }

        function updateRes() {
            document.getElementById('res-gold').innerText = playerGold;
            document.getElementById('res-stone').innerText = playerStone;
            document.getElementById('enemy-cit-hp').innerText = `${ENEMY_CITADEL.hp}/${ENEMY_CITADEL.maxHp}`;
        }

        function createBoard() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            for (let y = 0; y < GRID_H; y++) {
                for (let x = 0; x < GRID_W; x++) {
                    const c = document.createElement('div');
                    c.className = 'cell';
                    c.dataset.x = x;
                    c.dataset.y = y;
                    c.onclick = () => handleCellClick(x, y);
                    b.appendChild(c);
                }
            }
            render();
        }

        function isCitadelCell(x, y, cit) {
            return x >= cit.x && x < cit.x + cit.w && y >= cit.y && y < cit.y + cit.h;
        }

        function isAdjacentToCitadel(x, y, cit) {
            for (let cy = cit.y - 1; cy <= cit.y + cit.h; cy++) {
                for (let cx = cit.x - 1; cx <= cit.x + cit.w; cx++) {
                    if (cx >= 0 && cx < GRID_W && cy >= 0 && cy < GRID_H) {
                        if (Math.max(Math.abs(cx - x), Math.abs(cy - y)) <= 1) {
                            if (!isCitadelCell(x, y, cit)) return true;
                        }
                    }
                }
            }
            return false;
        }

        function getUnitAt(x, y) { return units.find(u => u.x === x && u.y === y); }

        function handleCellClick(x, y) {
            // Клик по Цитаделям
            if (isCitadelCell(x, y, ENEMY_CITADEL)) {
                if (activeUnit && activeUnit.team === 'player' && !activeUnit.acted) {
                    if (canTarget(activeUnit, x, y)) { attackCitadel(activeUnit, ENEMY_CITADEL); return; }
                }
                showDetails("🏰 Вражеская Цитадель", `HP: ${ENEMY_CITADEL.hp}/${ENEMY_CITADEL.maxHp}. Главная цель для уничтожения!`);
                return;
            }

            if (isCitadelCell(x, y, PLAYER_CITADEL)) {
                showDetails("🏰 Ваша Цитадель", `HP: ${PLAYER_CITADEL.hp}/${PLAYER_CITADEL.maxHp}. Защищайте её! Нанимайте войска рядом.`);
                return;
            }

            const target = getUnitAt(x, y);

            // Если выбран покупка в магазине
            if (selectedShopKey && !target) {
                if (isAdjacentToCitadel(x, y, PLAYER_CITADEL)) {
                    buyUnit(selectedShopKey, x, y, 'player');
                    return;
                } else {
                    log("Строить/нанимать можно только на соседней клетке с Цитаделью!", "log-hit");
                }
            }

            // Управление юнитом на поле
            if (activeUnit && activeUnit.team === 'player' && !activeUnit.acted) {
                const reachable = getReachableCells(activeUnit);
                
                if (target && target.team === 'enemy' && canTarget(activeUnit, x, y)) {
                    attack(activeUnit, target);
                    return;
                } else if (!target && reachable.some(c => c.x === x && c.y === y)) {
                    activeUnit.x = x;
                    activeUnit.y = y;
                    activeUnit.acted = true;
                    log(`Ваш ${UNITS_DB[activeUnit.typeKey].name} переместился`, 'log-move');
                    activeUnit = null;
                    render();
                    return;
                }
            }

            if (target) {
                activeUnit = (target.team === 'player' && !target.acted) ? target : null;
                showUnitDetails(target);
            } else {
                activeUnit = null;
                document.getElementById('action-panel').style.display = 'none';
            }
            render();
        }

        function buyUnit(key, x, y, team) {
            const db = UNITS_DB[key];
            if (team === 'player') {
                if (playerGold < db.costG || playerStone < db.costS) {
                    log("Недостаточно ресурсов!", "log-hit");
                    return;
                }
                playerGold -= db.costG;
                playerStone -= db.costS;
                updateRes();
            } else {
                enemyGold -= db.costG;
                enemyStone -= db.costS;
            }

            const newU = {
                id: Date.now() + Math.random(),
                team: team,
                typeKey: key,
                hp: db.hp,
                maxHp: db.hp,
                x: x, y: y,
                acted: true,
                vampSkillUsed: false
            };

            units.push(newU);
            log(`${team === 'player' ? 'Вы' : 'Враг'} создали: ${db.name}`, 'log-skill');
            selectedShopKey = null;
            renderShop();
            render();
        }

        function upgradeUnit(unit) {
            const db = UNITS_DB[unit.typeKey];
            if (!db.upgrade) return;
            const upDb = UNITS_DB[db.upgrade];

            if (!isAdjacentToCitadel(unit.x, unit.y, unit.team === 'player' ? PLAYER_CITADEL : ENEMY_CITADEL)) {
                log("Для улучшения юнит должен быть рядом с Цитаделью!", "log-hit");
                return;
            }

            if (unit.team === 'player') {
                if (playerGold < upDb.costG || playerStone < upDb.costS) {
                    log("Недостаточно ресурсов для улучшения!", "log-hit");
                    return;
                }
                playerGold -= upDb.costG;
                playerStone -= upDb.costS;
                updateRes();
            }

            unit.typeKey = db.upgrade;
            unit.maxHp = upDb.hp;
            unit.hp = upDb.hp; // Полное исцеление при апгрейде
            log(`🌟 ${db.name} улучшен до ${upDb.name}!`, 'log-skill');
            showUnitDetails(unit);
            render();
        }

        function attack(attacker, defender) {
            const aDb = UNITS_DB[attacker.typeKey];
            const dDb = UNITS_DB[defender.typeKey];

            let dmg = aDb.dmg;

            // Бонусы типов
            if (aDb.type === 'Infantry' && dDb.type === 'Cavalry') {
                if (attacker.typeKey === 'warrior') dmg *= 1.2;
                if (attacker.typeKey === 'knight') dmg *= 1.5;
            }
            if (aDb.type === 'Siege' && dDb.type === 'Building') dmg *= 2.0;

            // Защита от стрел
            if (aDb.range > 1) {
                if (defender.typeKey === 'swordsman') dmg *= 0.7;
                if (defender.typeKey === 'armored' || defender.typeKey === 'fort_wall') dmg *= 0.5;
            }

            dmg = Math.round(dmg);
            defender.hp -= dmg;
            attacker.acted = true;

            // Вампиризм
            if (aDb.type === 'Mystic') {
                const heal = Math.round(dmg * 0.4);
                attacker.hp = Math.min(attacker.maxHp, attacker.hp + heal);
                log(`🧛 ${aDb.name} исцелился на +${heal} HP за счет вампиризма`, 'log-skill');
            }

            log(`⚔️ ${aDb.name} нанес ${dmg} урона по ${dDb.name}`, 'log-hit');

            if (defender.hp <= 0) {
                log(`💥 ${dDb.name} уничтожен!`, 'log-hit');
                units = units.filter(u => u !== defender);

                // Доп. ход Древнего Вампира при убийстве живых
                if (attacker.typeKey === 'ancient_vampire' && dDb.type !== 'Building' && dDb.type !== 'Siege') {
                    attacker.acted = false;
                    log(`🦇 Древний Вампир получает дополнительный ход за убийство!`, 'log-skill');
                }
            }

            activeUnit = null;
            render();
            checkWin();
        }

        function attackCitadel(attacker, citadel) {
            const aDb = UNITS_DB[attacker.typeKey];
            let dmg = aDb.dmg;
            if (aDb.type === 'Siege') dmg *= 2.0;

            dmg = Math.round(dmg);
            citadel.hp = Math.max(0, citadel.hp - dmg);
            attacker.acted = true;

            log(`💥 ${aDb.name} нанес ${dmg} урона по ЦИТАДЕЛИ!`, 'log-hit');
            updateRes();
            activeUnit = null;
            render();
            checkWin();
        }

        // Абилка Вампира: телепорт к Цитадели
        function useVampireSkill(unit) {
            if (unit.vampSkillUsed) return;
            const cit = unit.team === 'player' ? PLAYER_CITADEL : ENEMY_CITADEL;

            // Поиск свободной клетки у цитадели
            for (let cy = cit.y - 1; cy <= cit.y + cit.h; cy++) {
                for (let cx = cit.x - 1; cx <= cit.x + cit.w; cx++) {
                    if (cx >= 0 && cx < GRID_W && cy >= 0 && cy < GRID_H) {
                        if (!isCitadelCell(cx, cy, cit) && !getUnitAt(cx, cy)) {
                            unit.x = cx;
                            unit.y = cy;
                            unit.vampSkillUsed = true;
                            log(`🦇 Вампир мгновенно переместился к своей Цитадели!`, 'log-skill');
                            render();
                            showUnitDetails(unit);
                            return;
                        }
                    }
                }
            }
        }

        // Абилка Древнего Вампира: Блинк к врагу
        function useAncientBlink(unit) {
            const enemies = units.filter(u => u.team !== unit.team);
            for (let e of enemies) {
                if (Math.abs(e.x - unit.x) <= 3 && Math.abs(e.y - unit.y) <= 3) {
                    // Ищем соседнюю с врагом клетку
                    const dirs = [{x:0,y:1},{x:0,y:-1},{x:1,y:0},{x:-1,y:0}];
                    for (let d of dirs) {
                        const nx = e.x + d.x, ny = e.y + d.y;
                        if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H && !getUnitAt(nx, ny) && !isCitadelCell(nx, ny, ENEMY_CITADEL)) {
                            unit.x = nx;
                            unit.y = ny;
                            unit.acted = false; // даем совершить доп действие
                            log(`🦇 Древний Вампир совершил Блинк за спину врага и готов атаковать!`, 'log-skill');
                            render();
                            showUnitDetails(unit);
                            return;
                        }
                    }
                }
            }
            log("В радиусе 3 клеток нет подходящих врагов!", "log-hit");
        }

        function endTurn() {
            // Сброс ходов игрока
            units.forEach(u => { if (u.team === 'player') u.acted = false; });

            // Прирост ресурсов
            playerGold += 30; playerStone += 20;
            enemyGold += 30; enemyStone += 20;
            updateRes();

            log("--- ХОД ПРОТИВНИКА ---", "log-skill");
            runTowerAttacks('enemy');
            setTimeout(smartEnemyAI, 500);
        }

        function runTowerAttacks(team) {
            const towers = units.filter(u => u.team === team && (u.typeKey === 'tower' || u.typeKey === 'super_tower'));
            towers.forEach(t => {
                const db = UNITS_DB[t.typeKey];
                const enemies = units.filter(u => u.team !== team && Math.abs(u.x - t.x) <= db.range && Math.abs(u.y - t.y) <= db.range);
                if (enemies.length > 0) {
                    attack(t, enemies[0]);
                }
            });
        }

        function smartEnemyAI() {
            // Ход башен игрока
            runTowerAttacks('player');

            // 1. Покупки ИИ
            let adjCells = [];
            for (let cy = ENEMY_CITADEL.y - 1; cy <= ENEMY_CITADEL.y + ENEMY_CITADEL.h; cy++) {
                for (let cx = ENEMY_CITADEL.x - 1; cx <= ENEMY_CITADEL.x + ENEMY_CITADEL.w; cx++) {
                    if (cx >= 0 && cx < GRID_W && cy >= 0 && cy < GRID_H && !isCitadelCell(cx, cy, ENEMY_CITADEL) && !getUnitAt(cx, cy)) {
                        adjCells.push({x: cx, y: cy});
                    }
                }
            }

            if (adjCells.length > 0) {
                const spawn = adjCells[Math.floor(Math.random() * adjCells.length)];
                if (enemyGold >= 90) buyUnit('vampire', spawn.x, spawn.y, 'enemy');
                else if (enemyGold >= 65) buyUnit('rider', spawn.x, spawn.y, 'enemy');
                else if (enemyGold >= 50) buyUnit('archer', spawn.x, spawn.y, 'enemy');
                else if (enemyGold >= 40) buyUnit('warrior', spawn.x, spawn.y, 'enemy');
            }

            // 2. Действия юнитов ИИ
            const enemyUnits = units.filter(u => u.team === 'enemy');
            enemyUnits.forEach(u => {
                const db = UNITS_DB[u.typeKey];

                // Апгрейд у цитадели
                if (db.upgrade && isAdjacentToCitadel(u.x, u.y, ENEMY_CITADEL) && enemyGold >= 50) {
                    upgradeUnit(u);
                }

                // Атака Цитадели игрока
                if (canTarget(u, PLAYER_CITADEL.x + 1, PLAYER_CITADEL.y)) {
                    attackCitadel(u, PLAYER_CITADEL);
                    return;
                }

                // Атака юнитов игрока
                const playerTargets = units.filter(p => p.team === 'player' && canTarget(u, p.x, p.y));
                if (playerTargets.length > 0) {
                    attack(u, playerTargets[0]);
                    return;
                }

                // Движение к Цитадели игрока
                const reachable = getReachableCells(u);
                if (reachable.length > 0) {
                    reachable.sort((a, b) => {
                        const dA = Math.abs(a.x - (PLAYER_CITADEL.x+1)) + Math.abs(a.y - PLAYER_CITADEL.y);
                        const dB = Math.abs(b.x - (PLAYER_CITADEL.x+1)) + Math.abs(b.y - PLAYER_CITADEL.y);
                        return dA - dB;
                    });
                    u.x = reachable[0].x;
                    u.y = reachable[0].y;
                }
            });

            // Сброс ходов врагов
            units.forEach(u => { if (u.team === 'enemy') u.acted = false; });
            log("--- ВАШ ХОД ---", "log-skill");
            render();
        }

        // --- ВСПОМОГАТЕЛЬНЫЕ МЕХАНИКИ ДВИЖЕНИЯ И АТАКИ ---
        function canTarget(attacker, tx, ty) {
            const db = UNITS_DB[attacker.typeKey];
            const dx = Math.abs(attacker.x - tx);
            const dy = Math.abs(attacker.y - ty);

            if (db.range === 1) return Math.max(dx, dy) === 1;
            return (dx + dy) <= db.range;
        }

        function getReachableCells(unit) {
            const db = UNITS_DB[unit.typeKey];
            if (db.move === 0) return [];

            const visited = {};
            const queue = [{ x: unit.x, y: unit.y, dist: 0 }];
            const reachable = [];

            while (queue.length > 0) {
                const curr = queue.shift();
                if (curr.dist > 0 && !getUnitAt(curr.x, curr.y) && !isCitadelCell(curr.x, curr.y, PLAYER_CITADEL) && !isCitadelCell(curr.x, curr.y, ENEMY_CITADEL)) {
                    reachable.push({ x: curr.x, y: curr.y });
                }

                if (curr.dist < db.move) {
                    const dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0},{x:-1,y:-1},{x:1,y:-1},{x:-1,y:1},{x:1,y:1}];
                    for (let d of dirs) {
                        const nx = curr.x + d.x, ny = curr.y + d.y;
                        if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
                            const key = `${nx},${ny}`;
                            if (!visited[key]) {
                                const uOn = getUnitAt(nx, ny);
                                const isPlayerCit = isCitadelCell(nx, ny, PLAYER_CITADEL);
                                const isEnemyCit = isCitadelCell(nx, ny, ENEMY_CITADEL);

                                if (!isPlayerCit && !isEnemyCit && (!uOn || uOn.team === unit.team)) {
                                    visited[key] = true;
                                    queue.push({ x: nx, y: ny, dist: curr.dist + 1 });
                                }
                            }
                        }
                    }
                }
            }
            return reachable;
        }

        function checkWin() {
            if (ENEMY_CITADEL.hp <= 0) {
                alert("🎉 ПОБЕДА! Вы уничтожили цитадель врага!");
                location.reload();
            } else if (PLAYER_CITADEL.hp <= 0) {
                alert("☠️ ПОРАЖЕНИЕ! Ваша цитадель разрушена!");
                location.reload();
            }
        }

        // РЕНДЕР И ИНТЕРФЕЙС
        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';

            const buyables = ['warrior', 'swordsman', 'archer', 'rider', 'ballista', 'vampire', 'wall', 'tower'];
            buyables.forEach(k => {
                const db = UNITS_DB[k];
                const btn = document.createElement('div');
                btn.className = `shop-btn ${selectedShopKey === k ? 'selected' : ''}`;
                btn.onclick = () => {
                    selectedShopKey = (selectedShopKey === k) ? null : k;
                    showDetails(db.name, `Стоимость: ${db.costG}💰 / ${db.costS}🪨. ${db.desc}`);
                    renderShop();
                };
                btn.innerHTML = `
                    <div style="font-size:14px">${db.icon}</div>
                    <div style="font-weight:bold">${db.costG}💰</div>
                    ${db.costS > 0 ? `<div style="color:#aaa">${db.costS}🪨</div>` : ''}
                `;
                list.appendChild(btn);
            });
        }

        function showUnitDetails(unit) {
            const db = UNITS_DB[unit.typeKey];
            const actPanel = document.getElementById('action-panel');
            actPanel.innerHTML = '';
            actPanel.style.display = 'flex';
            actPanel.style.gap = '4px';

            let html = `<b>${db.icon} ${db.name} (${unit.team === 'player' ? 'Союзник' : 'Враг'})</b><br>`;
            html += `HP: ${unit.hp}/${unit.maxHp} | Урон: ${db.dmg} | Дальность: ${db.range} | Ход: ${db.move}<br>`;
            html += `<span style="color:#f39c12">${db.desc}</span>`;

            if (unit.team === 'player') {
                if (db.upgrade) {
                    const upDb = UNITS_DB[db.upgrade];
                    const upBtn = document.createElement('button');
                    upBtn.className = 'btn btn-act';
                    upBtn.innerText = `Улучшить до ${upDb.name} (${upDb.costG}💰/${upDb.costS}🪨)`;
                    upBtn.onclick = () => upgradeUnit(unit);
                    actPanel.appendChild(upBtn);
                }
                if (unit.typeKey === 'vampire' && !unit.vampSkillUsed) {
                    const vBtn = document.createElement('button');
                    vBtn.className = 'btn btn-act';
                    vBtn.innerText = `🦇 Телепорт к Цитадели`;
                    vBtn.onclick = () => useVampireSkill(unit);
                    actPanel.appendChild(vBtn);
                }
                if (unit.typeKey === 'ancient_vampire') {
                    const vBtn = document.createElement('button');
                    vBtn.className = 'btn btn-act';
                    vBtn.innerText = `🦇 Блинк к Врагу (3кл)`;
                    vBtn.onclick = () => useAncientBlink(unit);
                    actPanel.appendChild(vBtn);
                }
            }

            document.getElementById('unit-details').innerHTML = html;
        }

        function showDetails(title, text) {
            document.getElementById('unit-details').innerHTML = `<b>${title}</b><br>${text}`;
            document.getElementById('action-panel').style.display = 'none';
        }

        function render() {
            document.querySelectorAll('.cell').forEach(c => {
                const x = parseInt(c.dataset.x);
                const y = parseInt(c.dataset.y);
                c.className = 'cell';
                c.innerHTML = '';

                if (isCitadelCell(x, y, PLAYER_CITADEL)) c.classList.add('citadel-cell');
                if (isCitadelCell(x, y, ENEMY_CITADEL)) c.classList.add('citadel-enemy');
            });

            if (activeUnit && activeUnit.team === 'player' && !activeUnit.acted) {
                const cell = getCell(activeUnit.x, activeUnit.y);
                if (cell) cell.classList.add('active-cell');

                const reachable = getReachableCells(activeUnit);
                reachable.forEach(rc => {
                    const c = getCell(rc.x, rc.y);
                    if (c) c.classList.add('reachable');
                });

                units.forEach(u => {
                    if (u.team === 'enemy' && canTarget(activeUnit, u.x, u.y)) {
                        const c = getCell(u.x, u.y);
                        if (c) c.classList.add('attackable');
                    }
                });

                if (canTarget(activeUnit, ENEMY_CITADEL.x + 1, ENEMY_CITADEL.y)) {
                    for (let cy = ENEMY_CITADEL.y; cy < ENEMY_CITADEL.y + ENEMY_CITADEL.h; cy++) {
                        for (let cx = ENEMY_CITADEL.x; cx < ENEMY_CITADEL.x + ENEMY_CITADEL.w; cx++) {
                            const c = getCell(cx, cy);
                            if (c) c.classList.add('attackable');
                        }
                    }
                }
            }

            units.forEach(u => {
                const c = getCell(u.x, u.y);
                if (c) {
                    const db = UNITS_DB[u.typeKey];
                    c.classList.add(u.team === 'player' ? 'player-unit' : 'enemy-unit');
                    c.innerHTML = `
                        <div class="unit-badge">${u.hp}/${u.maxHp}</div>
                        <div class="unit">${db.icon}</div>
                    `;
                }
            });
        }

        function getCell(x, y) { return document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`); }

        function log(msg, cls = '') {
            const box = document.getElementById('log-box');
            const div = document.createElement('div');
            if (cls) div.className = cls;
            div.innerText = msg;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        init();
    </script>
</body>
