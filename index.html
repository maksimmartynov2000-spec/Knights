<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пошаговая Тактическая Игра</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e1e;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        #game-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(12, 40px);
            grid-template-rows: repeat(12, 40px);
            gap: 1px;
            background-color: #333;
            border: 1px solid #444;
        }

        .cell {
            width: 40px;
            height: 40px;
            background-color: #2a2a2a;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            cursor: pointer;
            user-select: none;
            box-sizing: border-box;
        }

        .cell.obstacle {
            background-color: #444;
        }

        .cell.move-highlight {
            background-color: rgba(0, 255, 0, 0.2);
        }

        .cell.attack-highlight {
            background-color: rgba(255, 0, 0, 0.3);
        }

        .unit {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 11px;
            color: #fff;
            position: absolute;
            box-sizing: border-box;
        }

        .unit.player { border: 2px solid #00f; }
        .unit.enemy { border: 2px solid #f00; }

        .unit-swordsman { background-color: #e74c3c; }
        .unit-archer { background-color: #2ecc71; }
        .unit-mage { background-color: #3498db; }

        .hp-bar {
            position: absolute;
            bottom: -4px;
            left: 2px;
            width: 28px;
            height: 3px;
            background-color: #555;
        }

        .hp-bar-fill {
            height: 100%;
            background-color: #2ecc71;
        }

        #ui-panel {
            width: 280px;
            background-color: #252525;
            padding: 15px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 6px 10px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 11px;
        }

        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        #log {
            height: 160px;
            overflow-y: auto;
            background-color: #000;
            padding: 8px;
            font-size: 11px;
            font-family: monospace;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<h3>Пошаговая Тактическая Игра</h3>

<div id="game-container">
    <div id="board"></div>

    <div id="ui-panel">
        <div id="status">Фаза: Подготовка</div>
        <div id="unit-info">Нажмите "Начать бой"</div>
        <hr style="width:100%; border-color:#333; margin: 5px 0;">
        <div class="btn-group">
            <button id="btn-start" onclick="startGame()">Начать бой</button>
            <button id="btn-end-turn" onclick="manualEndTurn()" disabled>Завершить ход</button>
        </div>
        <div id="abilities-container" style="display:flex; flex-direction:column; gap:5px; margin-top:5px;"></div>
        <hr style="width:100%; border-color:#333; margin: 5px 0;">
        <div id="log"></div>
    </div>
</div>

<script>
    const ROWS = 12;
    const COLS = 12;

    const UNIT_TYPES = {
        swordsman: { name: 'М', hp: 100, atk: 20, range: 1, move: 3 },
        archer: { name: 'Л', hp: 70, atk: 15, range: 4, move: 3 },
        mage: { name: 'М', hp: 60, atk: 25, range: 3, move: 2 }
    };

    let board = [];
    let units = [];
    let obstacles = [];
    let gamePhase = 'setup'; 
    let activeUnitIndex = 0;
    let activeUnit = null;

    function initBoard() {
        const boardElem = document.getElementById('board');
        boardElem.innerHTML = '';
        board = [];

        obstacles = [
            {r: 3, c: 3}, {r: 3, c: 4}, {r: 4, c: 3},
            {r: 8, c: 8}, {r: 8, c: 7}, {r: 7, c: 8}
        ];

        for (let r = 0; r < ROWS; r++) {
            board[r] = [];
            for (let c = 0; c < COLS; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                if (isObstacle(r, c)) cell.classList.add('obstacle');
                cell.dataset.row = r;
                cell.dataset.col = c;
                cell.onclick = () => onCellClick(r, c);
                boardElem.appendChild(cell);
                board[r][c] = cell;
            }
        }

        units = [
            createUnit('swordsman', 'player', 0, 0, 1, 10),
            createUnit('archer', 'player', 0, 1, 2, 10),
            createUnit('mage', 'player', 0, 2, 3, 10),

            createUnit('swordsman', 'enemy', 11, 11, 4, 5),
            createUnit('archer', 'enemy', 11, 10, 5, 5),
            createUnit('mage', 'enemy', 11, 9, 6, 5)
        ];

        renderBoard();
        logMessage("Игра готова. Нажмите 'Начать бой'.");
    }

    function createUnit(typeKey, team, r, c, id, initiative) {
        const type = UNIT_TYPES[typeKey];
        return {
            id: id,
            typeKey: typeKey,
            name: type.name,
            team: team,
            maxHp: type.hp,
            hp: type.hp,
            atk: type.atk,
            range: type.range,
            move: type.move,
            initiative: initiative,
            r: r,
            c: c,
            isAlive: true,
            hasMoved: false,
            hasActed: false,
            cooldowns: { heal: 0, buff: 0, arrowRain: 0, summonSwordsman: 0, summonArcher: 0, storm: 0, poisonZone: 0 },
            buffs: { reinforced: 0, noAttackDuration: 0 },
            dotPoison: [],
            arrowRainShotsLeft: 0
        };
    }

    function isObstacle(r, c) { return obstacles.some(o => o.r === r && o.c === c); }
    function getUnitAt(r, c) { return units.find(u => u.isAlive && u.r === r && u.c === c); }
    function getObstacleAt(r, c) { return isObstacle(r, c); }

    function logMessage(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `<div>${msg}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    function renderBoard() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                board[r][c].classList.remove('move-highlight', 'attack-highlight');
                board[r][c].innerHTML = '';
            }
        }

        units.filter(u => u.isAlive).forEach(u => {
            const unitElem = document.createElement('div');
            unitElem.className = `unit unit-${u.typeKey} ${u.team}`;
            unitElem.innerText = u.name;

            const hpBar = document.createElement('div');
            hpBar.className = 'hp-bar';
            const hpFill = document.createElement('div');
            hpFill.className = 'hp-bar-fill';
            hpFill.style.width = `${(u.hp / u.maxHp) * 100}%`;
            hpBar.appendChild(hpFill);
            unitElem.appendChild(hpBar);

            board[u.r][u.c].appendChild(unitElem);
        });

        updateUI();
    }

    function updateUI() {
        const status = document.getElementById('status');
        const unitInfo = document.getElementById('unit-info');

        if (gamePhase === 'setup') {
            status.innerText = "Фаза: Подготовка";
            unitInfo.innerText = "Нажмите 'Начать бой'";
            return;
        }

        if (gamePhase === 'ended') {
            status.innerText = "Игра окончена!";
            return;
        }

        if (activeUnit) {
            status.innerText = `Ход: ${activeUnit.team === 'player' ? 'Игрок' : 'Враг'}`;
            unitInfo.innerText = `${activeUnit.typeKey} [HP: ${activeUnit.hp}/${activeUnit.maxHp}]`;
        }
    }

    function startGame() {
        gamePhase = 'battle';
        document.getElementById('btn-start').disabled = true;
        document.getElementById('btn-end-turn').disabled = false;
        
        units.sort((a, b) => b.initiative - a.initiative);
        activeUnitIndex = 0;
        startTurn();
    }

    function startTurn() {
        activeUnit = units[activeUnitIndex];

        if (!activeUnit || !activeUnit.isAlive) {
            nextTurn();
            return;
        }

        activeUnit.hasMoved = false;
        activeUnit.hasActed = false;

        for (let key in activeUnit.cooldowns) {
            if (activeUnit.cooldowns[key] > 0) activeUnit.cooldowns[key]--;
        }

        if (activeUnit.dotPoison && activeUnit.dotPoison.length > 0) {
            let totalPoisonDmg = 0;
            activeUnit.dotPoison = activeUnit.dotPoison.map(p => {
                totalPoisonDmg += p.damage;
                p.duration--;
                return p;
            }).filter(p => p.duration > 0);

            if (totalPoisonDmg > 0) {
                activeUnit.hp -= totalPoisonDmg;
                logMessage(`${activeUnit.typeKey} получает ${totalPoisonDmg} урона от яда!`);
                if (activeUnit.hp <= 0) {
                    activeUnit.isAlive = false;
                    renderBoard();
                    checkWinConditions();
                    setTimeout(nextTurn, 500);
                    return;
                }
            }
        }

        renderBoard();

        if (activeUnit.team === 'enemy') {
            setTimeout(aiTurn, 600);
        } else {
            highlightPossibleMoves();
        }
    }

    function manualEndTurn() {
        if (!activeUnit.hasMoved && !activeUnit.hasActed) {
            const healAmount = Math.floor(activeUnit.maxHp * 0.20);
            activeUnit.hp = Math.min(activeUnit.maxHp, activeUnit.hp + healAmount);
            logMessage(`${activeUnit.typeKey} восстановил ${healAmount} HP (Пассивка "Живой")`);
        }
        nextTurn();
    }

    function endCurrentUnitTurn() {
        manualEndTurn();
    }

    function nextTurn() {
        checkWinConditions();
        if (gamePhase === 'ended') return;

        activeUnitIndex = (activeUnitIndex + 1) % units.length;
        startTurn();
    }

    function checkWinConditions() {
        const playerAlive = units.some(u => u.team === 'player' && u.isAlive);
        const enemyAlive = units.some(u => u.team === 'enemy' && u.isAlive);

        if (!playerAlive || !enemyAlive) {
            logMessage(playerAlive ? "Победа Игрока!" : "Победа Врага!");
            gamePhase = 'ended';
        }
    }

    function getDistanceUnit(u1, u2) { return Math.max(Math.abs(u1.r - u2.r), Math.abs(u1.c - u2.c)); }
    function getUnitEffectiveRange(u) { return u.range; }

    function getValidMoveCells(u) {
        let moves = [];
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                let dist = Math.abs(u.r - r) + Math.abs(u.c - c);
                if (dist > 0 && dist <= u.move && !isObstacle(r, c) && !getUnitAt(r, c)) {
                    moves.push({r, c});
                }
            }
        }
        return moves;
    }

    function highlightPossibleMoves() {
        if (activeUnit.hasMoved || activeUnit.team !== 'player') return;
        let moves = getValidMoveCells(activeUnit);
        moves.forEach(m => board[m.r][m.c].classList.add('move-highlight'));
    }

    function onCellClick(r, c) {
        if (gamePhase !== 'battle' || activeUnit.team !== 'player') return;

        const targetUnit = getUnitAt(r, c);

        if (!activeUnit.hasMoved && !targetUnit && board[r][c].classList.contains('move-highlight')) {
            activeUnit.r = r;
            activeUnit.c = c;
            activeUnit.hasMoved = true;
            renderBoard();
            return;
        }

        if (!activeUnit.hasActed && targetUnit && targetUnit.team !== activeUnit.team) {
            let dist = getDistanceUnit(activeUnit, targetUnit);
            if (dist <= activeUnit.range) {
                handleAttackAction(activeUnit, targetUnit);
            }
        }
    }

    function handleAttackAction(attacker, defender) {
        let dmg = attacker.atk;
        defender.hp -= dmg;
        attacker.hasActed = true;
        logMessage(`${attacker.typeKey} наносит ${dmg} урона по ${defender.typeKey}`);

        if (defender.hp <= 0) defender.isAlive = false;

        renderBoard();
        checkWinConditions();
    }

    // --- ОБНОВЛЕННЫЙ ИИ ДЛЯ ЛУЧНИКА ---
    function aiTurn() {
        if (gamePhase !== 'battle' || !activeUnit) return;
        let ai = activeUnit;
        let enemies = units.filter(u => u.team === 'player' && u.isAlive);
        let allies = units.filter(u => u.team === 'enemy' && u.isAlive);
        if (enemies.length === 0) return;

        // --- ЛОГИКА МЕЧНИКА ИИ ---
        if (ai.typeKey === 'swordsman') {
            if (ai.hp < ai.maxHp * 0.6 && ai.cooldowns.heal === 0) {
                ai.hp = Math.min(ai.maxHp, ai.hp + 30);
                ai.cooldowns.heal = 3; ai.hasActed = true;
                renderBoard(); setTimeout(endCurrentUnitTurn, 600); return;
            }
        }

        // --- УМНАЯ ЛОГИКА ЛУЧНИКА ИИ (С ЛЕЧЕНИЕМ И СКИПОМ ХОДА) ---
        if (ai.typeKey === 'archer') {
            let closestEnemyDist = Math.min(...enemies.map(e => getDistanceUnit(ai, e)));
            let hasPoison = ai.dotPoison && ai.dotPoison.length > 0;
            let isLowHp = ai.hp < ai.maxHp * 0.7;

            // 1. ПРОВЕРКА НА СКИП ХОДА: если яд или мало HP, и маг/враг не рядом вплотную
            if ((hasPoison || isLowHp) && closestEnemyDist > 1) {
                logMessage(`Лучник (ИИ) пропускает ход для лечения!`);
                ai.hasMoved = false;
                ai.hasActed = false;
                renderBoard();
                setTimeout(endCurrentUnitTurn, 600);
                return;
            }
        }

        // --- ЛОГИКА МАГА ИИ ---
        if (ai.typeKey === 'mage') {
            if (ai.cooldowns.poisonZone === 0) {
                enemies.forEach(e => {
                    if (!e.dotPoison) e.dotPoison = [];
                    e.dotPoison.push({ damage: 10, duration: 3 });
                });
                ai.cooldowns.poisonZone = 4;
                ai.hasActed = true;
                logMessage(`Маг применил яд!`);
                renderBoard(); setTimeout(endCurrentUnitTurn, 600); return;
            }
        }

        // --- ОБЩЕЕ ДВИЖЕНИЕ И АТАКА ---
        let validMoves = getValidMoveCells(ai);
        validMoves.push({ r: ai.r, c: ai.c });
        let bestMove = validMoves[0];
        let minDistance = 999;

        validMoves.forEach(pos => {
            enemies.forEach(e => {
                let d = getDistanceUnit(pos, e);
                if (d < minDistance) { minDistance = d; bestMove = pos; }
            });
        });

        ai.r = bestMove.r; ai.c = bestMove.c; ai.hasMoved = true;

        let inRangeEnemies = enemies.filter(e => getDistanceUnit(ai, e) <= ai.range);
        if (inRangeEnemies.length > 0) {
            handleAttackAction(ai, inRangeEnemies[0]);
            return;
        }

        renderBoard();
        setTimeout(endCurrentUnitTurn, 600);
    }

    window.onload = initBoard;
</script>

</body>
</html>
