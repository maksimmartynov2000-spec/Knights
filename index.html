<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рыцари: Битва 100 Героев</title>
    <style>
        :root {
            --bg-main: #0a0807;
            --bg-panel: #16120e;
            --border-gold: #c89b3c;
            --border-dark: #3a2a1d;
            --text-gold: #f3d179;
            --cell-size: 58px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Georgia', serif; user-select: none; }

        body {
            background: var(--bg-main);
            color: #e0d0c0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }

        h1 { color: var(--text-gold); text-shadow: 0 2px 8px rgba(0,0,0,0.8); margin-bottom: 6px; font-size: 20px; }

        .wrapper {
            display: flex;
            gap: 12px;
            background: var(--bg-panel);
            border: 2px solid var(--border-gold);
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }

        .sidebar { width: 300px; display: flex; flex-direction: column; gap: 6px; }

        .panel-box {
            background: #0f0c09;
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            padding: 8px;
        }

        .panel-title {
            color: var(--text-gold);
            font-size: 11px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-dark);
            padding-bottom: 4px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .shop-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            max-height: 380px;
            overflow-y: auto;
        }

        .shop-item {
            background: #1c1510;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 4px 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 10px;
            transition: all 0.2s;
        }

        .shop-item:hover { border-color: var(--border-gold); background: #281d15; }
        .shop-item.disabled { opacity: 0.25; cursor: not-allowed; }
        .shop-item.selected { border-color: #2ecc71; background: #142a18; }

        .shop-icon { font-size: 16px; }

        .game-section { display: flex; flex-direction: column; align-items: center; gap: 6px; }

        /* Шкала инициативы */
        #queue-bar {
            width: 100%;
            height: 42px;
            background: #0d0a08;
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            display: flex;
            align-items: center;
            padding: 0 6px;
            gap: 6px;
            overflow-x: auto;
        }

        .queue-card {
            width: 32px;
            height: 32px;
            background: #201711;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            position: relative;
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .queue-card.current { border-color: var(--text-gold); transform: scale(1.15); box-shadow: 0 0 8px var(--text-gold); }
        .queue-card.player { border-bottom: 2px solid #3498db; }
        .queue-card.enemy { border-bottom: 2px solid #e74c3c; }

        #turn-bar {
            width: 100%;
            background: #0f0c09;
            border: 1px solid var(--border-dark);
            padding: 6px 10px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-gold);
        }

        #board {
            display: grid;
            grid-template-columns: repeat(12, var(--cell-size));
            grid-template-rows: repeat(8, var(--cell-size));
            gap: 3px;
            background: #050403;
            padding: 5px;
            border: 2px solid var(--border-dark);
            border-radius: 6px;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: #18120d;
            border: 1px solid #281c13;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2px;
            position: relative;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }

        .cell:hover { border-color: #6d5032; }
        .cell.deploy-zone { background: #132a13; border-color: #27ae60; }
        .cell.reachable { background: #102619; border-color: #2ecc71; }
        .cell.attackable { background: #3b1414; border-color: #e74c3c; }
        .cell.active-cell { outline: 2px solid var(--text-gold); box-shadow: inset 0 0 8px rgba(243, 209, 121, 0.6); }

        /* Анимации боя */
        @keyframes hitShake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-4px, 2px); }
            50% { transform: translate(4px, -2px); }
            75% { transform: translate(-2px, -2px); }
            100% { transform: translate(0, 0); }
        }

        .shake { animation: hitShake 0.3s ease-in-out; }

        .unit { font-size: 24px; text-align: center; line-height: 1; margin-top: 1px; }

        .unit-badge {
            background: rgba(0,0,0,0.85);
            border-radius: 2px;
            padding: 0 2px;
            font-size: 8px;
            font-weight: bold;
            align-self: flex-start;
        }

        .player-unit .unit-badge { color: #5ad; }
        .enemy-unit .unit-badge { color: #f55; }

        .status-icons { font-size: 9px; position: absolute; right: 2px; top: 2px; }

        .btn {
            background: linear-gradient(180deg, #c89b3c 0%, #8a651e 100%);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }

        .btn:hover { filter: brightness(1.2); }

        #log-box {
            width: 100%;
            height: 70px;
            background: #070504;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 4px 8px;
            overflow-y: auto;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .log-hit { color: #e74c3c; }
        .log-move { color: #2ecc71; }
        .log-skill { color: #f39c12; }
    </style>
</head>
<body>

    <h1>⚔️ РЫЦАРИ: БИТВА 100 ГЕРОЕВ</h1>

    <div class="wrapper">
        <div class="sidebar">
            <div class="panel-box">
                <div class="panel-title">
                    <span>Выбор Войска</span>
                    <span id="limit-txt" style="color:#2ecc71">0 / 40 Очков</span>
                </div>
                <div class="shop-list" id="shop-list"></div>
            </div>

            <div class="panel-box">
                <div class="panel-title">Характеристики Воина</div>
                <div id="unit-details" style="font-size: 10px; color: #bbb; min-height: 85px;">
                    Выберите воина из списка слева.
                </div>
            </div>
        </div>

        <div class="game-section">
            <div id="queue-bar"></div>

            <div id="turn-bar">
                <span id="game-status">Соберите армию на 40 очков и нажмите "В БОЙ!"</span>
                <button class="btn" id="action-btn" onclick="startBattle()">В БОЙ!</button>
            </div>

            <div id="board"></div>

            <div id="log-box"></div>
        </div>
    </div>

    <script>
        const GRID_W = 12;
        const GRID_H = 8;
        const MAX_LIMIT = 40;

        // ГЕНЕРАТОР 100 УНИКАЛЬНЫХ ВОИНОВ
        const CLASSES = ['Пехота', 'Стрелок', 'Маг', 'Танк', 'Убийца', 'Поддержка', 'Босс'];
        const ICONS = [
            '🧑‍🌾','💀','👺','🛡️','👨‍🌾','🐺','🏹','🎯','⚔️','🧹','🗡️','🧙‍♂️','⚖️','🐎','👹','🐂','🦅','🗿','🐲','🧝‍♀️',
            '🧟‍♂️','🧛‍♂️','🧜‍♂️','🧞‍♂️','🧚‍♀️','🧌','🧜‍♀️','🦄','🐗','🦇','🦂','🐍','🕷️','🤖','👽','🥷','🤴','👸','👳‍♂️','🧙‍♀️',
            '🧟‍♀️','🤺','💂‍♂️','🕵️‍♂️','💂‍♀️','🥷','🧞‍♀️','👑','🔮','🧿','⚔️','🛡️','🏹','🪄','💣','🪓','🦯','🩸','🔥','❄️'
        ];

        function generate100Units() {
            const list = [];
            const prefixes = ['Древний', 'Теневой', 'Святой', 'Ледяной', 'Огненный', 'Ядовитый', 'Проклятый', 'Проклятый', 'Элитный', 'Королевский'];
            const names = ['Воин', 'Маг', 'Страж', 'Охотник', 'Ассасин', 'Рыцарь', 'Снайпер', 'Друид', 'Колдун', 'Разрушитель', 'Дух', 'Монстр', 'Титан', 'Демон', 'Паладин'];

            for (let i = 1; i <= 100; i++) {
                let cost = 1;
                if (i > 20) cost = 2;
                if (i > 45) cost = 3;
                if (i > 70) cost = 4;
                if (i > 88) cost = 5;
                if (i > 96) cost = 6;

                const name = `${prefixes[i % prefixes.length]} ${names[i % names.length]}`;
                const icon = ICONS[(i - 1) % ICONS.length];
                
                // Характеристики зависят от стоимости
                const hp = cost * 14 + (i % 7) * 3;
                const dmg = cost * 3 + (i % 5) * 2;
                const init = 8 + (i % 12);
                const move = 1 + (i % 3);
                const range = (i % 3 === 0) ? 3 + (i % 3) : 1;

                // Разнообразные способности
                let skill = '💥 Обычная атака';
                let skillType = 'none';

                if (i % 6 === 0) { skill = '🔥 Поджог (Периодический урон огнем)'; skillType = 'burn'; }
                else if (i % 6 === 1) { skill = '❄️ Заморозка (-1 к ходу и дальности)'; skillType = 'freeze'; }
                else if (i % 6 === 2) { skill = '⚡ Ядовитый урон (Накопительный урон)'; skillType = 'poison'; }
                else if (i % 6 === 3) { skill = '🛡️ Провокация (Заставляет врагов атаковать его)'; skillType = 'taunt'; }
                else if (i % 6 === 4) { skill = '💫 Оглушение (Шанс оглушить на 1 ход)'; skillType = 'stun'; }
                else if (i % 6 === 5) { skill = '🩸 Вампиризм (Восстанавливает HP при ударе)'; skillType = 'vamp'; }

                list.push({
                    id: 'u_' + i,
                    name: name,
                    icon: icon,
                    cost: cost,
                    hp: hp,
                    dmg: dmg,
                    init: init,
                    move: move,
                    range: range,
                    skill: skill,
                    skillType: skillType
                });
            }
            return list;
        }

        const UNITS_DB = generate100Units();

        let selectedShopUnit = null;
        let playerPoints = 0;
        let units = [];
        let turnQueue = [];
        let currentUnitIndex = 0;
        let gameState = 'DEPLOYMENT';

        function init() {
            createBoard();
            generateEnemyArmy();
            renderShop();
            render();
            log("Враг разместил отряды! Наберите армию на 40 очков.", "log-skill");
        }

        function generateEnemyArmy() {
            let pts = 0;
            let enemyId = 1;

            while (pts < MAX_LIMIT) {
                const remain = MAX_LIMIT - pts;
                const validUnits = UNITS_DB.filter(u => u.cost <= remain);
                const randomType = validUnits[Math.floor(Math.random() * validUnits.length)];

                let emptyCells = [];
                for (let y = 0; y < GRID_H; y++) {
                    for (let x = 8; x < GRID_W; x++) {
                        if (!units.find(u => u.x === x && u.y === y)) emptyCells.push({ x, y });
                    }
                }

                if (emptyCells.length === 0) break;
                const cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];

                units.push({
                    id: 'e_' + enemyId++,
                    team: 'enemy',
                    type: randomType,
                    maxHp: randomType.hp,
                    hp: randomType.hp,
                    x: cell.x, y: cell.y,
                    effects: {}
                });

                pts += randomType.cost;
            }
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let y = 0; y < GRID_H; y++) {
                for (let x = 0; x < GRID_W; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    cell.onclick = () => handleCellClick(x, y);
                    board.appendChild(cell);
                }
            }
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';

            UNITS_DB.forEach(u => {
                const item = document.createElement('div');
                const disabled = (playerPoints + u.cost > MAX_LIMIT);
                item.className = `shop-item ${selectedShopUnit === u ? 'selected' : ''} ${disabled ? 'disabled' : ''}`;
                item.onclick = () => {
                    if (gameState !== 'DEPLOYMENT') return;
                    selectedShopUnit = u;
                    showUnitDetails(u);
                    renderShop();
                    render();
                };
                item.innerHTML = `
                    <div class="shop-icon">${u.icon}</div>
                    <div>
                        <div style="font-weight:bold">${u.name}</div>
                        <div style="color:#aaa; font-size:9px">${u.cost} очк. | Скорость: ${u.init}</div>
                    </div>
                `;
                list.appendChild(item);
            });

            document.getElementById('limit-txt').innerText = `${playerPoints} / ${MAX_LIMIT} Очков`;
        }

        function handleCellClick(x, y) {
            const unitOnCell = units.find(u => u.x === x && u.y === y);

            if (gameState === 'DEPLOYMENT') {
                if (unitOnCell && unitOnCell.team === 'player') {
                    playerPoints -= unitOnCell.type.cost;
                    units = units.filter(u => u !== unitOnCell);
                    renderShop();
                    render();
                    return;
                }

                if (x <= 2 && selectedShopUnit && !unitOnCell) {
                    if (playerPoints + selectedShopUnit.cost <= MAX_LIMIT) {
                        units.push({
                            id: 'p_' + Date.now() + Math.random(),
                            team: 'player',
                            type: selectedShopUnit,
                            maxHp: selectedShopUnit.hp,
                            hp: selectedShopUnit.hp,
                            x: x, y: y,
                            effects: {}
                        });
                        playerPoints += selectedShopUnit.cost;
                        renderShop();
                        render();
                    }
                }
            } else if (gameState === 'BATTLE') {
                const cur = turnQueue[currentUnitIndex];
                if (!cur || cur.team !== 'player') return;

                const dist = Math.abs(x - cur.x) + Math.abs(y - cur.y);

                if (unitOnCell && unitOnCell.team === 'enemy' && dist <= cur.type.range) {
                    attack(cur, unitOnCell);
                    nextTurn();
                } else if (!unitOnCell && dist <= (cur.effects.freeze ? Math.max(1, cur.type.move - 1) : cur.type.move)) {
                    cur.x = x;
                    cur.y = y;
                    log(`Ваш ${cur.type.name} переместился`, 'log-move');
                    nextTurn();
                }
            }

            if (unitOnCell) showUnitDetails(unitOnCell.type, unitOnCell.hp);
        }

        function startBattle() {
            if (playerPoints === 0) {
                alert('Наберите войско!');
                return;
            }

            gameState = 'BATTLE';
            document.getElementById('action-btn').style.display = 'none';
            buildTurnQueue();
            runTurn();
        }

        function buildTurnQueue() {
            turnQueue = [...units].sort((a, b) => b.type.init - a.type.init);
            currentUnitIndex = 0;
            renderQueueBar();
        }

        function renderQueueBar() {
            const qBar = document.getElementById('queue-bar');
            qBar.innerHTML = '';
            turnQueue.forEach((u, idx) => {
                const card = document.createElement('div');
                card.className = `queue-card ${u.team} ${idx === currentUnitIndex ? 'current' : ''}`;
                card.innerHTML = u.type.icon;
                qBar.appendChild(card);
            });
        }

        function runTurn() {
            if (checkGameOver()) return;

            turnQueue = turnQueue.filter(u => units.includes(u));
            if (turnQueue.length === 0) buildTurnQueue();
            if (currentUnitIndex >= turnQueue.length) currentUnitIndex = 0;

            const cur = turnQueue[currentUnitIndex];
            renderQueueBar();

            // Применение эффектов начала хода
            applyStatusEffects(cur);

            if (cur.hp <= 0) {
                nextTurn();
                return;
            }

            render();

            if (cur.team === 'player') {
                document.getElementById('game-status').innerText = `ХОД: Ваш ${cur.type.name} (Скорость: ${cur.type.init})`;
            } else {
                document.getElementById('game-status').innerText = `ХОД ВРАГА: ${cur.type.name}...`;
                setTimeout(smartEnemyAI, 500);
            }
        }

        function applyStatusEffects(unit) {
            if (unit.effects.burn) {
                unit.hp -= 4;
                log(`🔥 ${unit.type.name} получает 4 урона от поджога!`, 'log-hit');
                unit.effects.burn--;
            }
            if (unit.effects.poison) {
                unit.hp -= unit.effects.poison * 3;
                log(`⚡ Яд разъедает ${unit.type.name}!`, 'log-hit');
            }
        }

        function nextTurn() {
            currentUnitIndex++;
            runTurn();
        }

        function attack(attacker, defender) {
            let dmg = attacker.type.dmg;

            // Визуальный эффект встряски
            const cell = getCell(defender.x, defender.y);
            if (cell) {
                cell.classList.add('shake');
                setTimeout(() => cell.classList.remove('shake'), 300);
            }

            // Наложение специфичных способностей
            if (attacker.type.skillType === 'burn') defender.effects.burn = 2;
            if (attacker.type.skillType === 'freeze') defender.effects.freeze = 2;
            if (attacker.type.skillType === 'poison') defender.effects.poison = (defender.effects.poison || 0) + 1;
            if (attacker.type.skillType === 'vamp') {
                attacker.hp = Math.min(attacker.maxHp, attacker.hp + Math.round(dmg * 0.4));
                log(`🩸 ${attacker.type.name} восстановил HP от вампиризма!`, 'log-skill');
            }

            defender.hp -= dmg;

            if (defender.hp <= 0) {
                log(`💥 ${attacker.type.name} уничтожил ${defender.type.name}!`, 'log-hit');
                units = units.filter(u => u !== defender);
            } else {
                log(`⚔️ ${attacker.type.name} нанес ${dmg} урона по ${defender.type.name}`, 'log-hit');
            }
        }

        // УМНЫЙ ИИ ВРАГА
        function smartEnemyAI() {
            const cur = turnQueue[currentUnitIndex];
            if (!cur || cur.team !== 'enemy') return;

            const playerUnits = units.filter(u => u.team === 'player');
            if (playerUnits.length === 0) return;

            // Проверка провокаторов (танков)
            let tauntTarget = playerUnits.find(p => p.type.skillType === 'taunt' && Math.abs(p.x - cur.x) + Math.abs(p.y - cur.y) <= cur.type.range);
            
            let target = tauntTarget;

            if (!target) {
                // ИИ ищет самую слабую цель (Low HP) или опасного мага/стрелка
                playerUnits.sort((a, b) => (a.hp / a.maxHp) - (b.hp / b.maxHp));
                target = playerUnits[0];
            }

            const dist = Math.abs(target.x - cur.x) + Math.abs(target.y - cur.y);

            if (dist <= cur.type.range) {
                attack(cur, target);
            } else {
                // Перемещение ближе к цели
                let bestX = cur.x, bestY = cur.y, bestDist = dist;
                for (let y = 0; y < GRID_H; y++) {
                    for (let x = 0; x < GRID_W; x++) {
                        const dToCell = Math.abs(x - cur.x) + Math.abs(y - cur.y);
                        if (!units.find(u => u.x === x && u.y === y) && dToCell <= cur.type.move) {
                            const dToT = Math.abs(x - target.x) + Math.abs(y - target.y);
                            if (dToT < bestDist) { bestDist = dToT; bestX = x; bestY = y; }
                        }
                    }
                }
                cur.x = bestX; cur.y = bestY;
                log(`👹 Вражеский ${cur.type.name} подбирается к вашей цели`, 'log-move');
            }
            nextTurn();
        }

        function render() {
            document.querySelectorAll('.cell').forEach(c => {
                c.className = 'cell';
                c.innerHTML = '';
            });

            if (gameState === 'DEPLOYMENT') {
                for (let y = 0; y < GRID_H; y++) {
                    for (let x = 0; x <= 2; x++) {
                        if (!units.find(u => u.x === x && u.y === y)) {
                            getCell(x, y).classList.add('deploy-zone');
                        }
                    }
                }
            }

            if (gameState === 'BATTLE' && turnQueue.length > 0) {
                const cur = turnQueue[currentUnitIndex];
                if (cur && cur.team === 'player') {
                    getCell(cur.x, cur.y).classList.add('active-cell');

                    units.forEach(u => {
                        const dist = Math.abs(u.x - cur.x) + Math.abs(u.y - cur.y);
                        if (u.team === 'enemy' && dist <= cur.type.range) {
                            getCell(u.x, u.y).classList.add('attackable');
                        }
                    });

                    for (let y = 0; y < GRID_H; y++) {
                        for (let x = 0; x < GRID_W; x++) {
                            const dist = Math.abs(x - cur.x) + Math.abs(y - cur.y);
                            if (!units.find(u => u.x === x && u.y === y) && dist <= cur.type.move) {
                                getCell(x, y).classList.add('reachable');
                            }
                        }
                    }
                }
            }

            units.forEach(u => {
                const cell = getCell(u.x, u.y);
                if (cell) {
                    cell.classList.add(u.team === 'player' ? 'player-unit' : 'enemy-unit');
                    
                    let statusHtml = '';
                    if (u.effects.burn) statusHtml += '🔥';
                    if (u.effects.freeze) statusHtml += '❄️';
                    if (u.effects.poison) statusHtml += '⚡';

                    cell.innerHTML = `
                        <div class="unit-badge">${u.hp}/${u.maxHp} HP</div>
                        <div class="status-icons">${statusHtml}</div>
                        <div class="unit">${u.type.icon}</div>
                    `;
                }
            });
        }

        function checkGameOver() {
            const pAlive = units.some(u => u.team === 'player');
            const eAlive = units.some(u => u.team === 'enemy');

            if (!pAlive || !eAlive) {
                gameState = 'END';
                document.getElementById('game-status').innerText = pAlive ? 'Победа!' : 'Поражение!';
                log(pAlive ? '🎉 ВЫ ПОБЕДИЛИ!' : '☠️ ВАША АРМИЯ РАЗБИТА!', 'log-skill');
                render();
                return true;
            }
            return false;
        }

        function showUnitDetails(type, currentHp) {
            document.getElementById('unit-details').innerHTML = `
                <div style="font-size:13px; font-weight:bold; color:var(--text-gold)">${type.icon} ${type.name}</div>
                <div>Стоимость: <b>${type.cost} очк.</b> | Инициатива: <b>${type.init}</b></div>
                <div>Здоровье: <b>${currentHp || type.hp}/${type.hp} HP</b></div>
                <div>Урон: <b>${type.dmg}</b></div>
                <div>Ход: <b>${type.move} кл.</b> | Атака: <b>${type.range} кл.</b></div>
                <div style="margin-top: 4px; color: #f39c12;">${type.skill}</div>
            `;
        }

        function getCell(x, y) {
            return document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
        }

        function log(msg, cls = '') {
            const box = document.getElementById('log-box');
            const div = document.createElement('div');
            if (cls) div.className = cls;
            div.innerText = msg;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        init();
    </script>
</body>
</html>
