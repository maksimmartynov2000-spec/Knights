<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рыцари: Битва Героев</title>
    <style>
        :root {
            --bg-main: #0c0a08;
            --bg-panel: #181310;
            --border-gold: #c89b3c;
            --border-dark: #3a2a1d;
            --text-gold: #f3d179;
            --cell-size: 68px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Georgia', serif; user-select: none; }
        
        body {
            background: var(--bg-main);
            color: #e0d0c0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }

        h1 { color: var(--text-gold); text-shadow: 0 2px 8px rgba(0,0,0,0.8); margin-bottom: 8px; font-size: 22px; }

        .wrapper {
            display: flex;
            gap: 15px;
            background: var(--bg-panel);
            border: 2px solid var(--border-gold);
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }

        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 8px; }

        .panel-box {
            background: #110d0a;
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            padding: 8px;
        }

        .panel-title {
            color: var(--text-gold);
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-dark);
            padding-bottom: 4px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .shop-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 4px;
            max-height: 240px;
            overflow-y: auto;
        }

        .shop-item {
            background: #201712;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 4px 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 11px;
        }

        .shop-item:hover { border-color: var(--border-gold); background: #2a1e17; }
        .shop-item.disabled { opacity: 0.3; cursor: not-allowed; }

        .shop-icon { font-size: 18px; }

        .game-section { display: flex; flex-direction: column; align-items: center; gap: 8px; }

        #turn-bar {
            width: 100%;
            background: #110d0a;
            border: 1px solid var(--border-dark);
            padding: 6px 12px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-gold);
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, var(--cell-size));
            grid-template-rows: repeat(5, var(--cell-size));
            gap: 4px;
            background: #080605;
            padding: 6px;
            border: 2px solid var(--border-dark);
            border-radius: 6px;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: #1c1510;
            border: 1px solid #2b1f16;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2px 4px;
            position: relative;
            cursor: pointer;
        }

        .cell:hover { border-color: #6d5032; }
        .cell.deploy-zone { background: #183317; border-color: #27ae60; }
        .cell.reachable { background: #142b1c; border-color: #2ecc71; }
        .cell.attackable { background: #421818; border-color: #e74c3c; }
        .cell.active-cell { outline: 2px solid var(--text-gold); box-shadow: inset 0 0 10px rgba(243, 209, 121, 0.6); }

        .unit { font-size: 28px; text-align: center; line-height: 1; }

        .unit-badge {
            background: rgba(0,0,0,0.85);
            border-radius: 3px;
            padding: 0px 3px;
            font-size: 9px;
            font-weight: bold;
            align-self: flex-start;
        }

        .player-unit .unit-badge { color: #5ad; }
        .enemy-unit .unit-badge { color: #f55; }

        .btn {
            background: linear-gradient(180deg, #c89b3c 0%, #8a651e 100%);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn:hover { filter: brightness(1.2); }

        #log-box {
            width: 100%;
            height: 80px;
            background: #090706;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 6px;
            overflow-y: auto;
            font-size: 11px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .log-hit { color: #e74c3c; }
        .log-move { color: #2ecc71; }
        .log-skill { color: #f39c12; }
    </style>
</head>
<body>

    <h1>⚔️ РЫЦАРИ: БИТВА ГЕРОЕВ</h1>

    <div class="wrapper">
        <div class="sidebar">
            <div class="panel-box">
                <div class="panel-title">
                    <span>Выбор Войска</span>
                    <span id="limit-txt" style="color:#2ecc71">0 / 20 Очков</span>
                </div>
                <div class="shop-list" id="shop-list"></div>
            </div>

            <div class="panel-box">
                <div class="panel-title">Характеристики Воина</div>
                <div id="unit-details" style="font-size: 11px; color: #bbb; min-height: 90px;">
                    Нажмите на воина в магазине или на поле.
                </div>
            </div>
        </div>

        <div class="game-section">
            <div id="turn-bar">
                <span id="game-status">Соберите отряд на 20 очков и нажмите "В БОЙ!"</span>
                <button class="btn" id="action-btn" onclick="startBattle()">В БОЙ!</button>
            </div>

            <div id="board"></div>

            <div id="log-box"></div>
        </div>
    </div>

    <script>
        const GRID_W = 8;
        const GRID_H = 5;
        const MAX_LIMIT = 20;

        // 20 ВОИНОВ С ИНИЦИАТИВОЙ И УНИКАЛЬНЫМИ СПОСОБНОСТЯМИ
        const UNITS_DB = [
            { id: 'u1',  name: 'Крестьянин', icon: '🧑‍🌾', cost: 1, hp: 10, dmg: 2, init: 10, move: 2, range: 1, skill: '🛡️ Плотный строй (+2 HP около союзников)' },
            { id: 'u2',  name: 'Скелет',     icon: '💀', cost: 1, hp: 12, dmg: 3, init: 11, move: 2, range: 1, skill: '☠️ Костяной щит (Блок 1-го удара)' },
            { id: 'u3',  name: 'Гоблин',     icon: '👺', cost: 1, hp: 8,  dmg: 4, init: 18, move: 3, range: 1, skill: '🗡️ Удар в спину (x2 урон с разгона)' },
            { id: 'u4',  name: 'Стражник',   icon: '🛡️', cost: 1, hp: 20, dmg: 4, init: 9,  move: 2, range: 1, skill: '🛡️ Провокация (Агр врагов на 1 ход)' },
            { id: 'u5',  name: 'Ополченец',  icon: '👨‍🌾', cost: 1, hp: 14, dmg: 3, init: 12, move: 2, range: 1, skill: '⚔️ Контратака (Отвечает на урон)' },
            { id: 'u6',  name: 'Волк',       icon: '🐺', cost: 1, hp: 10, dmg: 5, init: 19, move: 3, range: 1, skill: '🩸 Запах крови (+50% по раненым)' },
            { id: 'u7',  name: 'Арбалетчик', icon: '🏹', cost: 2, hp: 12, dmg: 5, init: 13, move: 1, range: 3, skill: '🎯 Бронебойность (Игнорирует броню)' },
            { id: 'u8',  name: 'Лучник',     icon: '🎯', cost: 2, hp: 10, dmg: 4, init: 14, move: 1, range: 5, skill: '🏹 Снайпер (Дальняя стрельба)' },
            { id: 'u9',  name: 'Мечник',     icon: '⚔️', cost: 2, hp: 22, dmg: 6, init: 12, move: 2, range: 1, skill: '💥 Крит (25% шанс х2 урона)' },
            { id: 'u10', name: 'Копейщик',   icon: '🧹', cost: 2, hp: 20, dmg: 5, init: 11, move: 2, range: 2, skill: '🧹 Длинное копье (Бить через 1 кл.)' },
            { id: 'u11', name: 'Ассасин',    icon: '🗡️', cost: 2, hp: 14, dmg: 9, init: 20, move: 3, range: 1, skill: '⚡ Отравленный клинок' },
            { id: 'u12', name: 'Маг Огня',   icon: '🧙‍♂️', cost: 3, hp: 12, dmg: 10, init: 15, move: 1, range: 3, skill: '🔥 Поджог (Горение врага)' },
            { id: 'u13', name: 'Паладин',    icon: '⚖️', cost: 3, hp: 30, dmg: 8, init: 10, move: 2, range: 1, skill: '✨ Святой щит (Танкование)' },
            { id: 'u14', name: 'Некромант',  icon: '🧙‍♂️', cost: 3, hp: 15, dmg: 7, init: 13, move: 1, range: 4, skill: '💀 Жатва душ (Вампиризм)' },
            { id: 'u15', name: 'Всадник',    icon: '🐎', cost: 3, hp: 28, dmg: 9, init: 16, move: 4, range: 1, skill: '🐎 Таранный удар' },
            { id: 'u16', name: 'Орк-Берсерк',icon: '👹', cost: 4, hp: 40, dmg: 11, init: 14, move: 2, range: 1, skill: '🩸 Ярость (Больше урона при лоу HP)' },
            { id: 'u17', name: 'Минотавр',   icon: '🐂', cost: 4, hp: 45, dmg: 10, init: 8,  move: 2, range: 1, skill: '💫 Оглушающий топор' },
            { id: 'u18', name: 'Грифон',     icon: '🦅', cost: 4, hp: 35, dmg: 12, init: 17, move: 4, range: 1, skill: '🦅 Пике с воздуха' },
            { id: 'u19', name: 'Голем',      icon: '🗿', cost: 5, hp: 65, dmg: 12, init: 5,  move: 1, range: 1, skill: '🗿 Каменный панцирь (-30% урона)' },
            { id: 'u20', name: 'Дракон',     icon: '🐲', cost: 5, hp: 55, dmg: 15, init: 15, move: 3, range: 2, skill: '🐲 Дыхание дракона' }
        ];

        let selectedShopUnit = null;
        let playerPoints = 0;
        let units = [];
        let turnQueue = []; // Очередь ходов по инициативе
        let currentUnitIndex = 0;
        let gameState = 'DEPLOYMENT';

        function init() {
            createBoard();
            generateEnemyArmy();
            renderShop();
            render();
            log("Враг выставил армию! Нанимайте отряды слева и размещайте в зеленых клетках.", "log-skill");
        }

        function generateEnemyArmy() {
            let pts = 0;
            let enemyId = 1;

            while (pts < MAX_LIMIT) {
                const remain = MAX_LIMIT - pts;
                const validUnits = UNITS_DB.filter(u => u.cost <= remain);
                const randomType = validUnits[Math.floor(Math.random() * validUnits.length)];

                let emptyCells = [];
                for (let y = 0; y < GRID_H; y++) {
                    for (let x = 5; x < GRID_W; x++) {
                        if (!units.find(u => u.x === x && u.y === y)) emptyCells.push({ x, y });
                    }
                }

                if (emptyCells.length === 0) break;
                const cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];

                units.push({
                    id: 'e_' + enemyId++,
                    team: 'enemy',
                    type: randomType,
                    maxHp: randomType.hp,
                    hp: randomType.hp,
                    x: cell.x, y: cell.y
                });

                pts += randomType.cost;
            }
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let y = 0; y < GRID_H; y++) {
                for (let x = 0; x < GRID_W; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    cell.onclick = () => handleCellClick(x, y);
                    board.appendChild(cell);
                }
            }
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';

            UNITS_DB.forEach(u => {
                const item = document.createElement('div');
                const disabled = (playerPoints + u.cost > MAX_LIMIT);
                item.className = `shop-item ${selectedShopUnit === u ? 'selected' : ''} ${disabled ? 'disabled' : ''}`;
                item.onclick = () => {
                    if (gameState !== 'DEPLOYMENT') return;
                    selectedShopUnit = u;
                    showUnitDetails(u);
                    renderShop();
                    render();
                };
                item.innerHTML = `
                    <div class="shop-icon">${u.icon}</div>
                    <div>
                        <div style="font-weight:bold">${u.name}</div>
                        <div style="color:#aaa; font-size:10px">${u.cost} очк. | Скорость: ${u.init}</div>
                    </div>
                `;
                list.appendChild(item);
            });

            document.getElementById('limit-txt').innerText = `${playerPoints} / ${MAX_LIMIT} Очков`;
        }

        function handleCellClick(x, y) {
            const unitOnCell = units.find(u => u.x === x && u.y === y);

            if (gameState === 'DEPLOYMENT') {
                if (unitOnCell && unitOnCell.team === 'player') {
                    playerPoints -= unitOnCell.type.cost;
                    units = units.filter(u => u !== unitOnCell);
                    renderShop();
                    render();
                    return;
                }

                if (x <= 1 && selectedShopUnit && !unitOnCell) {
                    if (playerPoints + selectedShopUnit.cost <= MAX_LIMIT) {
                        units.push({
                            id: 'p_' + Date.now(),
                            team: 'player',
                            type: selectedShopUnit,
                            maxHp: selectedShopUnit.hp,
                            hp: selectedShopUnit.hp,
                            x: x, y: y
                        });
                        playerPoints += selectedShopUnit.cost;
                        renderShop();
                        render();
                    }
                }
            } else if (gameState === 'BATTLE') {
                const cur = turnQueue[currentUnitIndex];
                if (!cur || cur.team !== 'player') return;

                const dist = Math.abs(x - cur.x) + Math.abs(y - cur.y);

                if (unitOnCell && unitOnCell.team === 'enemy' && dist <= cur.type.range) {
                    attack(cur, unitOnCell);
                    nextTurn();
                } else if (!unitOnCell && dist <= cur.type.move) {
                    cur.x = x;
                    cur.y = y;
                    log(`Ваш ${cur.type.name} переместился`, 'log-move');
                    nextTurn();
                }
            }

            if (unitOnCell) showUnitDetails(unitOnCell.type, unitOnCell.hp);
        }

        function startBattle() {
            if (playerPoints === 0) {
                alert('Соберите армию!');
                return;
            }

            gameState = 'BATTLE';
            document.getElementById('action-btn').style.display = 'none';
            buildTurnQueue();
            runTurn();
        }

        // ПОСТРОЕНИЕ ОЧЕРЕДИ ХОДОВ ПО ИНИЦИАТИВЕ
        function buildTurnQueue() {
            turnQueue = [...units].sort((a, b) => b.type.init - a.type.init);
            currentUnitIndex = 0;
        }

        function runTurn() {
            if (checkGameOver()) return;

            // Очистка погибших юнитов из очереди
            turnQueue = turnQueue.filter(u => units.includes(u));
            if (turnQueue.length === 0) {
                buildTurnQueue();
            }

            if (currentUnitIndex >= turnQueue.length) {
                currentUnitIndex = 0;
            }

            const cur = turnQueue[currentUnitIndex];
            render();

            if (cur.team === 'player') {
                document.getElementById('game-status').innerText = `ХОД: Ваш ${cur.type.name} (Скорость: ${cur.type.init})`;
            } else {
                document.getElementById('game-status').innerText = `ХОД ВРАГА: ${cur.type.name}...`;
                setTimeout(enemyAI, 600);
            }
        }

        function nextTurn() {
            currentUnitIndex++;
            runTurn();
        }

        function attack(attacker, defender) {
            let dmg = attacker.type.dmg;

            // Применение пассивок
            if (attacker.type.name === 'Мечник' && Math.random() < 0.25) {
                dmg *= 2;
                log(`💥 КРИТИЧЕСКИЙ УДАР от Мечника!`, 'log-skill');
            }
            if (defender.type.name === 'Голем') {
                dmg = Math.round(dmg * 0.7); // Каменный панцирь
            }

            defender.hp -= dmg;

            if (defender.hp <= 0) {
                log(`💥 ${attacker.type.name} уничтожил ${defender.type.name}!`, 'log-hit');
                units = units.filter(u => u !== defender);
            } else {
                log(`⚔️ ${attacker.type.name} нанес ${dmg} урона по ${defender.type.name}`, 'log-hit');
            }
        }

        function enemyAI() {
            const cur = turnQueue[currentUnitIndex];
            if (!cur || cur.team !== 'enemy') return;

            let target = null;
            let minD = 999;

            units.filter(u => u.team === 'player').forEach(p => {
                const d = Math.abs(p.x - cur.x) + Math.abs(p.y - cur.y);
                if (d < minD) { minD = d; target = p; }
            });

            if (target) {
                if (minD <= cur.type.range) {
                    attack(cur, target);
                } else {
                    let bestX = cur.x, bestY = cur.y, bestDist = minD;
                    for (let y = 0; y < GRID_H; y++) {
                        for (let x = 0; x < GRID_W; x++) {
                            const dToCell = Math.abs(x - cur.x) + Math.abs(y - cur.y);
                            if (!units.find(u => u.x === x && u.y === y) && dToCell <= cur.type.move) {
                                const dToT = Math.abs(x - target.x) + Math.abs(y - target.y);
                                if (dToT < bestDist) { bestDist = dToT; bestX = x; bestY = y; }
                            }
                        }
                    }
                    cur.x = bestX; cur.y = bestY;
                    log(`👹 Вражеский ${cur.type.name} продвинулся`, 'log-move');
                }
            }
            nextTurn();
        }

        function render() {
            document.querySelectorAll('.cell').forEach(c => {
                c.className = 'cell';
                c.innerHTML = '';
            });

            if (gameState === 'DEPLOYMENT') {
                for (let y = 0; y < GRID_H; y++) {
                    for (let x = 0; x <= 1; x++) {
                        if (!units.find(u => u.x === x && u.y === y)) {
                            getCell(x, y).classList.add('deploy-zone');
                        }
                    }
                }
            }

            if (gameState === 'BATTLE' && turnQueue.length > 0) {
                const cur = turnQueue[currentUnitIndex];
                if (cur && cur.team === 'player') {
                    getCell(cur.x, cur.y).classList.add('active-cell');

                    units.forEach(u => {
                        const dist = Math.abs(u.x - cur.x) + Math.abs(u.y - cur.y);
                        if (u.team === 'enemy' && dist <= cur.type.range) {
                            getCell(u.x, u.y).classList.add('attackable');
                        }
                    });

                    for (let y = 0; y < GRID_H; y++) {
                        for (let x = 0; x < GRID_W; x++) {
                            const dist = Math.abs(x - cur.x) + Math.abs(y - cur.y);
                            if (!units.find(u => u.x === x && u.y === y) && dist <= cur.type.move) {
                                getCell(x, y).classList.add('reachable');
                            }
                        }
                    }
                }
            }

            units.forEach(u => {
                const cell = getCell(u.x, u.y);
                if (cell) {
                    cell.classList.add(u.team === 'player' ? 'player-unit' : 'enemy-unit');
                    cell.innerHTML = `
                        <div class="unit-badge">${u.hp}/${u.maxHp} HP</div>
                        <div class="unit">${u.type.icon}</div>
                    `;
                }
            });
        }

        function checkGameOver() {
            const pAlive = units.some(u => u.team === 'player');
            const eAlive = units.some(u => u.team === 'enemy');

            if (!pAlive || !eAlive) {
                gameState = 'END';
                document.getElementById('game-status').innerText = pAlive ? 'Победа!' : 'Поражение!';
                log(pAlive ? '🎉 ВЫ ПОБЕДИЛИ!' : '☠️ ВАША АРМИЯ РАЗБИТА!', 'log-skill');
                render();
                return true;
            }
            return false;
        }

        function showUnitDetails(type, currentHp) {
            document.getElementById('unit-details').innerHTML = `
                <div style="font-size:14px; font-weight:bold; color:var(--text-gold)">${type.icon} ${type.name}</div>
                <div>Стоимость: <b>${type.cost} очк.</b> | Скорость: <b>${type.init}</b></div>
                <div>Здоровье: <b>${currentHp || type.hp}/${type.hp} HP</b></div>
                <div>Урон: <b>${type.dmg}</b></div>
                <div>Ход: <b>${type.move} кл.</b> | Атака: <b>${type.range} кл.</b></div>
                <div style="margin-top: 4px; color: #f39c12;">${type.skill}</div>
            `;
        }

        function getCell(x, y) {
            return document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
        }

        function log(msg, cls = '') {
            const box = document.getElementById('log-box');
            const div = document.createElement('div');
            if (cls) div.className = cls;
            div.innerText = msg;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        init();
    </script>
</body>
</html>
