<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рыцари: Битва Героев (Тактика)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #1a1510; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }

        h1 { color: #f1c40f; margin-bottom: 10px; text-shadow: 2px 2px 4px #000; }
        
        #game-board {
            display: grid;
            grid-template-columns: repeat(8, 65px);
            grid-template-rows: repeat(5, 65px);
            gap: 4px;
            background: #2b1d0c;
            padding: 10px;
            border: 4px solid #8b5a2b;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .cell {
            width: 65px;
            height: 65px;
            background: #3a2a1a;
            border: 1px solid #5a4028;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 4px;
            cursor: pointer;
            position: relative;
            user-select: none;
        }

        .cell:hover { border-color: #f1c40f; }
        .cell.reachable { background: #2e4d25; border-color: #27ae60; } /* Зеленая подсветка для хода */
        .cell.attackable { background: #5c1d1d; border-color: #e74c3c; } /* Красная подсветка для атаки */

        .unit {
            font-size: 28px;
            line-height: 1;
            margin-top: 2px;
        }

        .unit-count {
            font-size: 11px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 1px 4px;
            border-radius: 3px;
            color: #fff;
        }

        .player-unit { color: #3498db; }
        .enemy-unit { color: #e74c3c; }

        .active-unit {
            outline: 2px solid #f1c40f;
            box-shadow: inset 0 0 10px #f1c40f;
        }

        #turn-info { margin: 10px; font-size: 16px; font-weight: bold; color: #e67e22; }

        #log-box {
            width: 540px;
            height: 100px;
            background: #0f0b07;
            border: 2px solid #5a4028;
            border-radius: 6px;
            padding: 8px;
            overflow-y: auto;
            margin-top: 10px;
            font-size: 13px;
        }

        .log-hit { color: #e74c3c; }
        .log-move { color: #2ecc71; }
        .log-system { color: #f1c40f; }
    </style>
</head>
<body>

    <h1>Рыцари: Битва Героев</h1>
    <div id="turn-info">Загрузка...</div>
    <div id="game-board"></div>
    <div id="log-box"></div>

    <script>
        const GRID_WIDTH = 8;
        const GRID_HEIGHT = 5;

        // Данные о юнитах
        const UNIT_TYPES = {
            KNIGHT: { name: 'Рыцарь', icon: '🛡️', hp: 20, dmg: 5, moveRange: 2, attackRange: 1, isRanged: false },
            ARCHER: { name: 'Лучник', icon: '🏹', hp: 12, dmg: 4, moveRange: 1, attackRange: 4, isRanged: true },
            SKELETON: { name: 'Скелет', icon: '💀', hp: 15, dmg: 4, moveRange: 2, attackRange: 1, isRanged: false }
        };

        // Размещение отрядов на поле
        let units = [
            // Игрок (Слева)
            { id: 1, team: 'player', type: UNIT_TYPES.KNIGHT, count: 5, hp: 20, x: 0, y: 1 },
            { id: 2, team: 'player', type: UNIT_TYPES.ARCHER, count: 8, hp: 12, x: 0, y: 3 },
            
            // Враг (Справа)
            { id: 3, team: 'enemy', type: UNIT_TYPES.SKELETON, count: 10, hp: 15, x: 7, y: 1 },
            { id: 4, team: 'enemy', type: UNIT_TYPES.SKELETON, count: 6, hp: 15, x: 7, y: 3 }
        ];

        let activeUnitIndex = 0;

        function initBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';

            for (let y = 0; y < GRID_HEIGHT; y++) {
                for (let x = 0; x < GRID_WIDTH; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    cell.onclick = () => onCellClick(x, y);
                    board.appendChild(cell);
                }
            }
            render();
        }

        function getCurrentUnit() {
            return units[activeUnitIndex];
        }

        function render() {
            // Очистка клеток
            document.querySelectorAll('.cell').forEach(cell => {
                cell.innerHTML = '';
                cell.className = 'cell';
            });

            const currentUnit = getCurrentUnit();

            // Отрисовка юнитов
            units.forEach(u => {
                const cell = getCell(u.x, u.y);
                if (cell) {
                    const unitDiv = document.createElement('div');
                    unitDiv.className = `unit ${u.team === 'player' ? 'player-unit' : 'enemy-unit'}`;
                    unitDiv.innerText = u.type.icon;

                    const countDiv = document.createElement('div');
                    countDiv.className = 'unit-count';
                    countDiv.innerText = u.count;

                    cell.appendChild(unitDiv);
                    cell.appendChild(countDiv);

                    if (u === currentUnit) {
                        cell.classList.add('active-unit');
                    }
                }
            });

            // Подсветка ходов и атак
            if (currentUnit) {
                document.getElementById('turn-info').innerText = 
                    `Ход: ${currentUnit.team === 'player' ? 'Игрок' : 'Враг'} (${currentUnit.type.name} x${currentUnit.count})`;

                for (let y = 0; y < GRID_HEIGHT; y++) {
                    for (let x = 0; x < GRID_WIDTH; x++) {
                        const dist = Math.abs(x - currentUnit.x) + Math.abs(y - currentUnit.y);
                        const targetUnit = getUnitAt(x, y);

                        // Проверка перемещения
                        if (!targetUnit && dist <= currentUnit.type.moveRange) {
                            getCell(x, y).classList.add('reachable');
                        }

                        // Проверка атаки
                        if (targetUnit && targetUnit.team !== currentUnit.team && dist <= currentUnit.type.attackRange) {
                            getCell(x, y).classList.add('attackable');
                        }
                    }
                }
            }
        }

        function getCell(x, y) {
            return document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
        }

        function getUnitAt(x, y) {
            return units.find(u => u.x === x && u.y === y);
        }

        function log(msg, type = '') {
            const logBox = document.getElementById('log-box');
            const p = document.createElement('p');
            if (type) p.className = type;
            p.innerText = msg;
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function nextTurn() {
            if (checkGameOver()) return;

            activeUnitIndex = (activeUnitIndex + 1) % units.length;
            render();

            // ИИ для врага
            const currentUnit = getCurrentUnit();
            if (currentUnit.team === 'enemy') {
                setTimeout(enemyAI, 600);
            }
        }

        function onCellClick(x, y) {
            const currentUnit = getCurrentUnit();
            if (!currentUnit || currentUnit.team !== 'player') return;

            const targetUnit = getUnitAt(x, y);
            const dist = Math.abs(x - currentUnit.x) + Math.abs(y - currentUnit.y);

            // Атака врага
            if (targetUnit && targetUnit.team === 'enemy' && dist <= currentUnit.type.attackRange) {
                attack(currentUnit, targetUnit);
                nextTurn();
            } 
            // Перемещение
            else if (!targetUnit && dist <= currentUnit.type.moveRange) {
                currentUnit.x = x;
                currentUnit.y = y;
                log(`Вы переместили ${currentUnit.type.name} на (${x + 1}, ${y + 1})`, 'log-move');
                nextTurn();
            }
        }

        function attack(attacker, defender) {
            // Урон зависит от количества воинов в отряде
            const totalDamage = attacker.count * attacker.type.dmg;
            
            // Расчет уничтожения юнитов
            let remainingHpPool = (defender.count - 1) * defender.type.hp + defender.hp - totalDamage;

            if (remainingHpPool <= 0) {
                log(`⚔️ ${attacker.type.name} уничтожили весь отряд ${defender.type.name}!`, 'log-hit');
                units = units.filter(u => u !== defender);
                // Корректировка индекса активного юнита при удалении
                const deadIndex = units.indexOf(defender);
                if (deadIndex !== -1 && deadIndex < activeUnitIndex) {
                    activeUnitIndex--;
                }
            } else {
                const newCount = Math.ceil(remainingHpPool / defender.type.hp);
                const newHp = remainingHpPool % defender.type.hp || defender.type.hp;
                const killed = defender.count - newCount;

                defender.count = newCount;
                defender.hp = newHp;
                log(`⚔️ ${attacker.type.name} нанесли ${totalDamage} урона. Погибло ${killed} ${defender.type.name}.`, 'log-hit');
            }
        }

        function enemyAI() {
            const enemyUnit = getCurrentUnit();
            if (!enemyUnit || enemyUnit.team !== 'enemy') return;

            // Ищем ближайшего игрока
            let target = null;
            let minDistance = 999;

            units.filter(u => u.team === 'player').forEach(playerUnit => {
                const dist = Math.abs(playerUnit.x - enemyUnit.x) + Math.abs(playerUnit.y - enemyUnit.y);
                if (dist < minDistance) {
                    minDistance = dist;
                    target = playerUnit;
                }
            });

            if (target) {
                // Если достает — атакует
                if (minDistance <= enemyUnit.type.attackRange) {
                    attack(enemyUnit, target);
                } 
                // Иначе подбирается ближе
                else {
                    let bestX = enemyUnit.x;
                    let bestY = enemyUnit.y;
                    let bestDist = minDistance;

                    for (let y = 0; y < GRID_HEIGHT; y++) {
                        for (let x = 0; x < GRID_WIDTH; x++) {
                            const distToCell = Math.abs(x - enemyUnit.x) + Math.abs(y - enemyUnit.y);
                            if (!getUnitAt(x, y) && distToCell <= enemyUnit.type.moveRange) {
                                const distToTarget = Math.abs(x - target.x) + Math.abs(y - target.y);
                                if (distToTarget < bestDist) {
                                    bestDist = distToTarget;
                                    bestX = x;
                                    bestY = y;
                                }
                            }
                        }
                    }
                    enemyUnit.x = bestX;
                    enemyUnit.y = bestY;
                    log(`💀 Вражеский ${enemyUnit.type.name} продвинулся ближе.`, 'log-move');
                }
            }
            nextTurn();
        }

        function checkGameOver() {
            const playerAlive = units.some(u => u.team === 'player');
            const enemyAlive = units.some(u => u.team === 'enemy');

            if (!playerAlive) {
                log("☠️ ПОРАЖЕНИЕ! Все ваши отряды разбиты.", 'log-system');
                document.getElementById('turn-info').innerText = "Конец боя - Поражение";
                return true;
            }
            if (!enemyAlive) {
                log("🎉 ПОБЕДА! Вы разгромили армию врага!", 'log-system');
                document.getElementById('turn-info').innerText = "Конец боя - Победа!";
                return true;
            }
            return false;
        }

        // Запуск игры
        initBoard();
        log("Битва началась! Нажимайте на зеленые клетки для хода или красные для атаки.", 'log-system');
    </script>
</body>
</html>
