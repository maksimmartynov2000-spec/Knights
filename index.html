<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рыцари: Битва Героев</title>
    <style>
        :root {
            --bg-main: #12100e;
            --bg-panel: #1e1915;
            --border-gold: #c89b3c;
            --border-dark: #4a3828;
            --text-gold: #f3d179;
            --cell-size: 70px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Georgia', serif; user-select: none; }
        
        body {
            background: var(--bg-main);
            color: #e0d0c0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 { color: var(--text-gold); text-shadow: 0 2px 8px rgba(0,0,0,0.8); margin-bottom: 10px; }

        .wrapper {
            display: flex;
            gap: 20px;
            background: var(--bg-panel);
            border: 2px solid var(--border-gold);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }

        .sidebar {
            width: 290px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel-box {
            background: #14100d;
            border: 1px solid var(--border-dark);
            border-radius: 6px;
            padding: 10px;
        }

        .panel-title {
            color: var(--text-gold);
            font-size: 13px;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border-dark);
            padding-bottom: 4px;
            margin-bottom: 8px;
        }

        .roster { display: flex; flex-direction: column; gap: 6px; }

        .roster-card {
            background: #251d18;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .roster-card:hover { border-color: var(--border-gold); background: #2f251f; }
        .roster-card.selected { border-color: #27ae60; background: #1e331e; }
        .roster-card.placed { opacity: 0.4; cursor: not-allowed; }

        .card-icon { font-size: 26px; }
        .card-info { flex-grow: 1; }
        .card-title { font-weight: bold; color: #fff; font-size: 13px; }
        .card-sub { font-size: 11px; color: #aaa; }

        .game-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #turn-bar {
            width: 100%;
            background: #14100d;
            border: 1px solid var(--border-dark);
            padding: 8px 15px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            color: var(--text-gold);
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, var(--cell-size));
            grid-template-rows: repeat(5, var(--cell-size));
            gap: 4px;
            background: #0a0806;
            padding: 8px;
            border: 2px solid var(--border-dark);
            border-radius: 6px;
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background: #231c16;
            border: 1px solid #362a20;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px;
            position: relative;
            cursor: pointer;
        }

        .cell:hover { border-color: #775a3c; }
        .cell.deploy-zone { background: #1e3d1d; border-color: #27ae60; }
        .cell.reachable { background: #1d3326; border-color: #2ecc71; }
        .cell.attackable { background: #4a1c1c; border-color: #e74c3c; }
        .cell.active-cell { outline: 2px solid var(--text-gold); box-shadow: inset 0 0 10px rgba(243, 209, 121, 0.5); }

        .unit { font-size: 30px; text-align: center; line-height: 1; margin-top: 2px; }

        .unit-badge {
            background: rgba(0,0,0,0.85);
            border-radius: 3px;
            padding: 1px 4px;
            font-size: 10px;
            font-weight: bold;
            color: #fff;
            align-self: flex-start;
        }

        .player-unit .unit-badge { color: #5ad; }
        .enemy-unit .unit-badge { color: #f55; }

        .btn {
            background: linear-gradient(180deg, #c89b3c 0%, #8a651e 100%);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn:hover { filter: brightness(1.2); }

        #log-box {
            width: 100%;
            height: 85px;
            background: #0e0c0a;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 8px;
            overflow-y: auto;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .log-hit { color: #e74c3c; }
        .log-move { color: #2ecc71; }
        .log-skill { color: #f39c12; }
    </style>
</head>
<body>

    <h1>⚔️ РЫЦАРИ: БИТВА ГЕРОЕВ</h1>

    <div class="wrapper">
        <div class="sidebar">
            <div class="panel-box" id="roster-panel">
                <div class="panel-title" id="limit-title">Армия (Лимит: 0/10)</div>
                <div class="roster" id="roster-list"></div>
            </div>

            <div class="panel-box">
                <div class="panel-title">Характеристики</div>
                <div id="unit-details" style="font-size: 12px; color: #bbb;">
                    Выберите юнита на поле или в панели.
                </div>
            </div>
        </div>

        <div class="game-section">
            <div id="turn-bar">
                <span id="game-status">Расстановка: Нажмите на юнита, затем на зеленую клетку</span>
                <button class="btn" id="action-btn" onclick="startBattle()">В Бой!</button>
            </div>

            <div id="board"></div>

            <div id="log-box"></div>
        </div>
    </div>

    <script>
        const GRID_W = 8;
        const GRID_H = 5;
        const MAX_LIMIT = 10;

        // Юниты и их Лимит (Очки)
        const UNIT_TYPES = {
            SKELETON: { name: 'Скелет', icon: '💀', cost: 1, hp: 12, dmg: 3, move: 2, range: 1, desc: 'Легкая пехота.' },
            KNIGHT:   { name: 'Рыцарь', icon: '🛡️', cost: 1, hp: 20, dmg: 5, move: 2, range: 1, desc: 'Надежный защитник.' },
            ARCHER:   { name: 'Лучник', icon: '🏹', cost: 2, hp: 10, dmg: 4, move: 1, range: 4, desc: 'Дальний бой.' },
            MAGE:     { name: 'Маг',    icon: '🧙‍♂️', cost: 3, hp: 8,  dmg: 8, move: 1, range: 3, desc: 'Огромный урон.' },
            ORC:      { name: 'Орк',    icon: '👹', cost: 4, hp: 35, dmg: 9, move: 2, range: 1, desc: 'Сильный тяжелый боец.' },
            DRAGON:   { name: 'Дракон', icon: '🐲', cost: 5, hp: 50, dmg: 12, move: 3, range: 2, desc: 'Элитный монстр.' }
        };

        // Набор игрока для расстановки (Сумма очков = 10)
        let playerRoster = [
            { id: 'p1', type: UNIT_TYPES.KNIGHT, count: 2, placed: false }, // 2 * 1 = 2 очка
            { id: 'p2', type: UNIT_TYPES.ARCHER, count: 2, placed: false }, // 2 * 2 = 4 очка
            { id: 'p3', type: UNIT_TYPES.ORC,    count: 1, placed: false }  // 1 * 4 = 4 очка
        ]; // Всего = 10 очков

        // Вражеская армия (Ровно 10 очков: Дракон [5] + Маг [3] + 2 Скелета [2])
        let units = [
            { id: 'e1', team: 'enemy', type: UNIT_TYPES.DRAGON, count: 1, maxHp: 50, hp: 50, x: 7, y: 2 },
            { id: 'e2', team: 'enemy', type: UNIT_TYPES.MAGE,   count: 1, maxHp: 8,  hp: 8,  x: 6, y: 0 },
            { id: 'e3', team: 'enemy', type: UNIT_TYPES.SKELETON, count: 2, maxHp: 12, hp: 12, x: 7, y: 4 }
        ];

        let gameState = 'DEPLOYMENT'; 
        let selectedRosterId = null;
        let turnIndex = 0;

        function init() {
            createBoard();
            renderRoster();
            render();
            log("Выберите юнита слева и поставьте его на зеленую клетку.", "log-skill");
        }

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            for (let y = 0; y < GRID_H; y++) {
                for (let x = 0; x < GRID_W; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.x = x;
                    cell.dataset.y = y;
                    cell.onclick = () => handleCellClick(x, y);
                    board.appendChild(cell);
                }
            }
        }

        function renderRoster() {
            const list = document.getElementById('roster-list');
            list.innerHTML = '';
            
            let currentPoints = 0;

            playerRoster.forEach(item => {
                const costTotal = item.type.cost * item.count;
                if (item.placed) currentPoints += costTotal;

                const card = document.createElement('div');
                card.className = `roster-card ${selectedRosterId === item.id ? 'selected' : ''} ${item.placed ? 'placed' : ''}`;
                card.onclick = () => {
                    if (item.placed || gameState !== 'DEPLOYMENT') return;
                    selectedRosterId = item.id;
                    showUnitDetails(item.type, item.count);
                    renderRoster();
                    render();
                };
                card.innerHTML = `
                    <div class="card-icon">${item.type.icon}</div>
                    <div class="card-info">
                        <div class="card-title">${item.type.name} (x${item.count})</div>
                        <div class="card-sub">Лимит: ${costTotal} очк. (${item.type.cost}/шт)</div>
                    </div>
                `;
                list.appendChild(card);
            });

            document.getElementById('limit-title').innerText = `Армия (Лимит: ${currentPoints}/${MAX_LIMIT})`;
        }

        function handleCellClick(x, y) {
            const unitOnCell = units.find(u => u.x === x && u.y === y);

            if (gameState === 'DEPLOYMENT') {
                if (x <= 1 && selectedRosterId) {
                    const item = playerRoster.find(r => r.id === selectedRosterId);
                    if (item && !item.placed && !unitOnCell) {
                        units.push({
                            id: item.id,
                            team: 'player',
                            type: item.type,
                            count: item.count,
                            maxHp: item.type.hp,
                            hp: item.type.hp,
                            x: x, y: y
                        });
                        item.placed = true;
                        selectedRosterId = null;
                        renderRoster();
                        render();
                    }
                }
            } else if (gameState === 'BATTLE') {
                const cur = units[turnIndex];
                if (!cur || cur.team !== 'player') return;

                const dist = Math.abs(x - cur.x) + Math.abs(y - cur.y);

                // АТАКА
                if (unitOnCell && unitOnCell.team === 'enemy' && dist <= cur.type.range) {
                    attack(cur, unitOnCell);
                    nextTurn();
                }
                // ХОД
                else if (!unitOnCell && dist <= cur.type.move) {
                    cur.x = x;
                    cur.y = y;
                    log(`Ваш ${cur.type.name} сходил на новую позицию`, 'log-move');
                    nextTurn();
                }
            }

            if (unitOnCell) showUnitDetails(unitOnCell.type, unitOnCell.count, unitOnCell.hp);
        }

        function startBattle() {
            const allPlaced = playerRoster.every(r => r.placed);
            if (!allPlaced) {
                alert('Выставьте все отряды на поле!');
                return;
            }

            gameState = 'BATTLE';
            turnIndex = 0;
            document.getElementById('roster-panel').style.display = 'none';
            document.getElementById('action-btn').style.display = 'none';
            document.getElementById('game-status').innerText = 'ВАШ ХОД: Нажмите на зеленую клетку для хода или красную для атаки!';
            log('⚔️ БОЙ НАЧАЛСЯ!', 'log-skill');
            render();
        }

        function render() {
            document.querySelectorAll('.cell').forEach(c => {
                c.className = 'cell';
                c.innerHTML = '';
            });

            // Расстановка
            if (gameState === 'DEPLOYMENT' && selectedRosterId) {
                for (let y = 0; y < GRID_H; y++) {
                    for (let x = 0; x <= 1; x++) {
                        if (!units.find(u => u.x === x && u.y === y)) {
                            getCell(x, y).classList.add('deploy-zone');
                        }
                    }
                }
            }

            // Геймплей в бою
            if (gameState === 'BATTLE') {
                const cur = units[turnIndex];
                if (cur && cur.team === 'player') {
                    getCell(cur.x, cur.y).classList.add('active-cell');

                    // Подсветка врагов для атаки
                    units.forEach(u => {
                        const dist = Math.abs(u.x - cur.x) + Math.abs(u.y - cur.y);
                        if (u.team === 'enemy' && dist <= cur.type.range) {
                            getCell(u.x, u.y).classList.add('attackable');
                        }
                    });

                    // Подсветка ходов
                    for (let y = 0; y < GRID_H; y++) {
                        for (let x = 0; x < GRID_W; x++) {
                            const dist = Math.abs(x - cur.x) + Math.abs(y - cur.y);
                            if (!units.find(u => u.x === x && u.y === y) && dist <= cur.type.move) {
                                getCell(x, y).classList.add('reachable');
                            }
                        }
                    }
                }
            }

            // Отрисовка фигурок
            units.forEach(u => {
                const cell = getCell(u.x, u.y);
                if (cell) {
                    cell.classList.add(u.team === 'player' ? 'player-unit' : 'enemy-unit');
                    cell.innerHTML = `
                        <div class="unit-badge">x${u.count}</div>
                        <div class="unit">${u.type.icon}</div>
                    `;
                }
            });
        }

        function attack(attacker, defender) {
            const rawDmg = attacker.count * attacker.type.dmg;
            let totalHp = (defender.count - 1) * defender.maxHp + defender.hp - rawDmg;

            if (totalHp <= 0) {
                log(`💥 ${attacker.type.name} уничтожил отряд ${defender.type.name}!`, 'log-hit');
                units = units.filter(u => u !== defender);
            } else {
                const newCount = Math.ceil(totalHp / defender.maxHp);
                const newHp = totalHp % defender.maxHp || defender.maxHp;
                log(`⚔️ ${attacker.type.name} нанес ${rawDmg} урона. Погибло воинов: ${defender.count - newCount}`, 'log-hit');
                defender.count = newCount;
                defender.hp = newHp;
            }
        }

        function nextTurn() {
            if (checkGameOver()) return;

            turnIndex = (turnIndex + 1) % units.length;
            render();

            const cur = units[turnIndex];
            if (cur.team === 'enemy') {
                document.getElementById('game-status').innerText = 'Ход Врага...';
                setTimeout(enemyAI, 600);
            } else {
                document.getElementById('game-status').innerText = 'ВАШ ХОД: Нажмите на клетку для действия';
            }
        }

        function enemyAI() {
            const cur = units[turnIndex];
            if (!cur || cur.team !== 'enemy') return;

            let target = null;
            let minD = 999;

            units.filter(u => u.team === 'player').forEach(p => {
                const d = Math.abs(p.x - cur.x) + Math.abs(p.y - cur.y);
                if (d < minD) { minD = d; target = p; }
            });

            if (target) {
                if (minD <= cur.type.range) {
                    attack(cur, target);
                } else {
                    let bestX = cur.x, bestY = cur.y, bestDist = minD;
                    for (let y = 0; y < GRID_H; y++) {
                        for (let x = 0; x < GRID_W; x++) {
                            const dToCell = Math.abs(x - cur.x) + Math.abs(y - cur.y);
                            if (!units.find(u => u.x === x && u.y === y) && dToCell <= cur.type.move) {
                                const dToT = Math.abs(x - target.x) + Math.abs(y - target.y);
                                if (dToT < bestDist) { bestDist = dToT; bestX = x; bestY = y; }
                            }
                        }
                    }
                    cur.x = bestX; cur.y = bestY;
                    log(`👹 Вражеский ${cur.type.name} наступает`, 'log-move');
                }
            }
            nextTurn();
        }

        function checkGameOver() {
            const pAlive = units.some(u => u.team === 'player');
            const eAlive = units.some(u => u.team === 'enemy');

            if (!pAlive || !eAlive) {
                gameState = 'END';
                document.getElementById('game-status').innerText = pAlive ? 'Победа!' : 'Поражение!';
                log(pAlive ? '🎉 ВЫ ПОБЕДИЛИ!' : '☠️ ВАША АРМИЯ РАЗБИТА!', 'log-skill');
                render();
                return true;
            }
            return false;
        }

        function showUnitDetails(type, count, currentHp) {
            document.getElementById('unit-details').innerHTML = `
                <div style="font-size:15px; font-weight:bold; color:var(--text-gold)">${type.icon} ${type.name}</div>
                <div>Отряд: <b>${count} чел.</b></div>
                <div>Занимаемый лимит: <b>${type.cost * count} / 10 очк.</b></div>
                <div>Здоровье 1 воина: <b>${currentHp || type.hp}/${type.hp}</b></div>
                <div>Урон 1 воина: <b>${type.dmg}</b></div>
                <div>Ход: <b>${type.move} кл.</b> | Атака: <b>${type.range} кл.</b></div>
                <div style="margin-top: 5px; color: #aaa;">${type.desc}</div>
            `;
        }

        function getCell(x, y) {
            return document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
        }

        function log(msg, cls = '') {
            const box = document.getElementById('log-box');
            const div = document.createElement('div');
            if (cls) div.className = cls;
            div.innerText = msg;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        init();
    </script>
</body>
</html>
