<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цитадели: Тактическая Инициатива</title>
    <style>
        :root {
            --bg-main: #090807;
            --bg-panel: #14100c;
            --border-gold: #c89b3c;
            --border-dark: #3a2b1d;
            --text-gold: #f3d179;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; user-select: none; }

        body {
            background: var(--bg-main);
            color: #d8c8b8;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4px;
            min-height: 100vh;
        }

        h1 { color: var(--text-gold); font-size: 14px; text-align: center; margin-bottom: 4px; }

        .wrapper {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            max-width: 600px;
            background: var(--bg-panel);
            border: 1.5px solid var(--border-gold);
            padding: 5px;
            border-radius: 8px;
            box-shadow: 0 6px 25px rgba(0,0,0,0.9);
        }

        .res-bar {
            display: flex;
            justify-content: space-around;
            background: #000;
            border: 1px solid var(--border-dark);
            padding: 3px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: bold;
        }
        .res-item { display: flex; align-items: center; gap: 3px; }
        .gold { color: #f1c40f; }
        .stone { color: #95a5a6; }

        /* Панель очереди ходов */
        #timeline-bar {
            background: #080604;
            border: 1px solid var(--border-gold);
            padding: 4px;
            border-radius: 5px;
            display: flex;
            gap: 4px;
            overflow-x: auto;
            align-items: center;
            min-height: 36px;
        }

        .timeline-item {
            background: #1a130d;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 2px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 8px;
            min-width: 38px;
            flex-shrink: 0;
        }
        .timeline-item.active {
            border-color: #2ecc71;
            background: #0e2a14;
            box-shadow: 0 0 6px #2ecc71;
        }
        .timeline-item.enemy { border-color: #7f1d1d; }

        #board {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 1px;
            background: #040302;
            padding: 2px;
            border: 1.5px solid var(--border-dark);
            border-radius: 5px;
            width: 100%;
        }

        .cell {
            aspect-ratio: 1 / 1;
            background: #15100b;
            border: 1px solid #221810;
            border-radius: 2px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 1px;
            position: relative;
            cursor: pointer;
        }

        .cell.reachable { background: #112818; border-color: #2ecc71; }
        .cell.attackable { background: #3a1212; border-color: #e74c3c; }
        .cell.teleport-target { background: #3d1c52; border-color: #9b59b6; }
        .cell.active-cell { outline: 2px solid var(--text-gold); z-index: 2; }
        .cell.citadel-cell { background: #2c1e12; border-color: #8e44ad; }
        .cell.citadel-enemy { background: #3a121d; border-color: #c0392b; }

        .unit { font-size: 13px; text-align: center; margin: auto; line-height: 1; }
        .unit-badge {
            background: rgba(0,0,0,0.85);
            border-radius: 2px;
            padding: 0 1px;
            font-size: 6px;
            font-weight: bold;
            line-height: 1;
        }
        .player-unit .unit-badge { color: #3498db; }
        .enemy-unit .unit-badge { color: #e74c3c; }

        #log-box {
            width: 100%;
            height: 38px;
            background: #050403;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 2px 5px;
            overflow-y: auto;
            font-size: 8.5px;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .panel-box {
            background: #0d0a07;
            border: 1px solid var(--border-dark);
            border-radius: 5px;
            padding: 4px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 2px;
            margin-top: 3px;
        }

        .shop-btn {
            background: #1a130d;
            border: 1px solid var(--border-dark);
            border-radius: 3px;
            padding: 2px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            font-size: 7.5px;
            color: #ccc;
        }
        .shop-btn:hover { border-color: var(--border-gold); }
        .shop-btn.selected { border-color: #2ecc71; background: #102414; }

        .btn {
            background: linear-gradient(180deg, #c89b3c 0%, #8a651e 100%);
            border: none;
            color: #000;
            font-weight: bold;
            padding: 3px 6px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 9px;
        }
        .btn-skip { background: linear-gradient(180deg, #e67e22 0%, #d35400 100%); color: #fff; }
        .btn-act { background: linear-gradient(180deg, #3498db 0%, #2980b9 100%); color: #fff; margin-top:2px; }
    </style>
</head>
<body>

    <h1>🏰 ЦИТАДЕЛИ: ТАКТИЧЕСКАЯ ИНИЦИАТИВА</h1>

    <div class="wrapper">
        <div class="res-bar">
            <div class="res-item gold">💰 Монеты: <span id="res-gold">150</span></div>
            <div class="res-item stone">🪨 Камень: <span id="res-stone">100</span></div>
            <div class="res-item" style="color:#e74c3c">🏰 Враг: <span id="enemy-cit-hp">500</span></div>
            <div class="res-item" style="color:#3498db">🏰 Вы: <span id="player-cit-hp">500</span></div>
        </div>

        <div style="font-size: 8px; color: var(--text-gold); margin-top:1px;">⏳ ОЧЕРЕДЬ ХОДОВ (ИНИЦИАТИВА):</div>
        <div id="timeline-bar"></div>

        <div id="board"></div>

        <div id="log-box"></div>

        <div class="panel-box">
            <div id="unit-details" style="font-size: 8.5px; min-height: 32px;">
                Выберите юнита или клетку.
            </div>
            <div id="action-panel" style="display:none;"></div>
        </div>

        <div class="panel-box">
            <div style="font-size:9px; color:var(--text-gold); font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
                <span>Найм у Цитадели (Поселение)</span>
                <button class="btn btn-skip" onclick="passTurn()">ПРОПУСТИТЬ ХОД</button>
            </div>
            <div class="shop-grid" id="shop-list"></div>
        </div>
    </div>

    <script>
        const GRID_W = 13;
        const GRID_H = 15;

        // Баланс Инициативы и Характеристик
        const UNITS_DB = {
            warrior: { name:'Воин', icon:'⚔️', costG:40, costS:0, hp:45, dmg:10, move:2, range:1, init:10, type:'Infantry', upgrade:'knight', desc:'+20% по Кавалерии' },
            knight: { name:'Рыцарь', icon:'🛡️', costG:35, costS:0, hp:70, dmg:16, move:2, range:1, init:11, type:'Infantry', desc:'+50% по Кавалерии' },
            swordsman: { name:'Мечник', icon:'🗡️', costG:45, costS:0, hp:50, dmg:12, move:2, range:1, init:8, type:'Infantry', upgrade:'armored', desc:'-30% от стрел' },
            armored: { name:'Латник', icon:'🦾', costG:40, costS:0, hp:80, dmg:18, move:2, range:1, init:9, type:'Infantry', desc:'-50% от стрел' },
            archer: { name:'Лучник', icon:'🏹', costG:50, costS:0, hp:30, dmg:11, move:2, range:2, init:14, type:'Infantry', upgrade:'marksman', desc:'Дальний бой' },
            marksman: { name:'Стрелок', icon:'🎯', costG:45, costS:0, hp:45, dmg:16, move:2, range:3, init:15, type:'Infantry', desc:'Дальность 3 клетки' },
            rider: { name:'Всадник', icon:'🐎', costG:65, costS:0, hp:55, dmg:15, move:4, range:1, init:18, type:'Cavalry', upgrade:'cavalier', desc:'Высочайшая скорость' },
            cavalier: { name:'Кавалерист', icon:'♞', costG:55, costS:0, hp:85, dmg:22, move:4, range:1, init:19, type:'Cavalry', desc:'Мощная атака и скорость' },
            ballista: { name:'Баллиста', icon:'🏹', costG:70, costS:30, hp:40, dmg:14, move:1, range:2, init:5, type:'Siege', upgrade:'catapult', desc:'+100% урона по зданиям' },
            catapult: { name:'Катапульта', icon:'☄️', costG:60, costS:40, hp:60, dmg:22, move:1, range:4, init:4, type:'Siege', desc:'Дальнобойная осада' },
            vampire: { name:'Вампир', icon:'🧛', costG:90, costS:0, hp:60, dmg:14, move:3, range:1, init:16, type:'Mystic', upgrade:'ancient_vampire', desc:'Вампиризм 40%' },
            ancient_vampire: { name:'Древний Вампир', icon:'🦇', costG:80, costS:0, hp:95, dmg:20, move:3, range:1, init:20, type:'Mystic', desc:'Телепорт + Доп. ход за убийство' },
            
            // Здания с собственной Инициативой
            wall: { name:'Стена', icon:'🧱', costG:0, costS:40, hp:120, dmg:0, move:0, range:0, init:0, type:'Building', upgrade:'fort_wall', desc:'Заграждение' },
            fort_wall: { name:'Улучш. Стена', icon:'🏰', costG:0, costS:35, hp:220, dmg:0, move:0, range:0, init:0, type:'Building', desc:'-50% урона от стрел' },
            tower: { name:'Башня', icon:'🏹', costG:20, costS:60, hp:100, dmg:12, move:0, range:3, init:12, type:'Building', upgrade:'super_tower', desc:'Ручной выстрел раз в круг' },
            super_tower: { name:'Улучш. Башня', icon:'🗼', costG:20, costS:50, hp:180, dmg:18, move:0, range:4, init:13, type:'Building', desc:'Высокая дальность' }
        };

        // Цитадели в протипоположных углах
        const PLAYER_CITADEL = { x: 0, y: 11, w: 4, h: 4, hp: 500, maxHp: 500 };
        const ENEMY_CITADEL  = { x: 9, y: 0,  w: 4, h: 4, hp: 500, maxHp: 500 };

        let playerGold = 150, playerStone = 100;
        let enemyGold = 150, enemyStone = 100;
        let units = [];
        let turnQueue = [];
        let currentTurnIndex = 0;
        let selectedShopKey = null;

        // Режимы телепортации Вампира
        let blinkSelectingEnemy = false;
        let blinkSelectingTile = false;
        let selectedBlinkTargetEnemy = null;

        function init() {
            createBoard();
            renderShop();
            updateRes();
            startNewRound();
            log("Битва началась! Поочередные ходы зависят от Инициативы.", "log-skill");
        }

        function updateRes() {
            document.getElementById('res-gold').innerText = playerGold;
            document.getElementById('res-stone').innerText = playerStone;
            document.getElementById('player-cit-hp').innerText = `${PLAYER_CITADEL.hp}/${PLAYER_CITADEL.maxHp}`;
            document.getElementById('enemy-cit-hp').innerText = `${ENEMY_CITADEL.hp}/${ENEMY_CITADEL.maxHp}`;
        }

        function createBoard() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            for (let y = 0; y < GRID_H; y++) {
                for (let x = 0; x < GRID_W; x++) {
                    const c = document.createElement('div');
                    c.className = 'cell';
                    c.dataset.x = x;
                    c.dataset.y = y;
                    c.onclick = () => handleCellClick(x, y);
                    b.appendChild(c);
                }
            }
            render();
        }

        function isCitadelCell(x, y, cit) {
            return x >= cit.x && x < cit.x + cit.w && y >= cit.y && y < cit.y + cit.h;
        }

        function isAdjacentToCitadel(x, y, cit) {
            for (let cy = cit.y - 1; cy <= cit.y + cit.h; cy++) {
                for (let cx = cit.x - 1; cx <= cit.x + cit.w; cx++) {
                    if (cx >= 0 && cx < GRID_W && cy >= 0 && cy < GRID_H) {
                        if (Math.max(Math.abs(cx - x), Math.abs(cy - y)) <= 1) {
                            if (!isCitadelCell(x, y, cit)) return true;
                        }
                    }
                }
            }
            return false;
        }

        function getUnitAt(x, y) { return units.find(u => u.x === x && u.y === y); }

        function startNewRound() {
            // Зачисление ресурсов раз в круг
            playerGold += 30; playerStone += 20;
            enemyGold += 30; enemyStone += 20;
            updateRes();

            // Пересчет очереди по Инициативе (исключая стены без атаки)
            turnQueue = units.filter(u => UNITS_DB[u.typeKey].init > 0);
            turnQueue.sort((a, b) => UNITS_DB[b.typeKey].init - UNITS_DB[a.typeKey].init);

            currentTurnIndex = 0;
            processTurn();
        }

        function processTurn() {
            if (turnQueue.length === 0 || currentTurnIndex >= turnQueue.length) {
                log("--- НОВЫЙ РАУНД (+30💰, +20🪨) ---", "log-skill");
                startNewRound();
                return;
            }

            const active = turnQueue[currentTurnIndex];
            if (!units.includes(active)) { // юнит погиб
                nextTurn();
                return;
            }

            renderTimeline();
            render();

            if (active.team === 'player') {
                showUnitDetails(active);
                log(`Ходит ваш: ${UNITS_DB[active.typeKey].name}`, 'log-skill');
            } else {
                showUnitDetails(active);
                log(`Ходит враг: ${UNITS_DB[active.typeKey].name}`, 'log-hit');
                setTimeout(runAITurn, 600);
            }
        }

        function nextTurn() {
            blinkSelectingEnemy = false;
            blinkSelectingTile = false;
            selectedBlinkTargetEnemy = null;
            currentTurnIndex++;
            processTurn();
        }

        function passTurn() {
            const active = turnQueue[currentTurnIndex];
            if (active && active.team === 'player') {
                log("Вы пропустили ход.", "log-move");
                nextTurn();
            }
        }

        function handleCellClick(x, y) {
            const active = turnQueue[currentTurnIndex];

            // Найм/Постройка на поле
            if (selectedShopKey) {
                if (isAdjacentToCitadel(x, y, PLAYER_CITADEL) && !getUnitAt(x, y)) {
                    buyUnit(selectedShopKey, x, y, 'player');
                    return;
                } else {
                    log("Найм возможен только у Цитадели на пустой клетке!", "log-hit");
                    return;
                }
            }

            // Выбор цели для блинка Древнего Вампира
            if (active && active.team === 'player' && active.typeKey === 'ancient_vampire') {
                if (blinkSelectingEnemy) {
                    const targetEnemy = getUnitAt(x, y);
                    if (targetEnemy && targetEnemy.team === 'enemy' && Math.max(Math.abs(targetEnemy.x - active.x), Math.abs(targetEnemy.y - active.y)) <= 3) {
                        selectedBlinkTargetEnemy = targetEnemy;
                        blinkSelectingEnemy = false;
                        blinkSelectingTile = true;
                        log("Теперь выберите подсвеченную клетку вокруг врага для прыжка!", "log-skill");
                        render();
                        return;
                    }
                } else if (blinkSelectingTile && selectedBlinkTargetEnemy) {
                    if (Math.max(Math.abs(selectedBlinkTargetEnemy.x - x), Math.abs(selectedBlinkTargetEnemy.y - y)) === 1 && !getUnitAt(x, y)) {
                        active.x = x;
                        active.y = y;
                        blinkSelectingTile = false;
                        selectedBlinkTargetEnemy = null;
                        log("🦇 Древний Вампир совершил Блинк!", "log-skill");
                        render();
                        showUnitDetails(active);
                        return;
                    }
                }
            }

            if (!active || active.team !== 'player') return;

            const target = getUnitAt(x, y);

            // Атака Цитадели врага
            if (isCitadelCell(x, y, ENEMY_CITADEL)) {
                if (canTarget(active, x, y)) {
                    attackCitadel(active, ENEMY_CITADEL);
                    nextTurn();
                    return;
                }
            }

            // Атака вражеского юнита
            if (target && target.team === 'enemy') {
                if (canTarget(active, x, y)) {
                    attack(active, target);
                    nextTurn();
                    return;
                } else if (UNITS_DB[active.typeKey].range === 1) {
                    // Атака с перемещением
                    const path = getMoveAndAttackTile(active, target.x, target.y);
                    if (path) {
                        active.x = path.x;
                        active.y = path.y;
                        attack(active, target);
                        nextTurn();
                        return;
                    }
                }
            }

            // Перемещение
            if (!target && !isCitadelCell(x, y, PLAYER_CITADEL) && !isCitadelCell(x, y, ENEMY_CITADEL)) {
                const reachable = getReachableCells(active);
                if (reachable.some(c => c.x === x && c.y === y)) {
                    active.x = x;
                    active.y = y;
                    log(`Перемещение совершено.`, 'log-move');
                    nextTurn();
                    return;
                }
            }
        }

        function buyUnit(key, x, y, team) {
            const db = UNITS_DB[key];
            if (team === 'player') {
                if (playerGold < db.costG || playerStone < db.costS) {
                    log("Недостаточно ресурсов!", "log-hit");
                    return;
                }
                playerGold -= db.costG;
                playerStone -= db.costS;
                updateRes();
            } else {
                enemyGold -= db.costG;
                enemyStone -= db.costS;
            }

            const newU = {
                id: Date.now() + Math.random(),
                team: team,
                typeKey: key,
                hp: db.hp,
                maxHp: db.hp,
                x: x, y: y,
                vampSkillUsed: false
            };

            units.push(newU);
            log(`${team === 'player' ? 'Вы' : 'Враг'} создали: ${db.name}`, 'log-skill');
            selectedShopKey = null;
            renderShop();
            render();
        }

        function upgradeUnit(unit) {
            const db = UNITS_DB[unit.typeKey];
            if (!db.upgrade) return;
            const upDb = UNITS_DB[db.upgrade];

            if (!isAdjacentToCitadel(unit.x, unit.y, unit.team === 'player' ? PLAYER_CITADEL : ENEMY_CITADEL)) {
                log("Для улучшения нужно быть рядом с Цитаделью!", "log-hit");
                return;
            }

            if (unit.team === 'player') {
                if (playerGold < upDb.costG || playerStone < upDb.costS) {
                    log("Недостаточно ресурсов!", "log-hit");
                    return;
                }
                playerGold -= upDb.costG;
                playerStone -= upDb.costS;
                updateRes();
            }

            unit.typeKey = db.upgrade;
            unit.maxHp = upDb.hp;
            unit.hp = upDb.hp;
            log(`🌟 ${db.name} улучшен до ${upDb.name}!`, 'log-skill');
            showUnitDetails(unit);
            render();
        }

        function attack(attacker, defender) {
            const aDb = UNITS_DB[attacker.typeKey];
            const dDb = UNITS_DB[defender.typeKey];

            let dmg = aDb.dmg;

            if (aDb.type === 'Infantry' && dDb.type === 'Cavalry') {
                if (attacker.typeKey === 'warrior') dmg *= 1.2;
                if (attacker.typeKey === 'knight') dmg *= 1.5;
            }
            if (aDb.type === 'Siege' && dDb.type === 'Building') dmg *= 2.0;

            if (aDb.range > 1) {
                if (defender.typeKey === 'swordsman') dmg *= 0.7;
                if (defender.typeKey === 'armored' || defender.typeKey === 'fort_wall') dmg *= 0.5;
            }

            dmg = Math.round(dmg);
            defender.hp -= dmg;

            if (aDb.type === 'Mystic') {
                const heal = Math.round(dmg * 0.4);
                attacker.hp = Math.min(attacker.maxHp, attacker.hp + heal);
                log(`🧛 ${aDb.name} исцелился на +${heal} HP`, 'log-skill');
            }

            log(`⚔️ ${aDb.name} нанес ${dmg} урона по ${dDb.name}`, 'log-hit');

            if (defender.hp <= 0) {
                log(`💥 ${dDb.name} уничтожен!`, 'log-hit');
                units = units.filter(u => u !== defender);

                // Дополнительный ход Древнего Вампира за убийство
                if (attacker.typeKey === 'ancient_vampire' && dDb.type !== 'Building' && dDb.type !== 'Siege') {
                    log(`🦇 Древний Вампир получает ДОПОЛНИТЕЛЬНЫЙ ХОД!`, 'log-skill');
                    currentTurnIndex--; // повторяем ход
                }
            }

            checkWin();
        }

        function attackCitadel(attacker, citadel) {
            const aDb = UNITS_DB[attacker.typeKey];
            let dmg = aDb.dmg;
            if (aDb.type === 'Siege') dmg *= 2.0;

            dmg = Math.round(dmg);
            citadel.hp = Math.max(0, citadel.hp - dmg);

            log(`💥 ${aDb.name} нанес ${dmg} урона по ЦИТАДЕЛИ!`, 'log-hit');
            updateRes();
            checkWin();
        }

        function useVampireCitadelTeleport(unit) {
            if (unit.vampSkillUsed) return;
            const cit = unit.team === 'player' ? PLAYER_CITADEL : ENEMY_CITADEL;

            for (let cy = cit.y - 1; cy <= cit.y + cit.h; cy++) {
                for (let cx = cit.x - 1; cx <= cit.x + cit.w; cx++) {
                    if (cx >= 0 && cx < GRID_W && cy >= 0 && cy < GRID_H) {
                        if (!isCitadelCell(cx, cy, cit) && !getUnitAt(cx, cy)) {
                            unit.x = cx;
                            unit.y = cy;
                            unit.vampSkillUsed = true;
                            log(`🦇 Вампир мгновенно переместился к своей Цитадели!`, 'log-skill');
                            render();
                            showUnitDetails(unit);
                            return;
                        }
                    }
                }
            }
        }

        function startBlinkTargeting() {
            blinkSelectingEnemy = true;
            blinkSelectingTile = false;
            log("Кликните по врагу в радиусе 3 клеток для выбора цели блинка!", "log-skill");
        }

        function runAITurn() {
            const active = turnQueue[currentTurnIndex];
            if (!active || active.team !== 'enemy') return;

            const db = UNITS_DB[active.typeKey];

            // 1. Апгрейд если у Цитадели
            if (db.upgrade && isAdjacentToCitadel(active.x, active.y, ENEMY_CITADEL) && enemyGold >= 50) {
                upgradeUnit(active);
            }

            // 2. Выстрел / Атака Цитадели игрока
            if (canTarget(active, PLAYER_CITADEL.x + 1, PLAYER_CITADEL.y)) {
                attackCitadel(active, PLAYER_CITADEL);
                nextTurn();
                return;
            }

            // 3. Атака врага
            const targets = units.filter(p => p.team === 'player' && canTarget(active, p.x, p.y));
            if (targets.length > 0) {
                attack(active, targets[0]);
                nextTurn();
                return;
            }

            // 4. Движение и Атака для ближнего боя
            if (db.range === 1) {
                const playerUnits = units.filter(p => p.team === 'player');
                for (let p of playerUnits) {
                    const moveTile = getMoveAndAttackTile(active, p.x, p.y);
                    if (moveTile) {
                        active.x = moveTile.x;
                        active.y = moveTile.y;
                        attack(active, p);
                        nextTurn();
                        return;
                    }
                }
            }

            // 5. Обычное движение к Цитадели игрока
            const reachable = getReachableCells(active);
            if (reachable.length > 0) {
                reachable.sort((a, b) => {
                    const dA = Math.abs(a.x - (PLAYER_CITADEL.x + 1)) + Math.abs(a.y - PLAYER_CITADEL.y);
                    const dB = Math.abs(b.x - (PLAYER_CITADEL.x + 1)) + Math.abs(b.y - PLAYER_CITADEL.y);
                    return dA - dB;
                });
                active.x = reachable[0].x;
                active.y = reachable[0].y;
            }

            // 6. Покупка подкрепления ИИ
            if (enemyGold >= 65) {
                let adjCells = [];
                for (let cy = ENEMY_CITADEL.y - 1; cy <= ENEMY_CITADEL.y + ENEMY_CITADEL.h; cy++) {
                    for (let cx = ENEMY_CITADEL.x - 1; cx <= ENEMY_CITADEL.x + ENEMY_CITADEL.w; cx++) {
                        if (cx >= 0 && cx < GRID_W && cy >= 0 && cy < GRID_H && !isCitadelCell(cx, cy, ENEMY_CITADEL) && !getUnitAt(cx, cy)) {
                            adjCells.push({x: cx, y: cy});
                        }
                    }
                }
                if (adjCells.length > 0) {
                    const spawn = adjCells[0];
                    if (enemyGold >= 90) buyUnit('vampire', spawn.x, spawn.y, 'enemy');
                    else if (enemyGold >= 65) buyUnit('rider', spawn.x, spawn.y, 'enemy');
                }
            }

            nextTurn();
        }

        // --- ВЫЧИСЛЕНИЯ И ТАКТИКА ---
        function canTarget(attacker, tx, ty) {
            const db = UNITS_DB[attacker.typeKey];
            const dx = Math.abs(attacker.x - tx);
            const dy = Math.abs(attacker.y - ty);

            if (db.range === 1) return Math.max(dx, dy) === 1;
            return (dx + dy) <= db.range;
        }

        function getMoveAndAttackTile(attacker, tx, ty) {
            const reachable = getReachableCells(attacker);
            for (let tile of reachable) {
                if (Math.max(Math.abs(tile.x - tx), Math.abs(tile.y - ty)) === 1) {
                    return tile;
                }
            }
            return null;
        }

        function getReachableCells(unit) {
            const db = UNITS_DB[unit.typeKey];
            if (db.move === 0) return [];

            const visited = {};
            const queue = [{ x: unit.x, y: unit.y, dist: 0 }];
            const reachable = [];

            while (queue.length > 0) {
                const curr = queue.shift();
                if (curr.dist > 0 && !getUnitAt(curr.x, curr.y) && !isCitadelCell(curr.x, curr.y, PLAYER_CITADEL) && !isCitadelCell(curr.x, curr.y, ENEMY_CITADEL)) {
                    reachable.push({ x: curr.x, y: curr.y });
                }

                if (curr.dist < db.move) {
                    const dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0},{x:-1,y:-1},{x:1,y:-1},{x:-1,y:1},{x:1,y:1}];
                    for (let d of dirs) {
                        const nx = curr.x + d.x, ny = curr.y + d.y;
                        if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
                            const key = `${nx},${ny}`;
                            if (!visited[key]) {
                                const uOn = getUnitAt(nx, ny);
                                const isPlayerCit = isCitadelCell(nx, ny, PLAYER_CITADEL);
                                const isEnemyCit = isCitadelCell(nx, ny, ENEMY_CITADEL);

                                if (!isPlayerCit && !isEnemyCit && (!uOn || uOn.team === unit.team)) {
                                    visited[key] = true;
                                    queue.push({ x: nx, y: ny, dist: curr.dist + 1 });
                                }
                            }
                        }
                    }
                }
            }
            return reachable;
        }

        function checkWin() {
            if (ENEMY_CITADEL.hp <= 0) {
                alert("🎉 ПОБЕДА! Вы уничтожили цитадель врага!");
                location.reload();
            } else if (PLAYER_CITADEL.hp <= 0) {
                alert("☠️ ПОРАЖЕНИЕ! Ваша цитадель разрушена!");
                location.reload();
            }
        }

        // РЕНДЕР
        function renderTimeline() {
            const bar = document.getElementById('timeline-bar');
            bar.innerHTML = '';

            turnQueue.forEach((u, idx) => {
                const db = UNITS_DB[u.typeKey];
                const item = document.createElement('div');
                item.className = `timeline-item ${idx === currentTurnIndex ? 'active' : ''} ${u.team === 'enemy' ? 'enemy' : ''}`;
                item.innerHTML = `
                    <div style="font-size:12px">${db.icon}</div>
                    <div style="font-weight:bold; color:var(--text-gold)">⚡${db.init}</div>
                `;
                bar.appendChild(item);
            });
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';

            const buyables = ['warrior', 'swordsman', 'archer', 'rider', 'ballista', 'vampire', 'wall', 'tower'];
            buyables.forEach(k => {
                const db = UNITS_DB[k];
                const btn = document.createElement('div');
                btn.className = `shop-btn ${selectedShopKey === k ? 'selected' : ''}`;
                btn.onclick = () => {
                    selectedShopKey = (selectedShopKey === k) ? null : k;
                    showDetails(db.name, `Стоимость: ${db.costG}💰 / ${db.costS}🪨. ${db.desc}`);
                    renderShop();
                };
                btn.innerHTML = `
                    <div style="font-size:12px">${db.icon}</div>
                    <div style="font-weight:bold">${db.costG}💰</div>
                    ${db.costS > 0 ? `<div style="color:#aaa">${db.costS}🪨</div>` : ''}
                `;
                list.appendChild(btn);
            });
        }

        function showUnitDetails(unit) {
            const db = UNITS_DB[unit.typeKey];
            const actPanel = document.getElementById('action-panel');
            actPanel.innerHTML = '';
            actPanel.style.display = 'flex';
            actPanel.style.gap = '4px';

            let html = `<b>${db.icon} ${db.name} (${unit.team === 'player' ? 'Ваш' : 'Враг'}) | Инициатива: ⚡${db.init}</b><br>`;
            html += `HP: ${unit.hp}/${unit.maxHp} | Урон: ${db.dmg} | Дальность: ${db.range} | Скорость: ${db.move}<br>`;
            html += `<span style="color:#f39c12">${db.desc}</span>`;

            if (unit.team === 'player' && turnQueue[currentTurnIndex] === unit) {
                if (db.upgrade) {
                    const upDb = UNITS_DB[db.upgrade];
                    const upBtn = document.createElement('button');
                    upBtn.className = 'btn btn-act';
                    upBtn.innerText = `Улучшить до ${upDb.name} (${upDb.costG}💰/${upDb.costS}🪨)`;
                    upBtn.onclick = () => upgradeUnit(unit);
                    actPanel.appendChild(upBtn);
                }
                if ((unit.typeKey === 'vampire' || unit.typeKey === 'ancient_vampire') && !unit.vampSkillUsed) {
                    const vBtn = document.createElement('button');
                    vBtn.className = 'btn btn-act';
                    vBtn.innerText = `🦇 Телепорт к Цитадели`;
                    vBtn.onclick = () => useVampireCitadelTeleport(unit);
                    actPanel.appendChild(vBtn);
                }
                if (unit.typeKey === 'ancient_vampire') {
                    const vBtn = document.createElement('button');
                    vBtn.className = 'btn btn-act';
                    vBtn.innerText = `🦇 Блинк к Врагу (Выбор)`;
                    vBtn.onclick = () => startBlinkTargeting();
                    actPanel.appendChild(vBtn);
                }
            }

            document.getElementById('unit-details').innerHTML = html;
        }

        function showDetails(title, text) {
            document.getElementById('unit-details').innerHTML = `<b>${title}</b><br>${text}`;
            document.getElementById('action-panel').style.display = 'none';
        }

        function render() {
            document.querySelectorAll('.cell').forEach(c => {
                const x = parseInt(c.dataset.x);
                const y = parseInt(c.dataset.y);
                c.className = 'cell';
                c.innerHTML = '';

                if (isCitadelCell(x, y, PLAYER_CITADEL)) c.classList.add('citadel-cell');
                if (isCitadelCell(x, y, ENEMY_CITADEL)) c.classList.add('citadel-enemy');
            });

            const active = turnQueue[currentTurnIndex];

            if (active && active.team === 'player') {
                const cell = getCell(active.x, active.y);
                if (cell) cell.classList.add('active-cell');

                // Отрисовка клеток для Блинка Древнего Вампира
                if (blinkSelectingTile && selectedBlinkTargetEnemy) {
                    const dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0},{x:-1,y:-1},{x:1,y:-1},{x:-1,y:1},{x:1,y:1}];
                    dirs.forEach(d => {
                        const nx = selectedBlinkTargetEnemy.x + d.x;
                        const ny = selectedBlinkTargetEnemy.y + d.y;
                        if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H && !getUnitAt(nx, ny)) {
                            const c = getCell(nx, ny);
                            if (c) c.classList.add('teleport-target');
                        }
                    });
                } else {
                    const reachable = getReachableCells(active);
                    reachable.forEach(rc => {
                        const c = getCell(rc.x, rc.y);
                        if (c) c.classList.add('reachable');
                    });

                    units.forEach(u => {
                        if (u.team === 'enemy' && (canTarget(active, u.x, u.y) || (UNITS_DB[active.typeKey].range === 1 && getMoveAndAttackTile(active, u.x, u.y)))) {
                            const c = getCell(u.x, u.y);
                            if (c) c.classList.add('attackable');
                        }
                    });

                    if (canTarget(active, ENEMY_CITADEL.x + 1, ENEMY_CITADEL.y)) {
                        for (let cy = ENEMY_CITADEL.y; cy < ENEMY_CITADEL.y + ENEMY_CITADEL.h; cy++) {
                            for (let cx = ENEMY_CITADEL.x; cx < ENEMY_CITADEL.x + ENEMY_CITADEL.w; cx++) {
                                const c = getCell(cx, cy);
                                if (c) c.classList.add('attackable');
                            }
                        }
                    }
                }
            }

            units.forEach(u => {
                const c = getCell(u.x, u.y);
                if (c) {
                    const db = UNITS_DB[u.typeKey];
                    c.classList.add(u.team === 'player' ? 'player-unit' : 'enemy-unit');
                    c.innerHTML = `
                        <div class="unit-badge">${u.hp}/${u.maxHp}</div>
                        <div class="unit">${db.icon}</div>
                    `;
                }
            });
        }

        function getCell(x, y) { return document.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`); }

        function log(msg, cls = '') {
            const box = document.getElementById('log-box');
            const div = document.createElement('div');
            if (cls) div.className = cls;
            div.innerText = msg;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        init();
    </script>
</body>
</html>
