<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Цитадели: Динамическая Инициатива</title>
    <style>
        :root {
            --bg-main: #090807;
            --bg-panel: #14100c;
            --border-gold: #c89b3c;
            --border-dark: #3a2b1d;
            --text-gold: #f3d179;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; user-select: none; }
        body { background: var(--bg-main); color: #d8c8b8; display: flex; flex-direction: column; align-items: center; padding: 4px; min-height: 100vh; }
        h1 { color: var(--text-gold); font-size: 11px; text-align: center; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

        .wrapper { display: flex; flex-direction: column; gap: 4px; width: 100%; max-width: 520px; background: var(--bg-panel); border: 1.5px solid var(--border-gold); padding: 5px; border-radius: 8px; }

        .res-bar { display: flex; justify-content: space-around; background: #000; border: 1px solid var(--border-dark); padding: 4px; border-radius: 5px; font-size: 9.5px; font-weight: bold; }
        .gold { color: #f1c40f; } .stone { color: #95a5a6; }

        /* УЛУЧШЕННАЯ ДИНАМИЧЕСКАЯ ЛЕНТА ИНИЦИАТИВЫ */
        .timeline-container {
            background: #050403;
            border: 1px solid var(--border-gold);
            padding: 4px;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .timeline-title {
            font-size: 7.5px;
            color: var(--text-gold);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #timeline-bar {
            display: flex;
            gap: 5px;
            overflow-x: auto;
            align-items: center;
            min-height: 42px;
            padding-bottom: 2px;
        }
        .timeline-item {
            background: #15100b;
            border: 1px solid var(--border-dark);
            border-radius: 4px;
            padding: 2px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 8px;
            min-width: 40px;
            flex-shrink: 0;
            position: relative;
            transition: all 0.2s ease;
        }
        .timeline-item.player { border-top: 2px solid #3498db; }
        .timeline-item.enemy { border-top: 2px solid #e74c3c; }
        
        .timeline-item.now {
            border: 1.5px solid #2ecc71;
            background: #0a2912;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.6);
            transform: scale(1.05);
        }
        .timeline-badge {
            font-size: 6px;
            font-weight: bold;
            padding: 1px 3px;
            border-radius: 2px;
            margin-top: 1px;
        }
        .timeline-item.player .timeline-badge { background: #1b3a4b; color: #3498db; }
        .timeline-item.enemy .timeline-badge { background: #3a1b1b; color: #e74c3c; }
        .timeline-item.now .timeline-badge { background: #2ecc71; color: #000; }

        #board { display: grid; grid-template-columns: repeat(13, minmax(0, 1fr)); gap: 1px; background: #040302; padding: 2px; border: 1.5px solid var(--border-dark); border-radius: 5px; width: 100%; }
        .cell { aspect-ratio: 1 / 1; background: #15100b; border: 1px solid #221810; border-radius: 2px; display: flex; flex-direction: column; justify-content: space-between; align-items: center; position: relative; cursor: pointer; overflow: hidden; }
        .cell.reachable { background: #112818; border-color: #2ecc71; }
        .cell.attack-range { background: #3a1212; border-color: #e74c3c; box-shadow: inset 0 0 4px #e74c3c; }
        .cell.upgradeable { background: #0d2838; border-color: #3498db; box-shadow: inset 0 0 5px #3498db; }
        .cell.citadel-cell { background: #2c1e12; border-color: #8e44ad; }
        .cell.citadel-enemy { background: #3a121d; border-color: #c0392b; }

        .unit { font-size: calc(10px + 0.5vw); text-align: center; margin: auto; line-height: 1; pointer-events: none; }
        .unit-badge { background: rgba(0,0,0,0.85); border-radius: 2px; padding: 0 1px; font-size: 6.5px; font-weight: bold; width: 100%; text-align: center; pointer-events: none; }
        .player-unit .unit-badge { color: #3498db; }
        .enemy-unit .unit-badge { color: #e74c3c; }

        #log-box { width: 100%; height: 45px; background: #050403; border: 1px solid var(--border-dark); border-radius: 4px; padding: 3px 5px; overflow-y: auto; font-size: 8.5px; display: flex; flex-direction: column; gap: 1px; }
        .log-hit { color: #e74c3c; } .log-skill { color: #f1c40f; } .log-move { color: #3498db; } .log-heal { color: #2ecc71; }

        .panel-box { background: #0d0a07; border: 1px solid var(--border-dark); border-radius: 5px; padding: 5px; }
        .shop-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 3px; margin-top: 4px; }
        .shop-btn { background: #1a130d; border: 1px solid var(--border-dark); border-radius: 4px; padding: 3px 1px; display: flex; flex-direction: column; align-items: center; cursor: pointer; font-size: 7.5px; color: #ccc; }
        .shop-btn.selected { border-color: #2ecc71; background: #102414; box-shadow: 0 0 5px #2ecc71; }
        .shop-btn.disabled { opacity: 0.35; }

        .skills-container { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .btn-skill { background: linear-gradient(180deg, #d35400 0%, #a04000 100%); border: 1px solid #f39c12; color: #fff; font-weight: bold; padding: 3px 6px; border-radius: 3px; cursor: pointer; font-size: 8px; }
        .btn-skill.active { border-color: #2ecc71; background: #1e8449; box-shadow: 0 0 5px #2ecc71; }
        .btn-cancel { background: linear-gradient(180deg, #c0392b 0%, #7b241c 100%); border: 1px solid #e74c3c; color: #fff; font-weight: bold; padding: 3px 6px; border-radius: 3px; cursor: pointer; font-size: 8px; }
        .btn { background: linear-gradient(180deg, #c89b3c 0%, #8a651e 100%); border: none; color: #000; font-weight: bold; padding: 4px 6px; border-radius: 3px; cursor: pointer; font-size: 8.5px; }
        .btn-skip { background: linear-gradient(180deg, #7f8c8d 0%, #34495e 100%); color: #fff; }
    </style>
</head>
<body>

    <h1>🏰 ЦИТАДЕЛИ: ДИНАМИЧЕСКАЯ ИНИЦИАТИВА</h1>

    <div class="wrapper">
        <div class="res-bar">
            <div class="gold">💰 Вы: <span id="res-gold">150</span></div>
            <div class="stone">🪨 Вы: <span id="res-stone">100</span></div>
            <div style="color:#e74c3c">🏰 Враг: <span id="enemy-cit-hp">500</span></div>
            <div style="color:#3498db">🏰 Вы: <span id="player-cit-hp">500</span></div>
        </div>

        <div style="font-size: 8.5px; color: var(--text-gold); display:flex; justify-content:space-between; align-items:center;">
            <span id="phase-status">⏳ ОЧЕРЕДЬ ХОДОВ:</span>
            <button class="btn btn-skip" id="btn-end-turn" onclick="passTurn()">ЗАВЕРШИТЬ ХОД ⏩</button>
        </div>

        <!-- ДИНАМИЧЕСКАЯ ЛЕНТА ИНИЦИАТИВЫ -->
        <div class="timeline-container">
            <div class="timeline-title">⚔️ Очередность следующих ходов:</div>
            <div id="timeline-bar"></div>
        </div>

        <div id="board"></div>
        <div id="log-box"></div>

        <div class="panel-box">
            <div id="unit-details" style="font-size: 8.5px; min-height: 48px; line-height: 1.3;">
                Нажмите на юнит на поле или в магазине для деталей.
            </div>
            <div id="skills-panel" class="skills-container"></div>
        </div>

        <div class="panel-box">
            <div id="shop-title" style="font-size:8.5px; color:var(--text-gold); font-weight:bold;">
                🔒 НАЙМ ДОСТУПЕН ТОЛЬКО В ХОД ЦИТАДЕЛИ
            </div>
            <div class="shop-grid" id="shop-list"></div>
        </div>
    </div>

    <script>
        const GRID_W = 13, GRID_H = 15;

        const UNITS_DB = {
            citadel_player: { name:'Ваша Цитадель', icon:'🏰', hp:500, dmg:0, move:0, range:0, init:20, desc:'Приносит +40💰 и +25🪨. Доступен найм и грейд.' },
            citadel_enemy:  { name:'Цитадель Врага', icon:'🏰', hp:500, dmg:0, move:0, range:0, init:20, desc:'Приносит ресурсы врагу.' },

            warrior: { name:'Воин', icon:'⚔️', costG:40, costS:0, hp:55, dmg:12, move:2, range:1, init:10, req: null, desc:'Базовый пехотинец.', skills: [{ id:'javelin', name:'🎯 Дротик', range:2, desc:'Бросок на 2 клетки (x1.2 урона)', dmgMult:1.2 }] },
            archer: { name:'Лучник', icon:'🏹', costG:50, costS:0, hp:35, dmg:12, move:2, range:3, init:14, req: null, desc:'Мобильный стрелок.', skills: [{ id:'power_shot', name:'🎯 Выстрел', range:3, desc:'Усиленная стрела (x1.4 урона)', dmgMult:1.4 }] },
            rider: { name:'Всадник', icon:'🐎', costG:65, costS:0, hp:65, dmg:16, move:4, range:1, init:17, req: null, desc:'Быстрая кавалерия.', skills: [{ id:'charge', name:'⚡ Наскок', range:1, desc:'Атака с разгона (x1.3 урона)', dmgMult:1.3 }] },
            vampire: { name:'Вампир', icon:'🧛', costG:90, costS:10, hp:70, dmg:16, move:3, range:1, init:16, req: null, limit: 2, desc:'Восстанавливает HP при атаке.', skills: [{ id:'vamp_bite', name:'🩸 Укус', range:1, desc:'Наносит урон и восстанавливает 60% HP', dmgMult:1.2 }] },

            knight: { name:'Рыцарь', icon:'🛡️', costG:55, costS:15, hp:85, dmg:15, move:2, range:1, init:9, req: 'warrior', desc:'Танк. Улучшается из Воина.', skills: [{ id:'defend', name:'🛡️ Оборона', range:0, desc:'Снижает входящий урон на 50% на 1 ход' }] },
            sniper: { name:'Снайпер', icon:'🎯', costG:65, costS:20, hp:45, dmg:18, move:2, range:4, init:15, req: 'archer', desc:'Дальнобойный. Улучшается из Лучника.', skills: [{ id:'headshot', name:'💥 Выстрел', range:4, desc:'Снайперский выстрел (x1.5 урона)', dmgMult:1.5 }] },
            cavalry: { name:'Кавалерист', icon:'♞', costG:85, costS:25, hp:95, dmg:22, move:4, range:1, init:18, req: 'rider', desc:'Тяжелая кавалерия. Улучшается из Всадника.', skills: [{ id:'breakthrough', name:'💥 Прорыв', range:1, desc:'Мощный таран (x1.4 урона)', dmgMult:1.4 }] },
            
            ballista: { name:'Баллиста', icon:'🏹', costG:75, costS:40, hp:50, dmg:18, move:1, range:3, init:6, req: null, desc:'Осадная машина.', skills: [{ id:'pierce', name:'Залп', range:3, desc:'Выстрел по броне (x1.2 урона)', dmgMult:1.2 }] },
            catapult: { name:'Катапульта', icon:'☄️', costG:95, costS:60, hp:70, dmg:30, move:1, range:5, init:4, req: 'ballista', desc:'Дальнобойная осада. Улучшается из Баллисты.', skills: [{ id:'boulder', name:'☄️ Валун', range:5, desc:'Огромный урон (x1.5 урона)', dmgMult:1.5 }] },
            elder_vampire: { name:'Древний Вампир', icon:'🦇', costG:130, costS:50, hp:100, dmg:24, move:3, range:1, init:20, req: 'vampire', limit: 1, desc:'Элитный мистик. Улучшается из Вампира.', skills: [{ id:'vamp_bite', name:'🩸 Жажда', range:1, desc:'Мощный укус с вампиризмом (x1.4 урона)', dmgMult:1.4 }] }
        };

        const PLAYER_CITADEL = { x: 0, y: 11, w: 4, h: 4, hp: 500, maxHp: 500 };
        const ENEMY_CITADEL  = { x: 9, y: 0,  w: 4, h: 4, hp: 500, maxHp: 500 };

        let playerGold = 150, playerStone = 100;
        let enemyGold = 150, enemyStone = 100;
        let units = [];
        let activeUnit = null;
        let inspectedUnit = null;
        let selectedShopKey = null;
        let selectedSkillMode = null;
        let isBuildPhase = false;

        function getDistance(x1, y1, x2, y2) {
            return Math.max(Math.abs(x1 - x2), Math.abs(y1 - y2));
        }

        function init() {
            createBoard();
            
            units.push({ id: 'cit_p', team: 'player', typeKey: 'citadel_player', hp: 500, maxHp: 500, x: 0, y: 11, delay: 0 });
            units.push({ id: 'cit_e', team: 'enemy', typeKey: 'citadel_enemy', hp: 500, maxHp: 500, x: 9, y: 0, delay: 0 });

            updateRes();
            renderShop();
            log("🎮 Игра началась! Выберите юнита в магазине.", "log-skill");
            processNextTurn();
        }

        function updateRes() {
            document.getElementById('res-gold').innerText = playerGold;
            document.getElementById('res-stone').innerText = playerStone;
            document.getElementById('player-cit-hp').innerText = `${PLAYER_CITADEL.hp}/${PLAYER_CITADEL.maxHp}`;
            document.getElementById('enemy-cit-hp').innerText = `${ENEMY_CITADEL.hp}/${ENEMY_CITADEL.maxHp}`;
        }

        function createBoard() {
            const b = document.getElementById('board');
            b.innerHTML = '';
            for (let y = 0; y < GRID_H; y++) {
                for (let x = 0; x < GRID_W; x++) {
                    const c = document.createElement('div');
                    c.className = 'cell';
                    c.dataset.x = x;
                    c.dataset.y = y;
                    c.onclick = () => handleCellClick(x, y);
                    b.appendChild(c);
                }
            }
        }

        function isCitadelCell(x, y, cit) { return x >= cit.x && x < cit.x + cit.w && y >= cit.y && y < cit.y + cit.h; }
        
        function isAdjacentToCitadel(x, y, cit) {
            if (isCitadelCell(x, y, cit)) return false;
            const minX = cit.x - 1, maxX = cit.x + cit.w;
            const minY = cit.y - 1, maxY = cit.y + cit.h;
            return x >= minX && x <= maxX && y >= minY && y <= maxY;
        }

        function getUnitAt(x, y) { return units.find(u => u.x === x && u.y === y && !u.typeKey.startsWith('citadel')); }

        // СИМУЛЯЦИЯ ОЧЕРЕДИ ДЛЯ ДИНАМИЧЕСКОЙ ЛЕНТЫ
        function calculateTurnOrder(count = 10) {
            const activeUnits = units.filter(u => UNITS_DB[u.typeKey].init > 0);
            if (activeUnits.length === 0) return [];

            // Клонируем список с их задержками
            let simUnits = activeUnits.map(u => ({
                unit: u,
                delay: u.delay
            }));

            let order = [];
            for (let i = 0; i < count; i++) {
                simUnits.sort((a, b) => a.delay - b.delay || UNITS_DB[b.unit.typeKey].init - UNITS_DB[a.unit.typeKey].init);
                let current = simUnits[0];
                order.push({ unit: current.unit, isCurrent: i === 0 });
                
                // Моделируем продвижение очереди после хода
                let initVal = UNITS_DB[current.unit.typeKey].init;
                current.delay += (100 / initVal);
            }
            return order;
        }

        function processNextTurn() {
            const activeUnits = units.filter(u => UNITS_DB[u.typeKey].init > 0);
            if (activeUnits.length === 0) return;

            activeUnits.sort((a, b) => a.delay - b.delay || UNITS_DB[b.typeKey].init - UNITS_DB[a.typeKey].init);
            activeUnit = activeUnits[0];
            inspectedUnit = activeUnit;

            selectedSkillMode = null;
            selectedShopKey = null;

            if (activeUnit.typeKey === 'citadel_player') {
                isBuildPhase = true;
                playerGold += 40; playerStone += 25;
                updateRes();
                log("🛠️ ФАЗА СТРОИТЕЛЬСТВА! +40💰 и +25🪨.", "log-heal");
                document.getElementById('shop-title').innerText = "🔨 НАЙМ И ГРЕЙД ЮНИТОВ";
                document.getElementById('phase-status').innerText = "🛠️ ФАЗА СТРОИТЕЛЬСТВА";
            } else if (activeUnit.typeKey === 'citadel_enemy') {
                isBuildPhase = false;
                enemyGold += 40; enemyStone += 25;
                updateRes();
                log("🏰 Враг нанимает юнитов...", "log-hit");
                setTimeout(runAIBuildPhase, 800);
                return;
            } else {
                isBuildPhase = false;
                document.getElementById('shop-title').innerText = "🔒 НАЙМ ДОСТУПЕН ТОЛЬКО В ХОД ЦИТАДЕЛИ";
                document.getElementById('phase-status').innerText = `⏳ ХОД: ${UNITS_DB[activeUnit.typeKey].name}`;
            }

            renderShop();
            renderTimeline();
            render();

            showUnitDetails(activeUnit);

            if (activeUnit.team === 'enemy' && !activeUnit.typeKey.startsWith('citadel')) {
                document.getElementById('phase-status').innerText = `⏳ ХОД ВРАГА: ${UNITS_DB[activeUnit.typeKey].name}`;
                setTimeout(runAITurn, 800);
            }
        }

        function endAction(costMultiplier = 1.0) {
            if (activeUnit) {
                const initVal = UNITS_DB[activeUnit.typeKey].init;
                activeUnit.delay += (100 / initVal) * costMultiplier;
            }
            processNextTurn();
        }

        function passTurn() {
            if (activeUnit && activeUnit.team === 'player') {
                if (isBuildPhase) {
                    log("Строительство завершено.", "log-move");
                    isBuildPhase = false;
                } else {
                    log(`${UNITS_DB[activeUnit.typeKey].name} пропустил ход.`, "log-move");
                }
                endAction(1.0);
            }
        }

        function cancelSkill() {
            selectedSkillMode = null;
            log("Выбор скилла отменен.", "log-move");
            showUnitDetails(activeUnit);
            render();
        }

        function handleCellClick(x, y) {
            const clickedUnit = getUnitAt(x, y);

            if (isBuildPhase && selectedShopKey) {
                const db = UNITS_DB[selectedShopKey];

                if (db.req && clickedUnit && clickedUnit.team === 'player' && clickedUnit.typeKey === db.req) {
                    upgradeUnit(clickedUnit, selectedShopKey, 'player');
                    return;
                }

                if (!db.req && !clickedUnit && isAdjacentToCitadel(x, y, PLAYER_CITADEL)) {
                    buyUnit(selectedShopKey, x, y, 'player');
                    return;
                }
            }

            if (!activeUnit || activeUnit.team !== 'player' || isBuildPhase) {
                if (clickedUnit) {
                    inspectedUnit = clickedUnit;
                    showUnitDetails(clickedUnit);
                    render();
                }
                return;
            }

            if (selectedSkillMode) {
                const skRange = selectedSkillMode.range || 1;
                const dist = getDistance(activeUnit.x, activeUnit.y, x, y);

                if (dist <= skRange) {
                    if (clickedUnit) {
                        if (clickedUnit.team === 'enemy') {
                            executeSkill(selectedSkillMode, x, y);
                        } else {
                            log("❌ Нельзя атаковать своих!", "log-hit");
                        }
                    } else if (isCitadelCell(x, y, ENEMY_CITADEL)) {
                        attackCitadel(activeUnit, ENEMY_CITADEL, selectedSkillMode.dmgMult || 1.0);
                        endAction(1.0);
                    }
                } else {
                    log("❌ Цель слишком далеко!", "log-hit");
                }
                return;
            }

            if (isCitadelCell(x, y, ENEMY_CITADEL)) {
                if (canTarget(activeUnit, x, y)) {
                    attackCitadel(activeUnit, ENEMY_CITADEL);
                    endAction(1.0);
                    return;
                }
            }

            if (clickedUnit) {
                if (clickedUnit.team === 'enemy') {
                    if (canTarget(activeUnit, x, y)) {
                        attack(activeUnit, clickedUnit);
                        endAction(1.0);
                        return;
                    } else {
                        inspectedUnit = clickedUnit;
                        showUnitDetails(clickedUnit);
                        render();
                    }
                } else {
                    inspectedUnit = clickedUnit;
                    showUnitDetails(clickedUnit);
                    render();
                    return;
                }
            }

            if (!clickedUnit && !isCitadelCell(x, y, PLAYER_CITADEL) && !isCitadelCell(x, y, ENEMY_CITADEL)) {
                const reachable = getReachableCells(activeUnit);
                if (reachable.some(c => c.x === x && c.y === y)) {
                    activeUnit.x = x;
                    activeUnit.y = y;
                    log(`Перемещение выполнено.`, 'log-move');
                    endAction(1.0);
                    return;
                }
            }
        }

        function canBuy(key, team = 'player') {
            const db = UNITS_DB[key];
            const g = team === 'player' ? playerGold : enemyGold;
            const s = team === 'player' ? playerStone : enemyStone;

            if (g < db.costG || s < db.costS) return false;

            if (db.req) {
                const hasReq = units.some(u => u.team === team && u.typeKey === db.req);
                if (!hasReq) return false;
            }

            if (db.limit) {
                const count = units.filter(u => u.team === team && u.typeKey === key).length;
                if (count >= db.limit) return false;
            }

            return true;
        }

        function buyUnit(key, x, y, team) {
            const db = UNITS_DB[key];
            if (team === 'player') {
                playerGold -= db.costG;
                playerStone -= db.costS;
            } else {
                enemyGold -= db.costG;
                enemyStone -= db.costS;
            }
            updateRes();

            units.push({
                id: Date.now() + Math.random(), team: team, typeKey: key,
                hp: db.hp, maxHp: db.hp, x: x, y: y, delay: activeUnit ? activeUnit.delay : 0
            });

            log(`${team === 'player' ? 'Вы наняли' : 'Враг нанял'}: ${db.name}`, team === 'player' ? 'log-skill' : 'log-hit');
            selectedShopKey = null;
            renderShop();
            renderTimeline();
            render();
        }

        function upgradeUnit(targetUnit, newKey, team) {
            const newDb = UNITS_DB[newKey];
            if (team === 'player') {
                playerGold -= newDb.costG;
                playerStone -= newDb.costS;
            } else {
                enemyGold -= newDb.costG;
                enemyStone -= newDb.costS;
            }
            updateRes();

            const oldName = UNITS_DB[targetUnit.typeKey].name;
            targetUnit.typeKey = newKey;
            targetUnit.hp = newDb.hp;
            targetUnit.maxHp = newDb.hp;

            log(`✨ ${oldName} был улучшен до: ${newDb.name}!`, 'log-skill');
            selectedShopKey = null;
            renderShop();
            renderTimeline();
            render();
        }

        function runAIBuildPhase() {
            let shopKeys = Object.keys(UNITS_DB).filter(k => !k.startsWith('citadel'));

            for (let u of units.filter(u => u.team === 'enemy')) {
                let upgrades = shopKeys.filter(k => UNITS_DB[k].req === u.typeKey && canBuy(k, 'enemy'));
                if (upgrades.length > 0) {
                    upgradeUnit(u, upgrades[0], 'enemy');
                    endAction(1.0);
                    return;
                }
            }

            let freeCells = [];
            for (let cy = ENEMY_CITADEL.y - 1; cy <= ENEMY_CITADEL.y + ENEMY_CITADEL.h; cy++) {
                for (let cx = ENEMY_CITADEL.x - 1; cx <= ENEMY_CITADEL.x + ENEMY_CITADEL.w; cx++) {
                    if (cx >= 0 && cx < GRID_W && cy >= 0 && cy < GRID_H) {
                        if (isAdjacentToCitadel(cx, cy, ENEMY_CITADEL) && !getUnitAt(cx, cy)) {
                            freeCells.push({x: cx, y: cy});
                        }
                    }
                }
            }

            if (freeCells.length > 0) {
                let baseAffordable = shopKeys.filter(k => !UNITS_DB[k].req && canBuy(k, 'enemy'));
                if (baseAffordable.length > 0) {
                    buyUnit(baseAffordable[0], freeCells[0].x, freeCells[0].y, 'enemy');
                }
            }

            endAction(1.0);
        }

        function runAITurn() {
            if (!activeUnit || activeUnit.team !== 'enemy') return;

            const uDb = UNITS_DB[activeUnit.typeKey];
            const pUnits = units.filter(u => u.team === 'player' && u.x !== undefined && !u.typeKey.startsWith('citadel'));

            let inRangeTargets = pUnits.filter(target => canTarget(activeUnit, target.x, target.y));
            let canAttackCitadel = isCitadelInTargetRange(activeUnit, PLAYER_CITADEL);

            if (inRangeTargets.length > 0 || canAttackCitadel) {
                inRangeTargets.sort((a, b) => a.hp - b.hp);

                let targetToKill = inRangeTargets.find(t => t.hp <= uDb.dmg * 1.3);

                if (targetToKill) {
                    useBestAttackOrSkill(activeUnit, targetToKill);
                } else if (inRangeTargets.length > 0) {
                    useBestAttackOrSkill(activeUnit, inRangeTargets[0]);
                } else if (canAttackCitadel) {
                    attackCitadel(activeUnit, PLAYER_CITADEL);
                }
                endAction(1.0);
                return;
            }

            let reachable = getReachableCells(activeUnit);
            if (reachable.length > 0) {
                let targetPos = { x: PLAYER_CITADEL.x + 2, y: PLAYER_CITADEL.y };
                if (pUnits.length > 0) {
                    pUnits.sort((a, b) => getDistance(activeUnit.x, activeUnit.y, a.x, a.y) - getDistance(activeUnit.x, activeUnit.y, b.x, b.y));
                    targetPos = pUnits[0];
                }

                reachable.sort((a, b) => {
                    let distA = getDistance(a.x, a.y, targetPos.x, targetPos.y);
                    let distB = getDistance(b.x, b.y, targetPos.x, targetPos.y);
                    return distA - distB;
                });

                let bestCell = reachable[0];
                activeUnit.x = bestCell.x;
                activeUnit.y = bestCell.y;
                log(`Вражеский ${uDb.name} продвигается вперед.`, 'log-move');

                let newTargets = pUnits.filter(target => canTarget(activeUnit, target.x, target.y));
                if (newTargets.length > 0) {
                    newTargets.sort((a, b) => a.hp - b.hp);
                    useBestAttackOrSkill(activeUnit, newTargets[0]);
                } else if (isCitadelInTargetRange(activeUnit, PLAYER_CITADEL)) {
                    attackCitadel(activeUnit, PLAYER_CITADEL);
                }
            }

            endAction(1.0);
        }

        function useBestAttackOrSkill(attacker, defender) {
            const uDb = UNITS_DB[attacker.typeKey];
            if (uDb.skills && uDb.skills.length > 0) {
                executeSkill(uDb.skills[0], defender.x, defender.y);
            } else {
                attack(attacker, defender);
            }
        }

        function isCitadelInTargetRange(attacker, citadel) {
            const db = UNITS_DB[attacker.typeKey];
            for (let cy = citadel.y; cy < citadel.y + citadel.h; cy++) {
                for (let cx = citadel.x; cx < citadel.x + citadel.w; cx++) {
                    if (getDistance(attacker.x, attacker.y, cx, cy) <= db.range) return true;
                }
            }
            return false;
        }

        function executeSkill(skill, targetX, targetY) {
            const uDb = UNITS_DB[activeUnit.typeKey];
            const targetUnit = getUnitAt(targetX, targetY);

            if (skill.id === 'defend') {
                activeUnit.isDefending = true;
                log(`🛡️ ${uDb.name} встал в Глухую Оборону!`, 'log-skill');
                endAction(1.0);
                return;
            }

            if (targetUnit) {
                let dmg = Math.round(uDb.dmg * (skill.dmgMult || 1.0));
                targetUnit.hp -= dmg;
                log(`✨ ${uDb.name} использовал ${skill.name} по ${UNITS_DB[targetUnit.typeKey].name} на ${dmg} урона!`, 'log-hit');

                if (skill.id === 'vamp_bite') {
                    const heal = Math.round(dmg * 0.6);
                    activeUnit.hp = Math.min(activeUnit.maxHp, activeUnit.hp + heal);
                    log(`🩸 Исцелено +${heal} HP!`, 'log-heal');
                }

                if (targetUnit.hp <= 0) {
                    units = units.filter(u => u !== targetUnit);
                    log(`💥 Юнит уничтожен!`, 'log-hit');
                }
                endAction(1.0);
            }
        }

        function attack(attacker, defender) {
            const aDb = UNITS_DB[attacker.typeKey];
            let dmg = aDb.dmg;
            if (defender.isDefending) dmg = Math.round(dmg * 0.5);

            defender.hp -= dmg;
            log(`⚔️ ${aDb.name} наносит ${dmg} урона по ${UNITS_DB[defender.typeKey].name}`, 'log-hit');

            if (defender.hp <= 0) {
                log(`💥 Юнит уничтожен!`, 'log-hit');
                units = units.filter(u => u !== defender);
            }
        }

        function attackCitadel(attacker, citadel, mult = 1.0) {
            const aDb = UNITS_DB[attacker.typeKey];
            let dmg = Math.round(aDb.dmg * mult);
            citadel.hp = Math.max(0, citadel.hp - dmg);
            log(`💥 ${aDb.name} нанес ${dmg} урона по ЦИТАДЕЛИ!`, 'log-hit');
            updateRes();

            if (citadel.hp <= 0) {
                alert(citadel === PLAYER_CITADEL ? "🔴 Цитадель разрушена! Вы проиграли!" : "🟢 Цитадель врага уничтожена! Вы победили!");
            }
        }

        function canTarget(attacker, tx, ty) {
            const db = UNITS_DB[attacker.typeKey];
            return getDistance(attacker.x, attacker.y, tx, ty) <= db.range;
        }

        function getReachableCells(unit) {
            const db = UNITS_DB[unit.typeKey];
            if (db.move === 0) return [];
            let reachable = [];
            for (let dy = -db.move; dy <= db.move; dy++) {
                for (let dx = -db.move; dx <= db.move; dx++) {
                    let nx = unit.x + dx, ny = unit.y + dy;
                    if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
                        if (getDistance(unit.x, unit.y, nx, ny) <= db.move && !getUnitAt(nx, ny) && !isCitadelCell(nx, ny, PLAYER_CITADEL) && !isCitadelCell(nx, ny, ENEMY_CITADEL)) {
                            reachable.push({x: nx, y: ny});
                        }
                    }
                }
            }
            return reachable;
        }

        function showShopUnitDetails(key) {
            const db = UNITS_DB[key];
            const sPanel = document.getElementById('skills-panel');
            sPanel.innerHTML = '';

            let reqStr = db.req ? `<b style="color:#3498db"> (Грейд из: ${UNITS_DB[db.req].name})</b>` : '';
            let limitStr = db.limit ? `<b style="color:#f39c12"> (Лимит: ${db.limit})</b>` : '';

            let html = `<b>${db.icon} ${db.name}</b> | 💰${db.costG} 🪨${db.costS} | ❤️${db.hp} ⚔️${db.dmg} 👟${db.move} 🏹${db.range} ⚡${db.init}${reqStr}${limitStr}<br>`;
            html += `<span style="color:#f39c12">${db.desc}</span>`;
            
            if (db.skills) {
                html += `<br><span style="color:#2ecc71"><b>Способность:</b> ${db.skills[0].name} — ${db.skills[0].desc}</span>`;
            }

            document.getElementById('unit-details').innerHTML = html;
        }

        function showUnitDetails(unit) {
            inspectedUnit = unit;
            const db = UNITS_DB[unit.typeKey];
            const sPanel = document.getElementById('skills-panel');
            sPanel.innerHTML = '';

            let html = `<b>${db.icon} ${db.name} (${unit.team === 'player' ? 'Ваш' : 'Враг'})</b> | ❤️HP: ${unit.hp}/${unit.maxHp} | ⚔️Урон: ${db.dmg} | 👟Ход: ${db.move} | 🏹Дальность: ${db.range}<br>`;
            html += `<span style="color:#f39c12">${db.desc}</span>`;
            
            if (db.skills) {
                html += `<br><span style="color:#2ecc71"><b>Спецприём:</b> ${db.skills[0].name} — ${db.skills[0].desc}</span>`;
            }

            document.getElementById('unit-details').innerHTML = html;

            if (unit === activeUnit && unit.team === 'player' && db.skills && !isBuildPhase) {
                db.skills.forEach(sk => {
                    const btn = document.createElement('button');
                    const isSelected = selectedSkillMode && selectedSkillMode.id === sk.id;
                    btn.className = `btn-skill ${isSelected ? 'active' : ''}`;
                    btn.innerText = `${sk.name}`;
                    btn.onclick = () => {
                        if (isSelected) {
                            cancelSkill();
                        } else {
                            selectedSkillMode = sk;
                            log(`Выбран скилл: ${sk.name}. Нажмите на ВРАГА в красной зоне!`, 'log-skill');
                            showUnitDetails(unit);
                            render();
                        }
                    };
                    sPanel.appendChild(btn);
                });

                if (selectedSkillMode) {
                    const cancelBtn = document.createElement('button');
                    cancelBtn.className = 'btn-cancel';
                    cancelBtn.innerText = '❌ Отменить скилл';
                    cancelBtn.onclick = cancelSkill;
                    sPanel.appendChild(cancelBtn);
                }
            }
        }

        function renderShop() {
            const list = document.getElementById('shop-list');
            list.innerHTML = '';
            Object.keys(UNITS_DB).filter(k => !k.startsWith('citadel')).forEach(k => {
                const db = UNITS_DB[k];
                const btn = document.createElement('div');
                const allowed = canBuy(k, 'player') && isBuildPhase;
                btn.className = `shop-btn ${selectedShopKey === k ? 'selected' : ''} ${!allowed ? 'disabled' : ''}`;
                
                btn.onclick = () => {
                    showShopUnitDetails(k);
                    if (allowed) {
                        selectedShopKey = (selectedShopKey === k) ? null : k;
                        renderShop();
                        render();
                    }
                };
                
                btn.innerHTML = `<div style="font-size:12px">${db.icon}</div><div>${db.costG}💰</div>`;
                list.appendChild(btn);
            });
        }

        // РЕНДЕР ДИНАМИЧЕСКОЙ ЛЕНТЫ
        function renderTimeline() {
            const bar = document.getElementById('timeline-bar');
            bar.innerHTML = '';

            const turnQueue = calculateTurnOrder(12);

            turnQueue.forEach((item, idx) => {
                const u = item.unit;
                const db = UNITS_DB[u.typeKey];
                
                const el = document.createElement('div');
                el.className = `timeline-item ${u.team} ${item.isCurrent ? 'now' : ''}`;
                
                let badgeText = item.isCurrent ? 'СЕЙЧАС' : `#${idx + 1}`;
                let teamLabel = u.team === 'player' ? 'Вы' : 'Враг';

                el.innerHTML = `
                    <div style="font-size:11px">${db.icon}</div>
                    <b style="font-size:7.5px">${db.name}</b>
                    <div class="timeline-badge">${badgeText}</div>
                `;

                // При нажатии на иконку в ленте - подсвечиваем юнита
                el.onclick = () => {
                    inspectedUnit = u;
                    showUnitDetails(u);
                    render();
                };

                bar.appendChild(el);
            });
        }

        function render() {
            document.querySelectorAll('.cell').forEach(c => {
                const x = parseInt(c.dataset.x), y = parseInt(c.dataset.y);
                c.className = 'cell';
                c.innerHTML = ''; 

                if (isCitadelCell(x, y, PLAYER_CITADEL)) c.classList.add('citadel-cell');
                if (isCitadelCell(x, y, ENEMY_CITADEL)) c.classList.add('citadel-enemy');

                if (isBuildPhase && selectedShopKey && !UNITS_DB[selectedShopKey].req && isAdjacentToCitadel(x, y, PLAYER_CITADEL) && !getUnitAt(x, y)) {
                    c.classList.add('reachable');
                }

                if (isBuildPhase && selectedShopKey && UNITS_DB[selectedShopKey].req) {
                    const u = getUnitAt(x, y);
                    if (u && u.team === 'player' && u.typeKey === UNITS_DB[selectedShopKey].req) {
                        c.classList.add('upgradeable');
                    }
                }
            });

            if (selectedSkillMode && activeUnit) {
                const skRange = selectedSkillMode.range || 1;
                for (let dy = -skRange; dy <= skRange; dy++) {
                    for (let dx = -skRange; dx <= skRange; dx++) {
                        let nx = activeUnit.x + dx, ny = activeUnit.y + dy;
                        if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
                            if (getDistance(activeUnit.x, activeUnit.y, nx, ny) <= skRange && (dx !== 0 || dy !== 0)) {
                                const c = document.querySelector(`.cell[data-x="${nx}"][data-y="${ny}"]`);
                                if (c) c.classList.add('attack-range');
                            }
                        }
                    }
                }
            } 
            else if (!isBuildPhase) {
                if (activeUnit && activeUnit.team === 'player' && !activeUnit.typeKey.startsWith('citadel')) {
                    const reachable = getReachableCells(activeUnit);
                    reachable.forEach(rc => {
                        const c = document.querySelector(`.cell[data-x="${rc.x}"][data-y="${rc.y}"]`);
                        if (c) c.classList.add('reachable');
                    });
                }

                const targetDisplayUnit = inspectedUnit || activeUnit;
                if (targetDisplayUnit && !targetDisplayUnit.typeKey.startsWith('citadel')) {
                    const uDb = UNITS_DB[targetDisplayUnit.typeKey];
                    if (uDb.range > 1) {
                        for (let dy = -uDb.range; dy <= uDb.range; dy++) {
                            for (let dx = -uDb.range; dx <= uDb.range; dx++) {
                                let nx = targetDisplayUnit.x + dx, ny = targetDisplayUnit.y + dy;
                                if (nx >= 0 && nx < GRID_W && ny >= 0 && ny < GRID_H) {
                                    if (getDistance(targetDisplayUnit.x, targetDisplayUnit.y, nx, ny) <= uDb.range && (dx !== 0 || dy !== 0)) {
                                        const c = document.querySelector(`.cell[data-x="${nx}"][data-y="${ny}"]`);
                                        if (c && !c.classList.contains('reachable')) c.classList.add('attack-range');
                                    }
                                }
                            }
                        }
                    }
                }
            }

            units.forEach(u => {
                if (u.x !== undefined && u.y !== undefined && !u.typeKey.startsWith('citadel')) {
                    const c = document.querySelector(`.cell[data-x="${u.x}"][data-y="${u.y}"]`);
                    if (c) {
                        c.classList.add(u.team === 'player' ? 'player-unit' : 'enemy-unit');
                        c.innerHTML = `<div class="unit-badge">${u.hp}/${u.maxHp}</div><div class="unit">${UNITS_DB[u.typeKey].icon}</div>`;
                    }
                }
            });
        }

        function log(text, className = '') {
            const box = document.getElementById('log-box');
            const entry = document.createElement('div');
            if (className) entry.className = className;
            entry.innerText = text;
            box.appendChild(entry);
            box.scrollTop = box.scrollHeight;
        }

        init();
    </script>
</body>
</html>
